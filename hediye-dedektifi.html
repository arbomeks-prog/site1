<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hediye Dedektifi</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: system-ui, sans-serif; background:#eef2ff; }

  .card { transition:.2s; cursor:pointer; position:relative; }
  .card:active { transform:scale(.96); }

  /* Check işareti — her kart farklı renk */
  .answered::after {
    content:'✔';
    position:absolute;
    top:8px; right:10px;
    font-size:18px;
    font-weight:900;
  }
  .card:nth-child(1).answered::after  { color:#2563eb; }
  .card:nth-child(2).answered::after  { color:#16a34a; }
  .card:nth-child(3).answered::after  { color:#d97706; }
  .card:nth-child(4).answered::after  { color:#9333ea; }
  .card:nth-child(5).answered::after  { color:#db2777; }
  .card:nth-child(6).answered::after  { color:#ea580c; }
  .card:nth-child(7).answered::after  { color:#0891b2; }
  .card:nth-child(8).answered::after  { color:#65a30d; }
  .card:nth-child(9).answered::after  { color:#b45309; }
  .card:nth-child(10).answered::after { color:#7c3aed; }
  .card:nth-child(11).answered::after { color:#be123c; }
  .card:nth-child(12).answered::after { color:#15803d; }
  .card:nth-child(13).answered::after { color:#1d4ed8; }
  .card:nth-child(14).answered::after { color:#c2410c; }
  .card:nth-child(15).answered::after { color:#7e22ce; }
  .card:nth-child(16).answered::after { color:#0f766e; }
  .card:nth-child(17).answered::after { color:#b91c1c; }
  .card:nth-child(18).answered::after { color:#4d7c0f; }
  .card:nth-child(19).answered::after { color:#6d28d9; }
  .card:nth-child(20).answered::after { color:#b45309; }
  .card:nth-child(21).answered::after { color:#0369a1; }
  .card:nth-child(22).answered::after { color:#166534; }
  .card:nth-child(23).answered::after { color:#9f1239; }
  .card:nth-child(24).answered::after { color:#1e40af; }
  .card:nth-child(25).answered::after { color:#a16207; }
  .card:nth-child(26).answered::after { color:#86198f; }
  .card:nth-child(27).answered::after { color:#b45309; }
  .card:nth-child(28).answered::after { color:#0f766e; }
  .card:nth-child(29).answered::after { color:#7c3aed; }
  .card:nth-child(30).answered::after { color:#15803d; }

  .emoji { transition:.2s; }

  /* Boş checkbox köşede */
  .card::before {
    content:'☐';
    position:absolute;
    top:8px; right:10px;
    font-size:20px;
    color:#d1d5db;
    line-height:1;
  }
  .answered::before { content:''; }

  /* POPUP — ekran ortasında */
  #popup-overlay {
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  #popup-overlay.open { display:flex; }

  #popup-box {
    background:white;
    border-radius:24px;
    padding:20px 16px 22px;
    width:100%;
    max-width:460px;
    max-height:72vh;
    overflow-y:auto;
    transform:translateY(30px);
    opacity:0;
    transition:transform .28s cubic-bezier(.32,1.1,.42,1), opacity .2s ease;
    position:relative;
  }
  #popup-overlay.open #popup-box {
    transform:translateY(0);
    opacity:1;
  }

  #popup-handle {
    width:36px; height:4px;
    background:#e5e7eb;
    border-radius:99px;
    margin:0 auto 14px;
  }

  #popup-title {
    font-size:1rem;
    font-weight:900;
    margin-bottom:3px;
    padding-right:20px;
  }
  #popup-sub {
    font-size:.76rem;
    color:#6b7280;
    margin-bottom:14px;
  }

  #popup-options {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:flex-start;
  }

  .opt-btn {
    border:2px solid;
    border-radius:20px;
    font-weight:700;
    cursor:pointer;
    transition:.15s;
    display:inline-flex;
    align-items:center;
    gap:5px;
    line-height:1.3;
    white-space:nowrap;
  }
  .opt-btn:active { transform:scale(.93); }
  .opt-btn.picked { filter:brightness(.85); }
  .opt-btn.picked .opt-check { display:inline; }
  .opt-check { display:none; font-size:.8em; }

  /* Dağınık boyutlar — yatayda geniş */
  .sz-xs { font-size:.76rem;  padding:7px  16px; }
  .sz-sm { font-size:.82rem;  padding:9px  20px; }
  .sz-md { font-size:.9rem;   padding:10px 24px; }
  .sz-lg { font-size:.97rem;  padding:12px 28px; border-radius:22px; }
  .sz-xl { font-size:1.02rem; padding:13px 32px; border-radius:24px; }

  /* Kaydet — her zaman görünür, pasif gri / seçince yeşil */
  #save-btn {
    display:block;
    margin-top:16px;
    width:100%;
    background:#e5e7eb;
    color:#9ca3af;
    font-weight:900;
    font-size:1rem;
    padding:14px;
    border-radius:16px;
    border:none;
    cursor:not-allowed;
    transition:.2s;
    letter-spacing:.01em;
  }
  #save-btn.active {
    background:#16a34a;
    color:white;
    cursor:pointer;
  }
  #save-btn.active:active { transform:scale(.97); background:#15803d; }

  /* Progress bar — başlığın altında */
  #progress-wrap {
    position:static;
    display:block;
  }
  #progress-inner {
    width:100%;
    background:white;
    padding:10px 16px 12px;
    border-bottom:1px solid #e5e7eb;
  }
  #progress-label {
    display:flex;
    justify-content:space-between;
    font-size:.72rem;
    font-weight:700;
    color:#6b7280;
    margin-bottom:6px;
  }
  #progress-track {
    height:8px;
    background:#e5e7eb;
    border-radius:99px;
    overflow:hidden;
  }
  #progress-fill {
    height:100%;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    border-radius:99px;
    transition:width .4s ease;
    width:0%;
  }

  /* Kart grid altına boşluk */
  #card-grid { padding-bottom:16px; }

  /* Cevap etiketi */
  .answer-tag {
    display:none;
    margin-top:8px;
    font-size:.75rem;
    font-weight:800;
    color:#2563eb;
    background:#eff6ff;
    border-radius:10px;
    padding:4px 9px;
    width:fit-content;
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .answered .answer-tag {
    display:block;
  }
</style>
</head>
<body>

<div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl overflow-hidden">

  <div class="bg-gradient-to-r from-blue-600 to-blue-500 text-white text-center px-5 py-7">
    <h1 class="text-4xl font-black">Hediye Dedektifi 🎁</h1>
    <p class="mt-2 text-blue-100 text-sm">Doğru hediyeye giden yolda birkaç soru 😎</p>
  </div>

  <div id="progress-wrap">
    <div id="progress-inner">
      <div id="progress-label">
        <span id="progress-text">0 / 30 soru cevaplandı</span>
        <span id="progress-pct">%0</span>
      </div>
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
    </div>
  </div>

  <div class="p-3 grid grid-cols-12 gap-3" id="card-grid">

    <button class="card col-span-6 bg-white border-2 border-gray-200 rounded-3xl p-4 text-left" data-id="kime">
      <div class="emoji text-3xl mb-2">🎁</div>
      <h3 class="font-black text-lg leading-tight">Hediye kime alınıyor?</h3>
      <p class="text-gray-500 text-sm mt-2">Bakalım kim bu şanslı kişi 😏</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-blue-50 border-2 border-blue-100 rounded-3xl p-4 text-left" data-id="cinsiyet">
      <div class="emoji text-3xl mb-2">🧑</div>
      <h3 class="font-black text-lg">Cinsiyeti nedir?</h3>
      <p class="text-gray-500 text-sm mt-2">Erkek mi kadın mı sürpriz mi 😄</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-12 bg-yellow-50 border-2 border-yellow-100 rounded-3xl p-4 text-left" data-id="dogum">
      <div class="emoji text-3xl mb-2">🎂</div>
      <h3 class="font-black text-lg">Doğum tarihi hakkında ne biliyorsunuz?</h3>
      <p class="text-gray-500 text-sm mt-2">Burç tahmini yapacağız ✨</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-emerald-50 border-2 border-emerald-100 rounded-3xl p-4 text-left" data-id="yas">
      <div class="emoji text-3xl mb-2">🎈</div>
      <h3 class="font-black text-base">Yaş aralığı nedir?</h3>
      <p class="text-gray-500 text-xs mt-2">Genç ruh mu deneyimli boss mu 😄</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-purple-50 border-2 border-purple-100 rounded-3xl p-4 text-left" data-id="amac">
      <div class="emoji text-3xl mb-2">🎉</div>
      <h3 class="font-black text-base">Hediye ne için?</h3>
      <p class="text-gray-500 text-xs mt-2">Doğum günü mü sürpriz mi 🎂</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-5 bg-green-50 border-2 border-green-100 rounded-3xl p-4 text-left" data-id="tarz">
      <div class="emoji text-3xl mb-2">😎</div>
      <h3 class="font-black text-base">Tarzı nasıl?</h3>
      <p class="text-gray-500 text-xs mt-2">Cool mu klasik mi 😎</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-7 bg-pink-50 border-2 border-pink-100 rounded-3xl p-4 text-left" data-id="hobiler">
      <div class="emoji text-3xl mb-2">🎨</div>
      <h3 class="font-black text-base">Hobileri neler?</h3>
      <p class="text-gray-500 text-xs mt-2">Boş vakitte neyle uğraşıyor 🎯</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-rose-50 border-2 border-rose-100 rounded-3xl p-4 text-left" data-id="renk">
      <div class="emoji text-3xl mb-2">🌈</div>
      <h3 class="font-black text-base">En sevdiği renk tonu?</h3>
      <p class="text-gray-500 text-xs mt-2">Pastel mi zıpır mı koyu mu 🎨</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-teal-50 border-2 border-teal-100 rounded-3xl p-4 text-left" data-id="ortam">
      <div class="emoji text-3xl mb-2">🏠</div>
      <h3 class="font-black text-base">Evde mi dışarıda mı?</h3>
      <p class="text-gray-500 text-xs mt-2">Netflix köşesi mi sokak gezgini mi 🛋️</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-5 bg-blue-50 border-2 border-blue-100 rounded-3xl p-4 text-left" data-id="teknoloji">
      <div class="emoji text-3xl mb-2">💻</div>
      <h3 class="font-black text-sm">Teknolojiye ilgisi?</h3>
      <p class="text-gray-500 text-xs mt-2">Gadget manyağı mı 🤓</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-7 bg-gray-100 border-2 border-gray-200 rounded-3xl p-4 text-left" data-id="kisilik">
      <div class="emoji text-3xl mb-2">🧠</div>
      <h3 class="font-black text-base">Kişilik tipi nasıl?</h3>
      <p class="text-gray-500 text-xs mt-2">Sessiz ninja mı sosyal kelebek mi 😄</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-12 bg-green-50 border-2 border-green-100 rounded-3xl p-4 text-left" data-id="butce">
      <div class="emoji text-3xl mb-2">💸</div>
      <h3 class="font-black text-lg">Bütçe aralığın nedir?</h3>
      <p class="text-gray-500 text-sm mt-2">Cüzdan ne kadar açık, dedektif buna göre ayarlar 😅</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-orange-50 border-2 border-orange-100 rounded-3xl p-4 text-left" data-id="mevsim">
      <div class="emoji text-3xl mb-2">🍂</div>
      <h3 class="font-black text-base">Favori mevsimi?</h3>
      <p class="text-gray-500 text-xs mt-2">Yaz mı kış mı sonbahar mı ☀️</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-pink-50 border-2 border-pink-100 rounded-3xl p-4 text-left" data-id="tatli">
      <div class="emoji text-3xl mb-2">🍫</div>
      <h3 class="font-black text-base">En sevdiği tatlı?</h3>
      <p class="text-gray-500 text-xs mt-2">Çikolata mı dondurma mı pasta mı 🍰</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-5 bg-yellow-50 border-2 border-yellow-100 rounded-3xl p-4 text-left" data-id="spor">
      <div class="emoji text-3xl mb-2">🏃</div>
      <h3 class="font-black text-sm">Spor yapıyor mu?</h3>
      <p class="text-gray-500 text-xs mt-2">Koşu mu koltuk mu 😂</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-7 bg-violet-50 border-2 border-violet-100 rounded-3xl p-4 text-left" data-id="muzik">
      <div class="emoji text-3xl mb-2">🎵</div>
      <h3 class="font-black text-base">Favori müzik türü?</h3>
      <p class="text-gray-500 text-xs mt-2">Pop rap klasik türk sanat 🎧</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-amber-50 border-2 border-amber-100 rounded-3xl p-4 text-left" data-id="hayvan">
      <div class="emoji text-3xl mb-2">🐾</div>
      <h3 class="font-black text-base">Hayvan sever mi?</h3>
      <p class="text-gray-500 text-xs mt-2">Kedi mi köpek mi orman mı 🐱</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-sky-50 border-2 border-sky-100 rounded-3xl p-4 text-left" data-id="seyahat">
      <div class="emoji text-3xl mb-2">✈️</div>
      <h3 class="font-black text-base">Seyahat sever mi?</h3>
      <p class="text-gray-500 text-xs mt-2">Valiz hazır bekliyor olabilir 🧳</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-7 bg-violet-50 border-2 border-violet-100 rounded-3xl p-4 text-left" data-id="kitap">
      <div class="emoji text-3xl mb-2">📚</div>
      <h3 class="font-black text-base">Kitap okumayı sever mi?</h3>
      <p class="text-gray-500 text-xs mt-2">Kitap kurdu mu reels savaşçısı mı 😅</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-5 bg-amber-50 border-2 border-amber-100 rounded-3xl p-4 text-left" data-id="kahve">
      <div class="emoji text-3xl mb-2">☕</div>
      <h3 class="font-black text-base">Kahve mi çay mı?</h3>
      <p class="text-gray-500 text-xs mt-2">Sabah modu ortaya çıkıyor 👀</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-5 bg-red-50 border-2 border-red-100 rounded-3xl p-4 text-left" data-id="film">
      <div class="emoji text-3xl mb-2">🎬</div>
      <h3 class="font-black text-sm">Favori film türü?</h3>
      <p class="text-gray-500 text-xs mt-2">Korku mu romantik mi 🍿</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-7 bg-orange-50 border-2 border-orange-100 rounded-3xl p-4 text-left" data-id="mutfak">
      <div class="emoji text-3xl mb-2">🍕</div>
      <h3 class="font-black text-base">En sevdiği mutfak türü?</h3>
      <p class="text-gray-500 text-xs mt-2">Pizza mı sushi mi kebap mı 😋</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-green-50 border-2 border-green-100 rounded-3xl p-4 text-left" data-id="bitki">
      <div class="emoji text-3xl mb-2">🪴</div>
      <h3 class="font-black text-base">Bitki bakıyor mu?</h3>
      <p class="text-gray-500 text-xs mt-2">Ev jungle olmuş olabilir 🌿</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-indigo-50 border-2 border-indigo-100 rounded-3xl p-4 text-left" data-id="oyun">
      <div class="emoji text-3xl mb-2">🎮</div>
      <h3 class="font-black text-base">Oyun oynuyor mu?</h3>
      <p class="text-gray-500 text-xs mt-2">Rank kasıyor olabilir 😎</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-7 bg-pink-50 border-2 border-pink-100 rounded-3xl p-4 text-left" data-id="makyaj">
      <div class="emoji text-3xl mb-2">💄</div>
      <h3 class="font-black text-base">Bakım ürünlerine ilgisi?</h3>
      <p class="text-gray-500 text-xs mt-2">Sephora radarı açıldı 🚨</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-5 bg-stone-50 border-2 border-stone-100 rounded-3xl p-4 text-left" data-id="aksesuar">
      <div class="emoji text-3xl mb-2">⌚</div>
      <h3 class="font-black text-sm">Saat sever mi?</h3>
      <p class="text-gray-500 text-xs mt-2">Bilek şıklığı önemli 😌</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-lime-50 border-2 border-lime-100 rounded-3xl p-4 text-left" data-id="doga">
      <div class="emoji text-3xl mb-2">🥾</div>
      <h3 class="font-black text-base">Doğa yürüyüşü yapar mı?</h3>
      <p class="text-gray-500 text-xs mt-2">Şehirden kaçış modu 🌲</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-6 bg-cyan-50 border-2 border-cyan-100 rounded-3xl p-4 text-left" data-id="sanat">
      <div class="emoji text-3xl mb-2">🖼️</div>
      <h3 class="font-black text-base">Sanata ilgisi var mı?</h3>
      <p class="text-gray-500 text-xs mt-2">Van Gogh vibes olabilir 🎨</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-12 bg-sky-50 border-2 border-sky-100 rounded-3xl p-4 text-left" data-id="foto">
      <div class="emoji text-3xl mb-2">📸</div>
      <h3 class="font-black text-lg">Fotoğraf çekmeyi sever mi?</h3>
      <p class="text-gray-500 text-sm mt-2">Galeride 18 bin foto olabilir 😅</p>
      <div class="answer-tag"></div>
    </button>

    <button class="card col-span-12 bg-fuchsia-50 border-2 border-fuchsia-100 rounded-3xl p-4 text-left" data-id="oncelik">
      <div class="emoji text-3xl mb-2">🎁</div>
      <h3 class="font-black text-lg">Hediye alırken en çok neye dikkat edersin?</h3>
      <p class="text-gray-500 text-sm mt-2">Anlam mı kalite mi "aaa çok tatlı" etkisi mi 😄</p>
      <div class="answer-tag"></div>
    </button>

  </div>
</div>

<!-- POPUP -->
<div id="popup-overlay">
  <div id="popup-box">
    <div id="popup-handle"></div>
    <button onclick="closePopup()" style="position:absolute;top:14px;right:14px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#9ca3af;">✕</button>
    <div id="popup-title"></div>
    <div id="popup-sub"></div>
    <div id="popup-options"></div>
    <button id="save-btn" onclick="saveAnswer()">Kaydet</button>
  </div>
</div>



<script>
const SORULAR = {
  kime: {
    baslik:"Hediye kime alınıyor?", sub:"Kim bu şanslı kişi 😏",
    secenekler:[
      {e:"💑",l:"Sevgili",       bg:"#fce7f3",br:"#f9a8d4",tx:"#9d174d"},

      {e:"👦",l:"Kardeş",        bg:"#ede9fe",br:"#c4b5fd",tx:"#4c1d95"},

      {e:"🪞",l:"Kendime",       bg:"#f0fdf4",br:"#86efac",tx:"#14532d"},

      {e:"👶",l:"Bebek ❤️",      bg:"#fdf2f8",br:"#f0abfc",tx:"#701a75"},
      {e:"🐾",l:"Pet ❤️",        bg:"#fef9c3",br:"#fde047",tx:"#713f12"},
    ]

// Dağınık boyutlar — sırayla döner, her butona farklı boyut verir
const SIZES = ['sz-md','sz-lg','sz-sm','sz-xl','sz-xs','sz-md','sz-lg','sz-sm','sz-xs','sz-xl'];

const answers = {};
let currentId = null;
let pickedNow = null;

function openPopup(id) {
  currentId = id;
  pickedNow = answers[id] || null;
  const s = SORULAR[id];

  document.getElementById('popup-title').textContent = s.baslik;
  document.getElementById('popup-sub').textContent = s.sub;

  const wrap = document.getElementById('popup-options');
  wrap.innerHTML = '';

  s.secenekler.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn ' + SIZES[i % SIZES.length];
    btn.style.cssText = `background:${opt.bg};border-color:${opt.br};color:${opt.tx}`;
    btn.dataset.label = opt.l;
    btn.innerHTML = opt.e + ' ' + opt.l + '<span class="opt-check">✔</span>';

    if (pickedNow === opt.l) {
      btn.classList.add('picked');
    }

    btn.onclick = () => pick(btn, opt);
    wrap.appendChild(btn);
  });

  updateSave();
  document.getElementById('popup-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function pick(btn, opt) {
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('picked'));
  btn.classList.add('picked');
  pickedNow = opt.l;
  updateSave();
}

function updateSave() {
  const btn = document.getElementById('save-btn');
  if (pickedNow) {
    btn.classList.add('active');
    btn.textContent = 'Kaydet ✔';
  } else {
    btn.classList.remove('active');
    btn.textContent = 'Kaydet';
  }
}

const TOTAL = 30;

function updateProgress() {
  const count = Object.keys(answers).length;
  const pct = Math.round(count / TOTAL * 100);
  document.getElementById('progress-text').textContent = count + ' / ' + TOTAL + ' soru cevaplandı';
  document.getElementById('progress-pct').textContent = '%' + pct;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function saveAnswer() {
  if (!pickedNow) return;
  answers[currentId] = pickedNow;
  const card = document.querySelector('[data-id="' + currentId + '"]');
  card.classList.add('answered');
  // Cevabı karta yaz
  const tag = card.querySelector('.answer-tag');
  if (tag) {
    // Seçilen şıktan emoji + label
    const s = SORULAR[currentId];
    const opt = s.secenekler.find(o => o.l === pickedNow);
    tag.textContent = opt ? opt.e + ' ' + opt.l : pickedNow;
    tag.style.background = opt ? opt.bg : '#eff6ff';
    tag.style.color = opt ? opt.tx : '#2563eb';
    tag.style.borderColor = opt ? opt.br : 'transparent';
    tag.style.border = '1.5px solid ' + (opt ? opt.br : '#bfdbfe');
  }
  updateProgress();
  closePopup();
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Kart tıklamaları
document.querySelectorAll('.card[data-id]').forEach(c => {
  c.onclick = () => openPopup(c.dataset.id);
});

// Overlay arka planına tıklayınca kapat
document.getElementById('popup-overlay').addEventListener('click', function(e) {
  if (e.target === this) closePopup();
});
