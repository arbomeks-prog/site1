<style>
:root {
  --bg: #0f0e0d;
  --surface: #1a1916;
  --border: #2e2c28;
  --accent: #e8c84a;
  --accent2: #c96a2e;
  --text: #f0ece4;
  --muted: #8a8478;
  --card-radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 20px 20px 0;
  position: sticky;
  top: 0;
  z-index: 50;
}

.header-top {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.02em;
}

.logo-dot {
  color: var(--accent);
}

.header-sub {
  font-size: .75rem;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
}

/* Progress bar */
.progress-wrap {
  padding-bottom: 14px;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: .7rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 7px;
  letter-spacing: .03em;
}
.progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
  width: 0%;
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 10px;
  padding: 14px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  overflow: hidden;
  cursor: pointer;
  text-align: left;
  position: relative;
  transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  display: flex;
  flex-direction: column;
}

.card:active {
  transform: scale(.97);
}

.card:hover {
  border-color: #4a4640;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}

.card.answered {
  border-color: var(--accent);
}

/* Card image */
.card-img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
  opacity: .85;
  transition: opacity .2s;
}
.card:hover .card-img { opacity: 1; }

/* Card body */
.card-body {
  padding: 12px 12px 10px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.card-title {
  font-family: 'DM Sans', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

/* Answered badge */
.answer-tag {
  display: none;
  font-size: .68rem;
  font-weight: 700;
  background: rgba(232,200,74,.12);
  color: var(--accent);
  border: 1px solid rgba(232,200,74,.25);
  border-radius: 8px;
  padding: 3px 8px;
  width: fit-content;
  margin-top: 2px;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card.answered .answer-tag { display: block; }

/* Check corner */
.card-check {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 22px;
  height: 22px;
  background: var(--accent);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: .65rem;
  color: #0f0e0d;
  font-weight: 900;
}
.card.answered .card-check { display: flex; }

/* ── POPUP ── */
#popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
  backdrop-filter: blur(4px);
}
#popup-overlay.open { display: flex; }

#popup-box {
  background: #1e1c19;
  border: 1px solid var(--border);
  border-radius: 22px 22px 0 0;
  padding: 20px 18px 28px;
  width: 100%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  transform: translateY(100%);
  opacity: 0;
  transition: transform .32s cubic-bezier(.32,1.1,.42,1), opacity .22s ease;
}
#popup-overlay.open #popup-box {
  transform: translateY(0);
  opacity: 1;
}

.popup-handle {
  width: 36px;
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  margin: 0 auto 18px;
}

.popup-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--border);
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  cursor: pointer;
  color: var(--muted);
  font-size: .8rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.popup-close:hover { background: #3a3830; color: var(--text); }

#popup-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  padding-right: 28px;
  line-height: 1.3;
  margin-bottom: 16px;
}

#popup-options {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}

.opt-btn {
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 9px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  background: transparent;
  color: var(--muted);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.opt-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.opt-btn.picked {
  background: var(--accent);
  border-color: var(--accent);
  color: #0f0e0d;
  font-weight: 700;
}
.opt-btn:active { transform: scale(.95); }

/* Save button */
#save-btn {
  display: block;
  width: 100%;
  background: var(--border);
  color: var(--muted);
  border: none;
  border-radius: 14px;
  padding: 15px;
  font-family: 'DM Sans', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  cursor: not-allowed;
  transition: all .2s;
  letter-spacing: .01em;
}
#save-btn.active {
  background: var(--accent);
  color: #0f0e0d;
  cursor: pointer;
}
#save-btn.active:active {
  transform: scale(.98);
  background: #d4b63e;
}

/* Scrollbar */
#popup-box::-webkit-scrollbar { width: 4px; }
#popup-box::-webkit-scrollbar-track { background: transparent; }
#popup-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>

const QUIZ_REDIRECT = {
  'kime': 'https://budurbuldum.com/quiz-kime.html?from=dedektif&return=' + encodeURIComponent(window.location.href),
  'yas':  'https://budurbuldum.com/quiz-yas.html?from=dedektif&return='  + encodeURIComponent(window.location.href),
  'tarz': 'https://budurbuldum.com/quiz-tarz.html?from=dedektif&return=' + encodeURIComponent(window.location.href),
};

const answers = {};
let currentId = null;
let pickedNow = null;
const TOTAL = 30;

window.addEventListener('pageshow', function() {
  const cevaplar = JSON.parse(localStorage.getItem('budurBuldumCevaplar') || '{}');
  Object.keys(QUIZ_REDIRECT).forEach(function(id) {
    if (cevaplar[id] && !answers[id]) {
      answers[id] = cevaplar[id];
      const card = document.querySelector('[data-id="' + id + '"]');
      if (!card) return;
      card.classList.add('answered');
      const tag = card.querySelector('.answer-tag');
      if (tag) {
        const s = SORULAR[id];
        const val = cevaplar[id];
        const opt = s ? s.secenekler.find(o => o.l === val) : null;
        tag.textContent = opt ? opt.e + ' ' + opt.l : '✓ ' + val;
      }
      updateProgress();
    }
  });
});

function openPopup(id) {
  if (QUIZ_REDIRECT[id]) {
    window.location.href = QUIZ_REDIRECT[id];
    return;
  }
  currentId = id;
  pickedNow = answers[id] || null;
  const s = SORULAR[id];
  if (!s) return;

  document.getElementById('popup-title').textContent = s.baslik;

  const wrap = document.getElementById('popup-options');
  wrap.innerHTML = '';
  s.secenekler.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (pickedNow === opt.l ? ' picked' : '');
    btn.dataset.label = opt.l;
    btn.textContent = opt.e + ' ' + opt.l;
    btn.onclick = () => pick(btn, opt);
    wrap.appendChild(btn);
  });

  updateSave();
  document.getElementById('popup-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function pick(btn, opt) {
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('picked'));
  btn.classList.add('picked');
  pickedNow = opt.l;
  updateSave();
}

function updateSave() {
  const btn = document.getElementById('save-btn');
  if (pickedNow) {
    btn.classList.add('active');
    btn.textContent = 'Kaydet ✓';
  } else {
    btn.classList.remove('active');
    btn.textContent = 'Kaydet';
  }
}

function updateProgress() {
  const count = Object.keys(answers).length;
  const pct = Math.round(count / TOTAL * 100);
  document.getElementById('progress-text').textContent = count + ' / ' + TOTAL + ' soru';
  document.getElementById('progress-pct').textContent = '%' + pct + ' tamamlandı';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function saveAnswer() {
  if (!pickedNow) return;
  answers[currentId] = pickedNow;
  const card = document.querySelector('[data-id="' + currentId + '"]');
  card.classList.add('answered');
  const tag = card.querySelector('.answer-tag');
  if (tag) {
    const s = SORULAR[currentId];
    const opt = s.secenekler.find(o => o.l === pickedNow);
    tag.textContent = opt ? opt.e + ' ' + opt.l : pickedNow;
  }
  updateProgress();
  closePopup();
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.querySelectorAll('.card[data-id]').forEach(c => {
  c.onclick = () => openPopup(c.dataset.id);
});

document.getElementById('popup-overlay').addEventListener('click', function(e) {
  if (e.target === this) closePopup();
});
