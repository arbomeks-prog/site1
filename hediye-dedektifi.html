<!DOCTYPE html>

<meta charset="UTF-8" />

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { font-family: system-ui, sans-serif; background:#eef2ff; }

  .card { transition:.2s; cursor:pointer; position:relative; }
  .card:active { transform:scale(.96); }

  .card::before {
    content:'☐';
    position:absolute;
    top:8px; right:10px;
    font-size:20px;
    color:#d1d5db;
    line-height:1;
  }
  .answered::before { content:''; }
  .answered::after {
    content:'✔';
    position:absolute;
    top:8px; right:10px;
    font-size:18px;
    font-weight:900;
    color:#2563eb;
  }

  .emoji { transition:.2s; }

  .card.locked {
    pointer-events:none;
  }

  /* POPUP */
  #popup-overlay {
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  #popup-overlay.open { display:flex; }
  #popup-box {
    background:white;
    border-radius:24px;
    padding:20px 16px 22px;
    width:100%;
    max-width:460px;
    max-height:72vh;
    overflow-y:auto;
    transform:translateY(30px);
    opacity:0;
    transition:transform .28s cubic-bezier(.32,1.1,.42,1), opacity .2s ease;
    position:relative;
  }
  #popup-overlay.open #popup-box { transform:translateY(0); opacity:1; }
  #popup-handle { width:36px; height:4px; background:#e5e7eb; border-radius:99px; margin:0 auto 14px; }
  #popup-title { font-size:1rem; font-weight:900; margin-bottom:3px; padding-right:20px; }
  #popup-sub { font-size:.76rem; color:#6b7280; margin-bottom:14px; }
  #popup-options { display:flex; flex-wrap:wrap; gap:8px; align-items:flex-start; }

  .opt-btn {
    border:2px solid;
    border-radius:20px;
    font-weight:700;
    cursor:pointer;
    transition:.15s;
    display:inline-flex;
    align-items:center;
    gap:5px;
    line-height:1.3;
    white-space:nowrap;
  }
  .opt-btn:active { transform:scale(.93); }
  .opt-btn.picked { filter:brightness(.85); }
  .opt-btn.picked .opt-check { display:inline; }
  .opt-check { display:none; font-size:.8em; }

  .sz-xs { font-size:.76rem;  padding:7px  16px; }
  .sz-sm { font-size:.82rem;  padding:9px  20px; }
  .sz-md { font-size:.9rem;   padding:10px 24px; }
  .sz-lg { font-size:.97rem;  padding:12px 28px; border-radius:22px; }
  .sz-xl { font-size:1.02rem; padding:13px 32px; border-radius:24px; }

  #save-btn {
    display:block; margin-top:16px; width:100%;
    background:#e5e7eb; color:#9ca3af;
    font-weight:900; font-size:1rem; padding:14px;
    border-radius:16px; border:none; cursor:not-allowed; transition:.2s;
  }
  #save-btn.active { background:#16a34a; color:white; cursor:pointer; }
  #save-btn.active:active { transform:scale(.97); background:#15803d; }

  #card-grid { padding-bottom:80px; }

  .answer-tag {
    display:none;
    margin-top:8px;
    font-size:.75rem; font-weight:800;
    border-radius:10px; padding:4px 9px;
    width:fit-content; max-width:100%;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .answered .answer-tag { display:block; }

  /* Sabit alt buton */
  #devam-wrap {
    position:fixed; bottom:0; left:50%;
    transform:translateX(-50%);
    width:100%; max-width:448px;
    padding:10px 12px 14px;
    background:white;
    box-shadow:0 -2px 12px rgba(0,0,0,0.08);
    z-index:50;
  }
  #devam-btn {
    width:100%; height:52px;
    border-radius:99px; border:none;
    cursor:pointer; overflow:hidden;
    display:flex; position:relative;
  }
  .dilim { flex:1; height:100%; background:#e5e7eb; transition:background .3s ease; }
  #devam-label {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:800;
    color:#1e3a8a !important;
    pointer-events:none; letter-spacing:.3px;
  }
  #devam-btn.ready #devam-label { color:white !important; text-shadow:0 1px 3px rgba(0,0,0,0.3); }

const answers = {};
let currentId = null;
let pickedNow = null;
let aktifSorular = []; // mevcut aktif soru id listesi

// Kime'ye göre soru seti belirle
function getSoruSeti(kime) {
  const map = {
    'Bebek ❤️': 'soruBebekler',
    'Çocuk 🧒': 'soruCocuklar',
    'Pet ❤️':   'soruPetler',
  };
  return map[kime] || 'sorular';
}

// pet_tur cevabına göre set belirle
function getPetSeti(petTur) {
  if (!petTur) return 'soruPetler';
  if (petTur.includes('Kedi'))    return 'soruKedi';
  if (petTur.includes('Köpek'))   return 'soruKopek';
  if (petTur.includes('Kuş'))     return 'soruKus';
  if (petTur.includes('Balık'))   return 'soruBalik';
  if (['Tavşan 🐰','Hamster 🐹','Egzotik / Diğer 🦎'].some(p => petTur.includes(p.split(' ')[0]))) return 'soruKucukPet';
  return 'soruPetler';
}

// Aktif sorular listesini hesapla
function hesaplaAktifSorular() {
  const kime = answers.kime || '';
  let setAdi = getSoruSeti(kime);

  // Pet seçilmişse pet_tur cevabına göre seti güncelle
  if (kime === 'Pet ❤️' && answers.pet_tur) {
    setAdi = getPetSeti(answers.pet_tur);
  }

  let sorular = (QUIZ_CONFIG[setAdi] || QUIZ_CONFIG.sorular).map(s => s.id);

  // Anne/Baba → cinsiyet atla
  if (['Anne','Baba'].includes(kime)) {
    sorular = sorular.filter(id => id !== 'cinsiyet');
  }
  // Kardeş → dogum atla
  if (kime === 'Kardeş') {
    sorular = sorular.filter(id => id !== 'dogum');
  }

  return sorular;
}

// Tüm kartları yeniden çiz
function kartlariBuildEt() {
  aktifSorular = hesaplaAktifSorular();
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';

  // kime sorusu her zaman ilk kart
  const tumIds = aktifSorular.includes('kime') ? aktifSorular : ['kime', ...aktifSorular];

  tumIds.forEach((id, idx) => {
    const soru = getSoru(id);
    if (!soru) { console.warn('Soru bulunamadı:', id); return; }

    const span = KART_SPAN[idx % KART_SPAN.length];
    const renk = KART_RENKLER[idx % KART_RENKLER.length];
    const emoji = KART_EMOJI[id] || '❓';
    const cevap = answers[id];
    const isLocked = isKilitli(id);

    const btn = document.createElement('button');
    btn.className = 'card col-span-' + span + ' ' + renk.bg + ' border-2 ' + renk.border + ' rounded-3xl p-4 text-left' + (cevap ? ' answered' : '') + (isLocked ? ' locked' : '');
    btn.dataset.id = id;

    const fontSize = span >= 12 ? 'text-lg' : span >= 7 ? 'text-base' : 'text-sm';
    const emojiSize = span >= 7 ? 'text-3xl' : 'text-2xl';

        const espri = soru.espriNotu || '';
    const tagDisplay = cevap ? 'block' : 'none';
    const tagStyle = getRenkStyle(id, cevap);
    const tagText = cevap || '';
    btn.innerHTML = '<div class="emoji ' + emojiSize + ' mb-2">' + emoji + '</div>' +
      '<h3 class="font-black ' + fontSize + ' leading-tight">' + soru.soru + '</h3>' +
      '<p class="text-gray-500 text-xs mt-2">' + espri + '</p>' +
      '<div class="answer-tag" style="display:' + tagDisplay + ';' + tagStyle + '">' + tagText + '</div>';
    btn.onclick = () => openPopup(id);
    grid.appendChild(btn);
  });

  updateProgress();
}

// Soru verisini bul (tüm setlerde ara)
// Dogum sorusunu burc sorusuna dönüştür
function getDogumSoru() {
  return {
    id: 'dogum',
    soru: 'Burcu nedir?',
    espriNotu: 'Yıldızlar konuşsun biraz ✨',
    secenekler: BURCLAR.map(b => b.l),
    atlanabilir: true
  };
}

function getSoru(id) {
  if (id === 'dogum') return getDogumSoru();
  // Makyaj sorusunu cinsiyete göre özelleştir
  if (id === 'makyaj') {
    const cins = answers.cinsiyet || '';
    if (cins === 'Erkek') {
      return {id:'makyaj', soru:'Bakım / cilt ürünlerine ilgisi var mı?', espriNotu:'Krem bile sürmez mi gerçekten 🧴', secenekler:['Çok var','Orta','Yok']};
    }
  }
  const setler = ['sorular','soruBebekler','soruCocuklar','soruPetler','soruKedi','soruKopek','soruKus','soruBalik','soruKucukPet'];
  for (const s of setler) {
    const found = (QUIZ_CONFIG[s] || []).find(q => q.id === id);
    if (found) return found;
  }
  return null;
}

// Kart kilitli mi?
function isKilitli(id) {
  const kime = answers.kime || '';
  if (id === 'cinsiyet' && ['Anne','Baba','Bebek ❤️','Pet ❤️'].includes(kime)) return true;
  if (id === 'dogum' && ['Bebek ❤️','Çocuk 🧒','Pet ❤️','Kardeş'].includes(kime)) return true;
  return false;
}

// Cevap renk stili
function getRenkStyle(id, cevap) {
  if (!cevap) return '';
  if (id === 'dogum') {
    const burc = BURCLAR.find(b => b.l === cevap);
    if (burc) return 'background:' + burc.bg + ';color:' + burc.tx + ';border:1.5px solid ' + burc.br;
  }
  const secKey = (id === 'makyaj' && answers.cinsiyet === 'Erkek') ? 'makyaj_erkek' : id;
  const secList = ESPRI_SECENEKLER[secKey] || ESPRI_SECENEKLER[id];
  if (secList) {
    const opt = secList.find(o => o.l === cevap);
    if (opt) return 'background:' + opt.bg + ';color:' + opt.tx + ';border:1.5px solid ' + opt.br;
  }
  const idx = getFiltreli(id).indexOf(cevap);
  const renk = OPT_RENKLER[Math.max(0,idx) % OPT_RENKLER.length];
  return 'background:' + renk.bg + ';color:' + renk.tx + ';border:1.5px solid ' + renk.br;
}

// Filtrelenmiş seçenekler
function getFiltreli(id) {
  const soru = getSoru(id);
  if (!soru) return [];
  let secs = soru.secenekler;
  if (id === 'dogum') return BURCLAR.map(b => b.l);
  if (id === 'cinsiyet') {
    const kime = answers.kime || '';
    const filtre = QUIZ_CONFIG.cinsiyetFiltreleri && QUIZ_CONFIG.cinsiyetFiltreleri[kime];
    if (Array.isArray(filtre)) secs = secs.filter(s => filtre.includes(s));
  }
  if (id === 'yas') {
    const kime = answers.kime || '';
    const cinsiyet = answers.cinsiyet || '';
    let yasFiltre = null;
    if (kime === 'Kardeş' && (cinsiyet === 'Kız Çocuğu' || cinsiyet === 'Erkek Çocuğu')) {
      yasFiltre = QUIZ_CONFIG.yasFiltreleri && QUIZ_CONFIG.yasFiltreleri['Kardeş_cocuk'];
    } else {
      yasFiltre = QUIZ_CONFIG.yasFiltreleri && QUIZ_CONFIG.yasFiltreleri[kime];
    }
    if (Array.isArray(yasFiltre)) secs = secs.filter(s => yasFiltre.includes(s));
  }
  return secs;
}

// Popup aç
function openPopup(id) {
  currentId = id;
  pickedNow = answers[id] || null;
  const soru = getSoru(id);
  if (!soru) return;

  document.getElementById('popup-title').textContent = soru.soru;
  document.getElementById('popup-sub').textContent = soru.espriNotu || '';

  const wrap = document.getElementById('popup-options');
  wrap.innerHTML = '';

  const secenekler = getFiltreli(id);
  secenekler.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn ' + SIZES[i % SIZES.length];
    // Renk ve emoji bul
    let renkBul = null;
    if (id === 'dogum') {
      renkBul = BURCLAR.find(b => b.l === opt);
    } else {
      const secKey = (id === 'makyaj' && answers.cinsiyet === 'Erkek') ? 'makyaj_erkek' : id;
      const secList = ESPRI_SECENEKLER[secKey] || ESPRI_SECENEKLER[id];
      if (secList) renkBul = secList.find(o => o.l === opt);
    }
    const renk = renkBul || OPT_RENKLER[i % OPT_RENKLER.length];
    btn.style.cssText = 'background:' + renk.bg + ';border-color:' + renk.br + ';color:' + renk.tx;
    btn.dataset.label = opt;
    const emoji = renk.e || '';
    btn.innerHTML = (emoji ? emoji + ' ' : '') + opt + '<span class="opt-check">✔</span>';
    if (pickedNow === opt) btn.classList.add('picked');
    btn.onclick = () => pick(btn, opt);
    wrap.appendChild(btn);
  });

  updateSave();
  document.getElementById('popup-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function pick(btn, opt) {
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('picked'));
  btn.classList.add('picked');
  pickedNow = opt;
  updateSave();
}

function updateSave() {
  const btn = document.getElementById('save-btn');
  if (pickedNow) {
    btn.classList.add('active');
    btn.textContent = 'Kaydet ✔';
  } else {
    btn.classList.remove('active');
    btn.textContent = 'Kaydet';
  }
}

function saveAnswer() {
  if (!pickedNow) return;
  answers[currentId] = pickedNow;

  // pet_tur değişince soru seti değişir — sonraki cevapları sıfırla
  if (currentId === 'pet_tur') {
    const petTur = pickedNow;
    Object.keys(answers).forEach(k => { if(k !== 'kime' && k !== 'pet_tur') delete answers[k]; });
    answers.pet_tur = petTur;
  }

  // Anne/Baba → cinsiyet otomatik ata; kime değişince diğer cevapları sıfırla
  if (currentId === 'kime') {
    const yeniKime = pickedNow;
    // Tüm cevapları temizle
    Object.keys(answers).forEach(k => delete answers[k]);
    answers.kime = yeniKime;
    if (yeniKime === 'Anne') answers.cinsiyet = 'Kadın';
    else if (yeniKime === 'Baba') answers.cinsiyet = 'Erkek';
  }

  closePopup();
  kartlariBuildEt();
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Progress buton
function updateProgress() {
  const total = aktifSorular.length;
  const count = Object.keys(answers).length;
  const btn = document.getElementById('devam-btn');

  // Dilimler
  const mevcutDilimler = btn.querySelectorAll('.dilim').length;
  if (mevcutDilimler !== total) {
    const label = document.getElementById('devam-label');
    btn.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const d = document.createElement('div');
      d.className = 'dilim';
      btn.appendChild(d);
    }
    const lbl = document.createElement('div');
    lbl.id = 'devam-label';
    btn.appendChild(lbl);
  }

  const dilimler = btn.querySelectorAll('.dilim');
  const cevapSiralari = Object.keys(answers);
  dilimler.forEach((d, i) => {
    d.style.background = i < cevapSiralari.length ? '#2563eb' : '#e5e7eb';
    d.style.borderRight = i < cevapSiralari.length - 1 ? '1px solid rgba(255,255,255,0.5)' : 'none';
  });

  const lbl = document.getElementById('devam-label');
  // Atlanabilir sorular (dogum) hariç zorunlu sayı
  const zorunluTotal = aktifSorular.filter(id => {
    const s = getSoru(id); return !s || !s.atlanabilir;
  }).length;
  const zorunluCount = aktifSorular.filter(id => {
    const s = getSoru(id); return !s || !s.atlanabilir;
  }).filter(id => answers[id]).length;

  if (zorunluCount >= zorunluTotal) {
    const atladiMi = aktifSorular.some(id => {
      const s = getSoru(id); return s && s.atlanabilir && !answers[id];
    });
    lbl.textContent = atladiMi ? 'Devam Et (burç sorusu atlandı) →' : 'Hediyelere Bak! 🎁';
    btn.classList.add('ready');
  } else {
    lbl.textContent = count + ' / ' + total + ' soru cevaplandı';
    btn.classList.remove('ready');
  }
}

function devamEt() {
  const zorunluTotal = aktifSorular.filter(id => {
    const s = getSoru(id); return !s || !s.atlanabilir;
  }).length;
  const zorunluCount = aktifSorular.filter(id => {
    const s = getSoru(id); return !s || !s.atlanabilir;
  }).filter(id => answers[id]).length;
  if (zorunluCount < zorunluTotal) return;
  localStorage.setItem('budurBuldumCevaplar', JSON.stringify(answers));
  window.location.href = 'ozet.html';
}

// Overlay kapat
document.getElementById('popup-overlay').addEventListener('click', function(e) {
  if (e.target === this) closePopup();
});

// Başlat
kartlariBuildEt();
