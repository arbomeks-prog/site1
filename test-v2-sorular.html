<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru Seti V2 | BudurBuldum</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #F9F9F9; font-family: -apple-system, sans-serif; padding: 20px 16px 60px; }
        .max { max-width: 560px; margin: 0 auto; }
        .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg,#e8a838,#f5c96a); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .logo-text { font-family: Georgia, serif; font-size: 18px; font-weight: 900; color: #1e293b; }
        .logo-text span { color: #e8a838; }
        .test-badge { background: #7c3aed; color: white; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        h1 { font-size: 22px; font-weight: 900; color: #1e293b; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }

        .soru-blok { background: white; border-radius: 16px; padding: 18px; margin-bottom: 14px; border: 2px solid #f1f5f9; transition: border-color 0.2s; }
        .soru-blok.cevaplandi { border-color: #bbf7d0; }
        .soru-no { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .soru-metin { font-size: 15px; font-weight: 800; color: #1e293b; margin-bottom: 14px; line-height: 1.4; }
        .secenekler { display: flex; flex-direction: column; gap: 7px; }
        .secenek-btn { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-weight: 600; color: #475569; cursor: pointer; text-align: left; transition: all 0.15s; }
        .secenek-btn:active { transform: scale(0.98); }
        .secenek-btn.secili { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-color: #16a34a; color: #14532d; }
        .ilerleme { position: sticky; bottom: 16px; z-index: 10; }
        .ilerleme-ic { background: white; border-radius: 20px; padding: 14px 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); display: flex; align-items: center; gap: 14px; }
        .ilerleme-bar-wrap { flex: 1; background: #f1f5f9; border-radius: 8px; height: 8px; }
        .ilerleme-bar { background: #16a34a; border-radius: 8px; height: 8px; transition: width 0.3s; }
        .ilerleme-yazi { font-size: 13px; font-weight: 700; color: #475569; white-space: nowrap; }
        .devam-btn { background: #1e40af; color: white; border: none; border-radius: 14px; padding: 12px 22px; font-size: 14px; font-weight: 800; cursor: pointer; white-space: nowrap; opacity: 0.4; pointer-events: none; transition: all 0.2s; }
        .devam-btn.aktif { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>
<div class="max">
    <div class="logo">
        <div class="logo-icon">🎁</div>
        <div class="logo-text">budur<span>buldum</span></div>
        <span class="test-badge">V2</span>
    </div>
    <h1>Soru Seti V2</h1>
    <p class="subtitle">28 soru · Cevapla, özet sayfasına geç, hediyeleri gör</p>

    <div id="sorular-container"></div>

    <div class="ilerleme">
        <div class="ilerleme-ic">
            <div class="ilerleme-bar-wrap">
                <div class="ilerleme-bar" id="ilerleme-bar" style="width:0%"></div>
            </div>
            <span class="ilerleme-yazi" id="ilerleme-yazi">0 / 28</span>
            <button class="devam-btn" id="devam-btn" onclick="devamEt()">Özete Git →</button>
        </div>
    </div>
</div>

<script>
const SORULAR = [
    { id: 'kime', soru: 'Hediye kime alınıyor?', secenekler: ['Anne','Baba','Sevgili (Erkek)','Sevgili (Kadın)','Kardeş (Erkek)','Kardeş (Kadın)','Arkadaş (Erkek)','Arkadaş (Kadın)','İş arkadaşı','Kendisi'] },
    { id: 'cinsiyet', soru: 'Cinsiyeti nedir?', secenekler: ['Erkek','Kadın'] },
    { id: 'yas', soru: 'Yaş aralığı yaklaşık olarak nedir?', secenekler: ['18-24','25-34','35-44','45-54','55-64','65 ve üstü'] },
    { id: 'butce', soru: 'Bütçe aralığı nedir?', secenekler: ['0-500 TL','501-1500 TL','1501-3000 TL','3001-6000 TL','6001 TL ve üstü'] },
    { id: 'dis_gorunus', soru: 'Dış görünüşüne önem verir mi?', secenekler: ['Çok önem verir, her zaman bakımlı ve şık olmaya çalışır','Orta düzeyde önem verir','Pek önem vermez, rahat tarzı sever'] },
    { id: 'giyim_tarzi', soru: 'Giyim-kuşam tarzı genellikle nasıldır?', secenekler: ['Klasik ve şık','Minimalist','Sportif / Casual','Renkli ve dikkat çekici','Modern / Trend','Rahat ve fonksiyonel'] },
    { id: 'renk_ilgi', soru: 'Renklerle arası nasıldır?', secenekler: ['Renkler ve uyumu çok önemlidir','"Olsa da olur, olmasa da olur"','Gri ve siyah tonlarını sever'] },
    { id: 'esya_tercihi', soru: 'Kullandığı eşyalarda tercihi nasıldır?', secenekler: ['Marka ve kaliteli ürünler','Fiyat / Performans odaklı','Özgün ve el yapımı sanatsal','Dayanıklı ve uzun ömürlü ürünler','Çok fonksiyonlu ve kullanışlı ürünler'] },
    { id: 'cevre', soru: 'Çevrecilik ve geri dönüşüm konusunda nasıldır?', secenekler: ['Önceliğidir, çok hassastır','Önem verir ama abartmaz','Pek önem vermez'] },
    { id: 'meslek', soru: 'Mesleği / Günlük uğraşı nedir?', secenekler: ['Ofis / Kurumsal hayat','Yaratıcı işler (tasarım, içerik, sanat)','Teknik / Mühendis / IT','Eğitimci / Öğretmen','Kendi patronu (Esnaf, girişimci)','Emekli','Öğrenci','Henüz karar vermedi'] },
    { id: 'yemek', soru: 'Yemek yapmayı sever mi?', secenekler: ['Mutfağın kralı / kraliçesi, sık sık pişirir','Ara sıra, deneysel keyif alır','"Yemek mi? Sipariş verelim" modunda'] },
    { id: 'dekorasyon', soru: 'Dekorasyona ve eve meraklı mı?', secenekler: ['Evini dergi kapağı yapmaya çalışıyor','Orta düzeyde uğraşır','"Ev işte, yeter ki temiz olsun" der'] },
    { id: 'spor', soru: 'Spor yapıyor mu?', secenekler: ['Düzenli spor yapar (salona üye, 3+ gün)','Ara sıra yapar','Spor yapmaz','Yürüyüş yapmayı sever'] },
    { id: 'seyahat', soru: 'Seyahat ve gezi tarzı nasıl?', secenekler: ['Her tatilde uzak veya yakın seyahate çıkar','Kendi aracıyla gezmeyi çok sever (araba, motor)','Tekne, yat, denizcilikle ilgili aktiviteleri sever','Karavan veya mobil gezmeyi sever','Kamp ve outdoor aktivitelerine bayılır','Doğa yürüyüşü ve trekking sever','Tur ile seyahat etmeyi tercih eder','Seyahat etmeyi pek sevmez, evi sever'] },
    { id: 'hayvan', soru: 'Hayvanlarla ilişkisi nasıldır?', secenekler: ['Çok sever, besler ve mama taşır','Çok sever ve birden fazla hayvan besler','Sever ama beslemez','Pek ilgilenmez'] },
    { id: 'arac', soru: 'Ehliyeti var mı / Araç kullanıyor mu?', secenekler: ['Var ve aktif kullanır','Var ama pek kullanmaz','Yok','Bisikleti var','Elektrikli bisikleti var','Elektrikli scooter kullanıyor'] },
    { id: 'hayat_bakis', soru: 'Genel hayat bakış açısı / mottosu nasıl?', secenekler: ['Disiplinli, düzenli ve geleceğe odaklı','Kazanç ve başarı odaklı','Keyif alma ve zevk odaklı','Huzur ve denge arayan','Pratik ve sonuç odaklı'] },
    { id: 'ihtiyac', soru: 'Şu anda hayatında en çok neye ihtiyacı var?', secenekler: ['Daha fazla zaman','Konfor ve rahatlık','Motivasyon','Rahatlama ve stres atma','Takdir edilme ve hatırlanma','Eğlence ve macera','Düzen ve istikrar'] },
    { id: 'ugur_burc', soru: 'Uğurlar, semboller, fal, tarot, burç, enerji taşları ile ilişkisi nasıl?', secenekler: ['Çok ilgilenir ve kullanır','Meraklıdır ama yüzeysel','Hiç ilgilenmez'] },
    { id: 'inanc', soru: 'İnanç ve spiritüel tarafı nasıldır?', secenekler: ['İnançlı ve önem verir','Manevi konulara meraklı','Agnostik / inançsız','Hiç ilgilenmez'] },
    { id: 'dogal', soru: 'Doğal ve şifalı ürünlere (bitki, fitoterapi, doğal yaşam) ilgisi var mı?', secenekler: ['Evet, çok ilgilenir','Orta düzeyde ilgilenir','İlgilenmez'] },
    { id: 'mevsim', soru: 'Mevsim tercihi nasıldır?', secenekler: ['İlkbaharı sever','Yazı çok sever (çok üşür)','Sonbaharı sever','Kışı çok sever (sıcaklara gelemez)'] },
    { id: 'tamir', soru: 'Tamir, bakım gibi işleri nasıl halleder?', secenekler: ['Kendisi yapmayı sever ve yapar','Basit işleri kendisi, zor olanları ustaya bırakır','Direkt usta veya servise yaptırır'] },
    { id: 'saglik', soru: 'Sağlığına ve fiziksel görünümüne yaklaşımı nasıldır?', secenekler: ['Fit kalmak ve kilo kontrolü çok önemlidir','Sağlıklı beslenmeye özen gösterir','Hayatın zevkini çıkarmayı sever','Hastalanmamaya özen gösterir'] },
    { id: 'teknoloji', soru: 'Teknoloji ve klasik araçlara yaklaşımı nasıldır?', secenekler: ['Teknoloji her zaman önceliklidir','Klasik tarzı (defter, kalem, el aletleri) sever','İkisini bir arada kullanmayı sever'] },
    { id: 'yayin', soru: 'Dizi, film, belgesel izlemek istediğinde hangisini tercih eder?', secenekler: ['Televizyon','Bilgisayar','Tablet','Telefon','Hepsini kullanır'] },
    { id: 'kucuk_esya', soru: 'Günlük hayatta küçük eşyalarda tarzı nasıl?', secenekler: ['Pratik ve kullanışlı şeyleri sever','Şık ve kaliteli olanları tercih eder','Klasik ve geleneksel tarzı sever','Teknolojik ve modern olanları sever','Fark etmez, önemli değil'] },
    { id: 'olmazsa_olmaz', soru: 'Hayatında olmazsa olmazı hangisidir?', secenekler: ['Hijyen','Tertip ve düzen','Zaman yönetimi','Verimlilik ve sonuç almak','Disiplin','Beğenilmek ve takdir edilmek'] }
];

const cevaplar = {};

function render() {
    const container = document.getElementById('sorular-container');
    container.innerHTML = '';
    SORULAR.forEach(function(s, i) {
        const blok = document.createElement('div');
        blok.className = 'soru-blok' + (cevaplar[s.id] ? ' cevaplandi' : '');
        blok.id = 'soru-' + s.id;
        let html = '<div class="soru-no">Soru ' + (i+1) + '</div>';
        html += '<div class="soru-metin">' + s.soru + '</div>';
        html += '<div class="secenekler">';
        s.secenekler.forEach(function(opt) {
            const secili = cevaplar[s.id] === opt ? ' secili' : '';
            html += '<button class="secenek-btn' + secili + '" onclick="sec(\'' + s.id + '\', this)">' + opt + '</button>';
        });
        html += '</div>';
        blok.innerHTML = html;
        container.appendChild(blok);
    });
    guncelle();
}

function sec(id, btn) {
    const blok = document.getElementById('soru-' + id);
    blok.querySelectorAll('.secenek-btn').forEach(function(b) { b.classList.remove('secili'); });
    btn.classList.add('secili');
    cevaplar[id] = btn.textContent;
    blok.classList.add('cevaplandi');
    guncelle();
}

function guncelle() {
    const toplam = SORULAR.length;
    const cevaplanan = Object.keys(cevaplar).length;
    document.getElementById('ilerleme-bar').style.width = Math.round(cevaplanan / toplam * 100) + '%';
    document.getElementById('ilerleme-yazi').textContent = cevaplanan + ' / ' + toplam;
    const devamBtn = document.getElementById('devam-btn');
    // En az ilk 4 soru (kime, cinsiyet, yas, butce) cevaplandıysa devam aktif
    const zorunlu = ['kime','cinsiyet','yas','butce'];
    const zorunluTam = zorunlu.every(function(id) { return !!cevaplar[id]; });
    if (zorunluTam) {
        devamBtn.classList.add('aktif');
    } else {
        devamBtn.classList.remove('aktif');
    }
}

function devamEt() {
    // cevapları localStorage'a yaz — hediyeler.html'in beklediği format
    localStorage.setItem('budurV2Cevaplar', JSON.stringify(cevaplar));
    localStorage.setItem('budurV2AktifSet', 'normal');
    localStorage.setItem('budurV2Tamamlandi', '1');
    var sid = 'test_' + Date.now();
    localStorage.setItem('budurV2SessionId', sid);
    // Önceki kriter seçimini temizle
    localStorage.removeItem('budurV2SelectedCriteria');
    localStorage.removeItem('budurV2SecilenBurc');
    window.location.href = 'test-v2-ozet.html';
}

render();
</script>
</body>
</html>
