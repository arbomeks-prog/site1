<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; gap: 20px; padding: 20px; box-sizing: border-box; }
button { background: #FFD93D; color: #111; border: none; padding: 16px 28px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; max-width: 320px; }
#durum { font-size: 14px; color: #aaa; text-align: center; }
</style>
</head>
<body>
<div id="durum">Butona bas</div>
<button onclick="oku()">🔊 Seslendir</button>

<script>
function oku() {
  if (!window.speechSynthesis) {
    document.getElementById('durum').textContent = 'speechSynthesis desteklenmiyor!';
    return;
  }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance('Babana hediye aldın mı? BudurBuldum dedin mi?');
  u.lang = 'tr-TR';
  u.rate = 1.0;
  u.pitch = 1.0;
  u.onstart = () => document.getElementById('durum').textContent = '▶ Okunuyor...';
  u.onend = () => document.getElementById('durum').textContent = '✓ Bitti';
  u.onerror = (e) => document.getElementById('durum').textContent = 'Hata: ' + e.error;
  window.speechSynthesis.speak(u);
}
</script>
</body>
</html>
