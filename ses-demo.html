<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#111;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;gap:16px;padding:20px;box-sizing:border-box;}
button{background:#FFD93D;color:#111;border:none;padding:16px;border-radius:50px;font-size:17px;font-weight:bold;cursor:pointer;width:100%;max-width:320px;}
#d{font-size:13px;color:#aaa;text-align:center;}
</style>
</head>
<body>
<div id="d">Butona bas</div>
<button id="btn">🔊 Seslendir</button>
<script>
document.getElementById('btn').addEventListener('click', function(){
  if(!window.speechSynthesis){document.getElementById('d').textContent='Desteklenmiyor';return;}
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance('Babana hediye aldın mı? BudurBuldum dedin mi?');
  u.lang='tr-TR';
  u.onstart=function(){document.getElementById('d').textContent='Okunuyor...';};
  u.onend=function(){document.getElementById('d').textContent='Bitti!';};
  u.onerror=function(e){document.getElementById('d').textContent='Hata: '+e.error;};
  window.speechSynthesis.speak(u);
});
</script>
</body>
</html>
