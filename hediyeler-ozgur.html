<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kişiye Özel Hediye Önerileri</title>
<style>
  body { font-family: sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
  .kart { background: #1e293b; border-left: 4px solid #e8a838; border-radius: 16px; padding: 16px; margin-bottom: 20px; }
  .kart-baslik { font-size: 11px; font-weight: 800; color: #e8a838; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .kart-metin { font-size: 14px; line-height: 1.7; color: #e2e8f0; font-style: italic; }
  .btn { width: 100%; padding: 16px; background: #e8a838; color: #1e293b; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; margin-bottom: 20px; }
  .btn:disabled { background: #94a3b8; cursor: not-allowed; }
  .spinner { text-align: center; padding: 40px; font-size: 18px; font-weight: 700; color: #1e40af; }
  .hediye { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .hediye-baslik { font-size: 17px; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
  .hediye-aciklama { font-size: 14px; color: #475569; margin-bottom: 8px; }
  .hediye-fiyat { font-size: 14px; font-weight: 700; color: #e8a838; }
  .platform-linkler { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .plt { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; text-decoration: none; color: white; }
  .plt-ty { background: #f27a1a; }
  .plt-hb { background: #ff6000; }
  .plt-amz { background: #ff9900; color: #111; }
</style>
</head>
<body>

<div class="kart">
  <div class="kart-baslik">🧠 Kişilik Profili</div>
  <div class="kart-metin" id="tahlil-metin">Yükleniyor...</div>
</div>

<button class="btn" id="btn" onclick="hediyeBul()">🎁 Bu profile göre hediye bul</button>

<div id="sonuc"></div>

<script>
const tahlil = localStorage.getItem('budurBuldumKisilikTahlil') || '';
const kime = (() => { try { return JSON.parse(localStorage.getItem('budurBuldumCevaplar') || '{}').kime || ''; } catch(e) { return ''; } })();
const butce = (() => { try { return JSON.parse(localStorage.getItem('budurBuldumCevaplar') || '{}').butce || ''; } catch(e) { return ''; } })();

document.getElementById('tahlil-metin').textContent = tahlil || 'Kişilik tahlili bulunamadı.';

async function hediyeBul() {
  const btn = document.getElementById('btn');
  const sonuc = document.getElementById('sonuc');
  btn.disabled = true;
  sonuc.innerHTML = '<div class="spinner">🎁 Hediyeler hazırlanıyor...</div>';

  const prompt = 'Kime: ' + kime + '\nBütçe: ' + butce + '\nKişilik profili: ' + tahlil + '\n\nBu profile en uygun 9 hediye öner. Her hediye farklı kategoriden olsun.';

  try {
    const res = await fetch('/api/gifts-demo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    const text = data.result || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const hediyeler = JSON.parse(clean);

    sonuc.innerHTML = hediyeler.map(h => `
      <div class="hediye">
        <div class="hediye-baslik">${h.emoji || '🎁'} ${h.name}</div>
        <div class="hediye-aciklama">${h.description || ''}</div>
        <div class="hediye-fiyat">${h.price || ''}</div>
        <div class="platform-linkler">
          <a class="plt plt-ty" href="https://www.trendyol.com/sr?q=${encodeURIComponent(h.searchQuery||h.name)}&st=SEARCH" target="_blank">Trendyol</a>
          <a class="plt plt-hb" href="https://www.hepsiburada.com/ara?q=${encodeURIComponent(h.searchQuery||h.name)}&listing=1" target="_blank">Hepsiburada</a>
          <a class="plt plt-amz" href="https://www.amazon.com.tr/s?k=${encodeURIComponent(h.searchQuery||h.name)}&s=relevancerank" target="_blank">Amazon</a>
        </div>
      </div>
    `).join('');
  } catch(e) {
    sonuc.innerHTML = '<div class="spinner" style="color:red">Hata: ' + e.message + '</div>';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
