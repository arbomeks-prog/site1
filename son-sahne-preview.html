<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Son Sahne Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
}
.frame {
    width: 360px;
    height: 640px;
    background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 60%, #0f172a 100%);
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
}

/* Arka planda renkli kartlar */
.grid-bg {
    position: absolute;
    inset: 0;
    padding: 48px 12px 60px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 5px;
}
.mini-kart {
    border-radius: 8px;
    border: 1.5px solid;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 6px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    padding: 3px;
    text-align: center;
}

/* Overlay */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.58);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
}

.sure {
    font-size: 48px;
    font-weight: 900;
    color: #fbbf24;
    margin-bottom: 16px;
    text-shadow: 0 2px 20px rgba(251,191,36,0.5);
}
.slogan {
    font-size: 22px;
    font-weight: 900;
    color: white;
    line-height: 1.5;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    margin-bottom: 28px;
}
.kalp {
    font-size: 72px;
    filter: drop-shadow(0 6px 20px rgba(239,68,68,0.7));
}

/* Top bar */
.top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 14px 16px 8px;
    display: flex;
    justify-content: space-between;
    z-index: 5;
}
.logo { font-size: 12px; font-weight: 800; color: #fbbf24; letter-spacing: 0.08em; }
.timer { font-size: 13px; color: white; font-weight: 800; }
</style>
</head>
<body>
<div class="frame">
    <div class="top-bar">
        <div class="logo">BUDUR BULDUM</div>
        <div class="timer">⏱ 2:17</div>
    </div>

    <!-- Arka plan: renkli kartlar -->
    <div class="grid-bg" id="grid"></div>

    <!-- Overlay: son sahne -->
    <div class="overlay">
        <div class="sure">2:17</div>
        <div class="slogan">Sevdiğin kişiye<br>2 dakikanı ayır.</div>
        <span class="kalp">❤️</span>
    </div>
</div>

<script>
const renkler = [
    '#f9a8d4','#93c5fd','#6ee7b7','#fcd34d','#c4b5fd',
    '#fdba74','#a5f3fc','#f0abfc','#86efac','#fda4af',
    '#67e8f9','#fef08a','#d9f99d','#bfdbfe','#ddd6fe',
    '#fecdd3','#bbf7d0','#fed7aa','#e9d5ff','#a7f3d0',
    '#fde68a','#c7d2fe','#fbcfe8','#99f6e4','#fef3c7',
    '#f5d0fe','#bae6fd','#dcfce7','#ffe4e6','#fbbf24'
];
const metinler = [
    'Baba','Erkek','26-35','Bilmiyorum','Minimalist',
    'Spor','Doğal','Doğum Günü','Dışarıda','Orta',
    '500-1500₺','Yaz','Çikolata','Ara sıra','Pop',
    'Pek sevmez','Çok','Ara sıra','Kahve','Komedi',
    'Deniyor','Ara sıra','Çok','Ara sıra','Türk',
    '🎁','Çok','Hiç','Dışadönük','Anlamlı'
];
// 5,6,15,16,25,26 indeksler hediye
const hediyeIdx = [4,5,14,15,24,25];

const grid = document.getElementById('grid');
for (let i = 0; i < 30; i++) {
    const k = document.createElement('div');
    k.className = 'mini-kart';
    if (hediyeIdx.includes(i)) {
        k.style.borderColor = '#fbbf24';
        k.style.background = 'linear-gradient(135deg,#1e293b,#0f172a)';
        k.style.boxShadow = '0 0 10px rgba(251,191,36,0.5)';
        k.innerHTML = `<span style="font-size:14px;">🎁</span>`;
    } else {
        k.style.borderColor = renkler[i];
        k.style.background = 'rgba(255,255,255,0.05)';
        k.innerHTML = `<div style="font-size:7px;color:${renkler[i]};font-weight:800;">${i+1}</div><div>${metinler[i]}</div><div style="color:${renkler[i]}">✔</div>`;
    }
    grid.appendChild(k);
}
</script>
</body>
</html>
