<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #0a0f1e;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: linear-gradient(135deg, #0a0f1e 0%, #0f1e35 50%, #0a0f1e 100%);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
  }

  /* Arka plan ışık efektleri */
  .glow-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,168,56,0.12) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    pointer-events: none;
  }
  .glow-2 {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
    bottom: -80px;
    left: -80px;
    pointer-events: none;
  }

  /* Dekoratif çizgi */
  .deco-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #e8a838, transparent);
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 64px;
  }
  .logo-icon {
    width: 54px;
    height: 54px;
    background: linear-gradient(135deg, #e8a838, #f5c96a);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 8px 32px rgba(232,168,56,0.4);
  }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .logo-text span {
    color: #e8a838;
  }

  /* Ana başlık */
  .main-title {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 24px;
    letter-spacing: -2px;
  }
  .main-title .highlight {
    color: #e8a838;
    font-style: italic;
  }

  /* Alt yazı */
  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 64px;
    max-width: 700px;
  }

  /* Platform listesi */
  .platforms {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 64px;
  }
  .platform-pill {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.3px;
  }

  /* Ayırıcı */
  .divider {
    width: 60px;
    height: 2px;
    background: #e8a838;
    margin-bottom: 40px;
    border-radius: 2px;
  }

  /* CTA */
  .cta {
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
  }
  .cta .domain {
    color: #e8a838;
    font-size: 24px;
    letter-spacing: 1px;
    text-transform: lowercase;
    display: block;
    margin-top: 6px;
  }

  /* Dekoratif nokta */
  .dot-grid {
    position: absolute;
    bottom: 60px;
    right: 60px;
    display: grid;
    grid-template-columns: repeat(5,1fr);
    gap: 8px;
    opacity: 0.15;
  }
  .dot {
    width: 4px;
    height: 4px;
    background: #e8a838;
    border-radius: 50%;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="deco-line"></div>

  <div class="logo">
    <div class="logo-icon">🎁</div>
    <div class="logo-text">budur<span>buldum</span></div>
  </div>

  <h1 class="main-title">
    Ne alacağını<br>
    <span class="highlight">bil,</span> sonra git al.
  </h1>

  <p class="subtitle">
    Seni tanıyarak önerir,<br>
    sen sadece seçersin.
  </p>

  <div class="platforms">
    <div class="platform-pill">Trendyol</div>
    <div class="platform-pill">Hepsiburada</div>
    <div class="platform-pill">Amazon</div>
    <div class="platform-pill">Çiçeksepeti</div>
    <div class="platform-pill">n11</div>
  </div>

  <div class="divider"></div>

  <div class="cta">
    ücretsiz · 2 dakika · hemen dene
    <span class="domain">budurbuldum.com</span>
  </div>

  <div class="dot-grid">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>
</body>
</html>
