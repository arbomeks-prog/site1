<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kutu Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #f8fafc; }

  .page-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 16px;
    border: 3px solid #6366f1;
  }

  h1.baslik {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    color: #0f172a;
    margin-bottom: 20px;
    border: 2px dashed #a855f7;
    padding: 8px;
    min-height: 60px;
  }

  .satir {
    display: grid;
    grid-template-columns: minmax(0, 3fr) 160px;
    gap: 20px;
    align-items: start;
    border: 2px solid #f59e0b;
  }

  .paragraf {
    border: 2px solid #22c55e;
    min-height: 400px;
    padding: 12px;
  }

  .quiz-bolum {
    border: 2px solid #ef4444;
    min-height: 400px;
    padding: 8px;
  }

  .kutu-no {
    font-size: 11px;
    font-weight: 800;
    color: #94a3b8;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<div class="page-wrap">

  <h1 class="baslik"><span class="kutu-no">1 — BAŞLIK</span></h1>

  <div class="satir">
    <div class="paragraf">
      <div class="kutu-no">2 — SOL (MAKALE)</div>
    </div>
    <div class="quiz-bolum">
      <div class="kutu-no">3 — SAĞ (QUIZ)</div>
    </div>
  </div>

</div>
</body>
</html>
