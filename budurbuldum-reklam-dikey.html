<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudurBuldum — Dikey Reklam</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; gap: 12px; padding: 16px; }
.kare { width: 100%; max-width: 390px; aspect-ratio: 9/16; position: relative; overflow: hidden; border-radius: 4px; }
.kare img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
.overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.88) 100%); }
.ust { position: absolute; top: 20px; left: 20px; }
.ust-badge { background: #e8a838; color: #0a0a0a; font-size: 14px; font-weight: 900; padding: 7px 16px; border-radius: 50px; }
.alt { position: absolute; bottom: 28px; left: 20px; right: 20px; }
.pilllar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.pill { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3); border-radius: 50px; padding: 5px 13px; font-size: 12px; color: #fff; font-weight: 700; }
.baslik { font-size: 34px; font-weight: 900; color: #ffffff; line-height: 1.1; letter-spacing: -0.5px; margin-bottom: 20px; text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
.baslik span { color: #e8a838; }
.alt-row { display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 19px; font-weight: 900; color: #ffffff; font-family: Georgia, serif; }
.logo span { color: #e8a838; }
.cta { background: #e8a838; color: #0a0a0a; font-size: 14px; font-weight: 900; padding: 12px 22px; border-radius: 50px; }
.kontrol { display: flex; gap: 8px; width: 100%; max-width: 390px; }
.btn { flex: 1; background: #1e293b; color: #f1f5f9; border: none; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn.altin { background: #e8a838; color: #0a0a0a; }
.durum { color: #555; font-size: 11px; text-align: center; }
</style>
</head>
<body>

<div class="kare" id="kare">
  <img id="foto" src="" alt="" crossorigin="anonymous">
  <div class="overlay"></div>
  <div class="ust"><div class="ust-badge">500 TL bütçe</div></div>
  <div class="alt">
    <div class="pilllar">
      <div class="pill">100 hediye</div>
      <div class="pill">6 soru</div>
      <div class="pill">Ücretsiz</div>
    </div>
    <div class="baslik">Doğru hediyeyi<br>bul. <span>Hemen.</span></div>
    <div class="alt-row">
      <div class="logo">budur<span>buldum</span>.com</div>
      <div class="cta">Dene →</div>
    </div>
  </div>
</div>

<div class="durum" id="durum">Yükleniyor...</div>

<div class="kontrol">
  <button class="btn" onclick="yeniGorsel()">🔄 Yeni görsel</button>
  <button class="btn altin" onclick="kaydal()">💾 Kaydet</button>
</div>

<script>
var API_KEY = 'A9apBPB9nWNWqYz5kevuQshKmKzFIwWHXBnj8nO1zot6LKpm3sq7j7mB';
var sorgular = [
  'beautiful couple gift surprise happy',
  'handsome man giving flowers girlfriend happy',
  'romantic couple birthday celebration',
  'attractive couple anniversary gift smiling',
  'young couple surprise gift love happy',
  'brunette woman smiling happy elegant',
  'mediterranean woman celebration happy',
  'dark hair beautiful woman party',
  'young brunette woman gift flowers happy'
];
var sayac = 0;
var mevcutFoto = null;

function gorselCek() {
  var sorgu = sorgular[sayac % sorgular.length];
  sayac++;
  document.getElementById('durum').textContent = 'Yükleniyor...';
  fetch('https://api.pexels.com/v1/search?query=' + encodeURIComponent(sorgu) + '&per_page=15&orientation=portrait', {
    headers: { Authorization: API_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.photos && d.photos.length > 0) {
      var i = Math.floor(Math.random() * d.photos.length);
      mevcutFoto = d.photos[i];
      document.getElementById('foto').src = mevcutFoto.src.large2x;
      document.getElementById('durum').textContent = 'Fotograf: ' + mevcutFoto.photographer + ' (Pexels)';
    } else {
      document.getElementById('durum').textContent = 'Gorsel bulunamadi, tekrar dene';
    }
  })
  .catch(function(e) { document.getElementById('durum').textContent = 'Hata: ' + e.message; });
}

function yeniGorsel() { gorselCek(); }

function kaydal() {
  document.getElementById('durum').textContent = 'Görsele uzun bas → Resmi kaydet';
}

gorselCek();
</script>
</body>
</html>
