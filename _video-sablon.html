<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow: hidden; width: 100%; height: 100%; }
body { background: #0d0d1a; }
canvas { position: fixed; top: 0; left: 0; width: 100% !important; height: 100% !important; touch-action: none; z-index: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- SES DOSYALARI — değiştir -->
<audio id="ses-fon" src="BURAYA_FON_MUZIK.mp3" preload="auto" loop></audio>
<audio id="ses-efekt1" src="BURAYA_EFEKT1.mp3" preload="auto"></audio>
<audio id="ses-efekt2" src="BURAYA_EFEKT2.mp3" preload="auto"></audio>

<!-- PLAY BUTONU — dokunmadan bırak -->
<div id="startBtn" onclick="document.getElementById('startBtn').style.display='none'; baslatHerSey();" style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; z-index:9999; pointer-events:all; background:rgba(0,0,0,0.6);">
  <div style="width:72px; height:72px; border-radius:50%; background:rgba(255,217,61,0.92); display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 12px rgba(255,217,61,0.18),0 0 0 24px rgba(255,217,61,0.08); cursor:pointer;">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="#0f0f14"><polygon points="5,3 19,12 5,21"/></svg>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ---- SABIT DEĞERLER — ihtiyaca göre değiştir ----
const ZEMIN = () => H * 0.72;
const TL = () => W * 0.38; // sol karakter x
const TR = () => W * 0.62; // sağ karakter x

// ---- PEXELS API — hediye görseli için ----
const PEXELS_KEY = 'A9apBPB9nWNWqYz5kevuQshKmKzFIwWHXBnj8nO1zot6LKpm3sq7j7mB';

// ---- FRAME SAYACI ----
let frame = 0;

// ---- SES UNLOCK ----
let sesUnlocked = false;
function sesCoz() {
  if (sesUnlocked) return;
  sesUnlocked = true;
  if (window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    window.speechSynthesis.speak(u);
  }
}

// ---- PEXELS GÖRSELLERİ ÖNCEDEN YÜKLE ----
// HEDIYELER dizisini doldur: [{isim, fiyat, query}]
const HEDIYELER = [
  // {isim:'Akıllı Saat', fiyat:'₺2.499', query:'smart watch men wrist'},
];

window._onYuklenenImglar = {};
function gorsellerOnYukle() {
  HEDIYELER.forEach((h, i) => {
    fetch("https://api.pexels.com/v1/search?query="+encodeURIComponent(h.query)+"&per_page=1&orientation=landscape",
      {headers:{Authorization:PEXELS_KEY}})
    .then(r=>r.json()).then(d=>{
      if(d.photos&&d.photos[0]){
        const img=new Image();
        img.crossOrigin='anonymous'; // ŞART — yoksa canvas tainted olur
        img.onload = () => { window._onYuklenenImglar[i]=img; };
        img.src=d.photos[0].src.small;
      }
    }).catch(()=>{});
  });
}

// ---- DRAW FONKSİYONU — içeriği buraya çiz ----
function draw() {
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, H);
  ctx.clip();

  // Zemin
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  // BURAYA ANİMASYON KODUNU YAZ

  ctx.restore();
}

// ---- UPDATE FONKSİYONU — her frame güncelle ----
function update() {
  frame++;
  // BURAYA DURUM GÜNCELLEMELERİNİ YAZ
}

// ---- LOOP ----
function loop() { update(); draw(); requestAnimationFrame(loop); }

// ---- KAYIT SİSTEMİ — dokunmadan bırak ----
let _kayitDurdu = false;
function kayitBaslat() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const dest = audioCtx.createMediaStreamDestination();

    // Kayda dahil edilecek ses elementleri
    ['ses-fon','ses-efekt1','ses-efekt2'].forEach(id => {
      try {
        const el = document.getElementById(id);
        if (!el) return;
        const src = audioCtx.createMediaElementSource(el);
        src.connect(dest);
        src.connect(audioCtx.destination);
      } catch(e) {}
    });

    const videoStream = canvas.captureStream(30);
    const audioTrack = dest.stream.getAudioTracks()[0];
    if (audioTrack) videoStream.addTrack(audioTrack);

    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
      ? 'video/webm;codecs=vp9,opus'
      : 'video/webm';

    const recorder = new MediaRecorder(videoStream, { mimeType });
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'video.webm'; a.click();
      URL.revokeObjectURL(url);
    };
    recorder.start(100);
    window._recorder = recorder;
  } catch(e) { console.log('Kayıt başlatılamadı:', e); }
}

// Kaydı durdur — animasyon bitince çağır
function kayitDurdur() {
  if (!_kayitDurdu && window._recorder && window._recorder.state === 'recording') {
    _kayitDurdu = true;
    setTimeout(() => { window._recorder.stop(); }, 20000); // 20sn sonra dur
  }
}

// ---- BAŞLAT — dokunmadan bırak ----
function baslatHerSey() {
  sesCoz();
  gorsellerOnYukle();

  // Sesleri başlat
  const fon = document.getElementById('ses-fon');
  if (fon) { fon.volume = 0.8; fon.currentTime = 0; fon.play().catch(()=>{}); }

  kayitBaslat();
  loop();
}

// Script bitti, butonu göster
document.getElementById('startBtn').style.display = 'flex';
</script>
</body>
</html>
