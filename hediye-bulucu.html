<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#141720;font-family:'Segoe UI',system-ui,sans-serif;color:#e8eaf0;padding-bottom:90px;}

/* HEADER */
.header{background:#141720;border-bottom:1px solid rgba(255,255,255,0.07);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#e8a838,#f5c96a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-txt{font-family:Georgia,serif;font-size:16px;font-weight:900;color:#e8eaf0;}
.logo-txt span{color:#e8a838;}

/* PROGRESS */
.prog-wrap{background:#141720;border-bottom:1px solid rgba(255,255,255,0.05);padding:8px 16px 10px;position:sticky;top:53px;z-index:40;}
.prog-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;margin-bottom:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,#e8a838,#f5c96a);border-radius:99px;transition:width .4s ease;}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;font-weight:600;}
.prog-grup{color:#e8a838;}
.prog-sayac{color:#4f5b73;}

/* SORULAR LİSTESİ */
.liste{padding:10px 12px;}

/* TEK SORU KARTI — kapalı */
.soru-wrap{margin-bottom:8px;border-radius:14px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.10);background:#1e2432;transition:border-color .15s;}
.soru-wrap.acik{border-color:#e8a838;}
.soru-wrap.tamam{border-color:rgba(16,185,129,0.6);}
.soru-wrap.kilitli{opacity:.25;pointer-events:none;}

.soru-baslik{display:flex;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.soru-gorsel{width:80px;min-width:80px;height:68px;display:flex;align-items:center;justify-content:center;font-size:24px;background:#252c3b;flex-shrink:0;}
.soru-govde{padding:12px;flex:1;min-width:0;}
.soru-etiket{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;color:#4f5b73;}
.soru-wrap.acik .soru-etiket{color:#ba7517;}
.soru-wrap.tamam .soru-etiket{color:#10b981;}
.soru-metin{font-size:14px;font-weight:500;color:#e8eaf0;line-height:1.3;}
.soru-cevap-tag{display:none;margin-top:5px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;width:fit-content;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.soru-wrap.tamam .soru-cevap-tag{display:inline-block;background:rgba(16,185,129,0.15);color:#10b981;}
.soru-ok{padding:0 14px;font-size:18px;color:#4f5b73;flex-shrink:0;transition:transform .2s;}
.soru-wrap.acik .soru-ok{transform:rotate(90deg);color:#e8a838;}

/* SEÇENEKLER (accordion) */
.secenekler-wrap{display:none;padding:4px 12px 14px;border-top:0.5px solid rgba(255,255,255,0.08);}
.soru-wrap.acik .secenekler-wrap{display:block;}
.espri-not{font-size:11px;color:#4f5b73;font-style:italic;padding:8px 2px 4px;}
.secenekler{display:flex;flex-direction:column;gap:7px;}
.sec-btn{display:flex;align-items:center;gap:12px;background:#252c3b;border:0.5px solid rgba(255,255,255,0.10);border-radius:10px;padding:12px 14px;font-size:14px;font-weight:400;color:#e8eaf0;cursor:pointer;transition:all .12s;text-align:left;width:100%;-webkit-tap-highlight-color:transparent;}
.sec-btn:active{transform:scale(.97);}
.sec-btn.secildi{background:rgba(16,185,129,0.15);border:0.5px solid rgba(16,185,129,0.5);color:#10b981;}
.sec-emoji{font-size:16px;min-width:22px;text-align:center;flex-shrink:0;}
.sec-label{flex:1;}
.sec-chk{width:20px;height:20px;min-width:20px;border-radius:5px;border:1px solid rgba(255,255,255,0.15);background:transparent;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;}
.sec-btn.secildi .sec-chk{background:#10b981;border-color:#10b981;color:white;}

/* SABİT ALT BUTON */
.alt-bar{position:fixed;bottom:0;left:0;right:0;background:#141720;border-top:1px solid rgba(255,255,255,0.07);padding:10px 14px 14px;z-index:50;}
.devam-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;background:#1e2432;color:#4f5b73;}
.devam-btn.hazir{background:linear-gradient(135deg,#e8a838,#d97706);color:#141720;cursor:pointer;}
.devam-btn.hazir:active{transform:scale(.98);}
</style>

// DURUM
// ============================================================
const cevaplar = {};
let acikId = null;

// ============================================================
// YARDIMCI FONKSİYONLAR
// ============================================================
function getSoruSeti(kime) {
  const map = {'Bebek ❤️':'soruBebekler','Çocuk 🧒':'soruCocuklar','Pet ❤️':'soruPetler'};
  return map[kime] || 'sorular';
}

function getPetSeti(petTur) {
  if (!petTur) return 'soruPetler';
  if (petTur.includes('Kedi')) return 'soruKedi';
  if (petTur.includes('Köpek')) return 'soruKopek';
  if (petTur.includes('Kuş')) return 'soruKus';
  if (petTur.includes('Balık')) return 'soruBalik';
  return 'soruKucukPet';
}

function hesaplaAktifSorular() {
  const kime = cevaplar.kime || '';
  let setAdi = getSoruSeti(kime);
  if (kime === 'Pet ❤️' && cevaplar.pet_tur) setAdi = getPetSeti(cevaplar.pet_tur);
  let ids = (QUIZ_CONFIG[setAdi] || QUIZ_CONFIG.sorular).map(s => s.id);
  if (['Anne','Baba'].includes(kime)) ids = ids.filter(id => id !== 'cinsiyet');
  if (kime === 'Kardeş') ids = ids.filter(id => id !== 'dogum');
  return ids;
}

function getSoru(id) {
  if (id === 'dogum') return {id:'dogum',soru:'Burcu nedir?',secenekler:BURCLAR.map(b=>b.l),atlanabilir:true};
  if (id === 'makyaj' && cevaplar.cinsiyet === 'Erkek') {
    return {id:'makyaj',soru:'Bakım / cilt ürünlerine ilgisi var mı?',secenekler:['Çok var','Orta','Yok']};
  }
  const setler = ['sorular','soruBebekler','soruCocuklar','soruPetler','soruKedi','soruKopek','soruKus','soruBalik','soruKucukPet'];
  for (const s of setler) {
    const f = (QUIZ_CONFIG[s]||[]).find(q=>q.id===id);
    if (f) return f;
  }
  return null;
}

function isKilitli(id) {
  const kime = cevaplar.kime || '';
  if (id === 'cinsiyet' && ['Anne','Baba','Bebek ❤️','Pet ❤️'].includes(kime)) return true;
  if (id === 'dogum' && ['Bebek ❤️','Çocuk 🧒','Pet ❤️','Kardeş'].includes(kime)) return true;
  return false;
}

function getSecenekler(id) {
  const soru = getSoru(id);
  if (!soru) return [];
  let secs = id === 'dogum' ? BURCLAR.map(b=>b.l) : [...soru.secenekler];
  if (id === 'cinsiyet') {
    const filtre = QUIZ_CONFIG.cinsiyetFiltreleri && QUIZ_CONFIG.cinsiyetFiltreleri[cevaplar.kime||''];
    if (Array.isArray(filtre)) secs = secs.filter(s=>filtre.includes(s));
  }
  if (id === 'yas') {
    const kime = cevaplar.kime||'';
    const cinsiyet = cevaplar.cinsiyet||'';
    let key = kime;
    if (kime==='Kardeş'&&(cinsiyet==='Kız Çocuğu'||cinsiyet==='Erkek Çocuğu')) key='Kardeş_cocuk';
    const filtre = QUIZ_CONFIG.yasFiltreleri && QUIZ_CONFIG.yasFiltreleri[key];
    if (Array.isArray(filtre)) secs = secs.filter(s=>filtre.includes(s));
  }
  return secs;
}

function getSecRenk(id, label, idx) {
  if (id === 'dogum') {
    const b = BURCLAR.find(x=>x.l===label);
    if (b) return b;
  }
  const secKey = (id==='makyaj'&&cevaplar.cinsiyet==='Erkek') ? 'makyaj_erkek' : id;
  const liste = ESPRI_SECENEKLER[secKey] || ESPRI_SECENEKLER[id];
  if (liste) {
    const f = liste.find(o=>o.l===label);
    if (f) return f;
  }
  return OPT_RENKLER[idx % OPT_RENKLER.length];
}

function getCevapRenk(id, cevap) {
  return getSecRenk(id, cevap, getSecenekler(id).indexOf(cevap));
}

function getEtiket(id) {
  const gruplar = {
    kime:'Temel bilgi', cinsiyet:'Temel bilgi', dogum:'Temel bilgi', yas:'Temel bilgi', amac:'Temel bilgi',
    tarz:'Kişilik & tarz', hobiler:'Kişilik & tarz', renk:'Kişilik & tarz', ortam:'Kişilik & tarz', kisilik:'Kişilik & tarz',
    teknoloji:'Günlük hayat', butce:'Bütçe', mevsim:'Günlük hayat', tatli:'Günlük hayat',
    spor:'Günlük hayat', muzik:'Zevkler', hayvan:'Zevkler', seyahat:'Zevkler',
    kitap:'Zevkler', kahve:'Günlük hayat', film:'Zevkler', bitki:'Günlük hayat',
    oyun:'Zevkler', makyaj:'Stil', aksesuar:'Stil', mutfak:'Günlük hayat',
    doga:'Zevkler', sanat:'Zevkler', foto:'Zevkler', oncelik:'Öncelik',
  };
  return gruplar[id] || 'Detay';
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const aktifIds = hesaplaAktifSorular();
  const tumIds = aktifIds.includes('kime') ? aktifIds : ['kime', ...aktifIds];
  const liste = document.getElementById('liste');
  liste.innerHTML = '';

  tumIds.forEach((id, idx) => {
    const soru = getSoru(id);
    if (!soru) return;
    const cevap = cevaplar[id];
    const acik = acikId === id;
    const kilitli = isKilitli(id);
    const secenekler = getSecenekler(id);

    const wrap = document.createElement('div');
    let wrapClass = 'soru-wrap';
    if (acik) wrapClass += ' acik';
    else if (cevap) wrapClass += ' tamam';
    if (kilitli) wrapClass += ' kilitli';
    wrap.className = wrapClass;

    // BAŞLIK
    const baslik = document.createElement('div');
    baslik.className = 'soru-baslik';
    baslik.onclick = () => {
      if (kilitli) return;
      acikId = (acikId === id) ? null : id;
      render();
      if (acikId === id) {
        setTimeout(() => {
          wrap.scrollIntoView({behavior:'smooth', block:'nearest'});
        }, 50);
      }
    };

    const gorselRenk = cevap ? getCevapRenk(id, cevap) : null;
    const cevapTagStyle = gorselRenk
      ? `background:${gorselRenk.bg};color:${gorselRenk.tx};border:1.5px solid ${gorselRenk.br}`
      : '';

    baslik.innerHTML = `
      <div class="soru-gorsel">${KART_EMOJI[id] || '❓'}</div>
      <div class="soru-govde">
        <div class="soru-etiket">${cevap ? '✔ Cevaplandı' : acik ? 'Seçin' : getEtiket(id)}</div>
        <div class="soru-metin">${soru.soru}</div>
        ${cevap ? `<div class="soru-cevap-tag" style="${cevapTagStyle}">${cevap}</div>` : ''}
      </div>
      <div class="soru-ok">›</div>
    `;
    wrap.appendChild(baslik);

    // SEÇENEKLER
    if (acik) {
      const secDiv = document.createElement('div');
      secDiv.className = 'secenekler-wrap';
      secDiv.innerHTML = `<div class="espri-not">${ESPRI_MAP[id] || ''}</div>`;
      const secListDiv = document.createElement('div');
      secListDiv.className = 'secenekler';

      secenekler.forEach((label, si) => {
        const r = getSecRenk(id, label, si);
        const secildi = cevaplar[id] === label;
        const btn = document.createElement('button');
        btn.className = 'sec-btn' + (secildi ? ' secildi' : '');
        btn.innerHTML = `
          <span class="sec-emoji">${r.e || ''}</span>
          <span class="sec-label">${label}</span>
          <span class="sec-chk">${secildi ? '✔' : ''}</span>
        `;
        btn.onclick = () => {
          // Kime değişince sıfırla
          if (id === 'kime') {
            Object.keys(cevaplar).forEach(k => { if(k !== 'kime') delete cevaplar[k]; });
            cevaplar.kime = label;
            if (label === 'Anne') cevaplar.cinsiyet = 'Kadın';
            else if (label === 'Baba') cevaplar.cinsiyet = 'Erkek';
          } else if (id === 'pet_tur') {
            Object.keys(cevaplar).forEach(k => {
              if (!['kime','pet_tur'].includes(k)) delete cevaplar[k];
            });
            cevaplar.pet_tur = label;
          } else {
            cevaplar[id] = label;
          }
          acikId = null;
          render();
          updateProgress();
        };
        secListDiv.appendChild(btn);
      });

      secDiv.appendChild(secListDiv);
      wrap.appendChild(secDiv);
    }

    liste.appendChild(wrap);
  });

  updateProgress();
}

// ============================================================
// PROGRESS & DEVAM
// ============================================================
function updateProgress() {
  const aktifIds = hesaplaAktifSorular();
  const tumIds = aktifIds.includes('kime') ? aktifIds : ['kime', ...aktifIds];
  const zorunlu = tumIds.filter(id => !isKilitli(id));
  const cevaplandi = zorunlu.filter(id => cevaplar[id]).length;
  const toplam = zorunlu.length;
  const yuzde = toplam > 0 ? Math.round((cevaplandi / toplam) * 100) : 0;

  document.getElementById('prog-fill').style.width = yuzde + '%';
  document.getElementById('prog-sayac').textContent = cevaplandi + ' / ' + toplam + ' soru';

  const kime = cevaplar.kime || '';
  const setAdi = getSoruSeti(kime);
  const setLabelMap = {
    sorular:'Normal akış', soruBebekler:'Bebek akışı', soruCocuklar:'Çocuk akışı',
    soruPetler:'Pet akışı', soruKedi:'Kedi akışı', soruKopek:'Köpek akışı',
    soruKus:'Kuş akışı', soruBalik:'Balık akışı', soruKucukPet:'Küçük pet akışı',
  };
  document.getElementById('prog-grup').textContent = kime
    ? (kime + ' — ' + (setLabelMap[setAdi] || ''))
    : 'Hediye Bulucu';

  const btn = document.getElementById('devam-btn');
  const zorunluTum = zorunlu.filter(id => {
    const s = getSoru(id); return !s || !s.atlanabilir;
  });
  const zorunluCevaplandi = zorunluTum.filter(id => cevaplar[id]).length;
  const hazir = zorunluCevaplandi >= zorunluTum.length && zorunluTum.length > 0;

  if (hazir) {
    btn.className = 'devam-btn hazir';
    const atlananVar = zorunlu.some(id => {
      const s = getSoru(id); return s && s.atlanabilir && !cevaplar[id];
    });
    btn.textContent = atlananVar ? 'Devam Et (burç sorusu atlandı) →' : '🎁 Hediyeleri Gör!';
  } else {
    btn.className = 'devam-btn';
    btn.textContent = cevaplandi === 0 ? 'Soruları cevaplayın' : cevaplandi + ' soru cevaplandı, devam edin...';
  }
}

function devamEt() {
  const aktifIds = hesaplaAktifSorular();
  const tumIds = aktifIds.includes('kime') ? aktifIds : ['kime', ...aktifIds];
  const zorunlu = tumIds.filter(id => !isKilitli(id));
  const zorunluTum = zorunlu.filter(id => {
    const s = getSoru(id); return !s || !s.atlanabilir;
  });
  const hazir = zorunluTum.every(id => cevaplar[id]);
  if (!hazir) return;

  localStorage.setItem('budurBuldumCevaplar', JSON.stringify(cevaplar));
  const kriterler = Object.keys(cevaplar).slice(0,6).map((id,i) => ({id, grup: i < 3 ? 'A' : 'B'}));
  localStorage.setItem('budurBuldumSelectedCriteria', JSON.stringify(kriterler));
  localStorage.setItem('budurBuldumSecilenBurc', cevaplar.dogum || '');
  window.location.href = 'ozet.html';
}

// Önceden kaydedilmiş cevapları temizle (temiz başlangıç)
if (typeof QuizHelper !== 'undefined') QuizHelper.resetCevaplar();

render();
updateProgress();
</script>
