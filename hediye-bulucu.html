<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hediye Dedektifi | BudurBuldum</title>
<meta name="description" content="Kişiye özel hediye bulmak için 30 soruluk dedektif testi. Eğlenceli, hızlı ve kişisel.">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="config.js"></script>
<style>
* { box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#eef2ff; margin:0; }

/* KART */
.kart {
  cursor:pointer; position:relative;
  border-radius:20px; padding:14px;
  border:2px solid transparent;
  transition:transform .15s, box-shadow .15s;
}
.kart:active { transform:scale(.96); }
.kart::after {
  content:'☐'; position:absolute; top:10px; right:12px;
  font-size:18px; color:#d1d5db; line-height:1;
}
.kart.cevaplandi::after { content:'✔'; color:#2563eb; font-size:16px; }

.kart-emoji { font-size:1.6rem; margin-bottom:6px; display:block; }
.kart-soru { font-weight:900; line-height:1.3; }
.kart-espri { color:#9ca3af; font-size:.72rem; margin-top:4px; }
.kart-cevap-tag {
  display:none; margin-top:8px;
  font-size:.72rem; font-weight:800;
  border-radius:10px; padding:3px 8px;
  width:fit-content; max-width:100%;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.kart.cevaplandi .kart-cevap-tag { display:block; }

/* GRUP BAŞLIĞI */
.grup-baslik {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px 8px;
  font-size:.78rem; font-weight:900;
  color:#6366f1; letter-spacing:.06em; text-transform:uppercase;
}
.grup-baslik-cizgi {
  flex:1; height:2px; background:linear-gradient(90deg,#e0e7ff,transparent);
  border-radius:99px;
}

/* MİNİ HEDİYE KUTUSU */
.mini-hediye-wrap {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  padding:12px 12px 4px;
  opacity:0; pointer-events:none;
  transition:opacity .5s;
}
.mini-hediye-wrap.goster { opacity:1; pointer-events:auto; }
.mini-hediye {
  background:white; border-radius:16px;
  overflow:hidden; position:relative;
  box-shadow:0 4px 14px rgba(0,0,0,0.1);
  transition:transform .2s;
  min-height:90px;
  display:flex; flex-direction:column;
}
.mini-hediye:active { transform:scale(.97); }
.mini-hediye .mh-img {
  width:100%; height:60px; object-fit:cover;
  background:#f1f5f9;
}
.mini-hediye .mh-body { padding:8px 10px; flex:1; }
.mini-hediye .mh-spinner {
  width:22px; height:22px; border:3px solid #e2e8f0;
  border-top-color:#6366f1; border-radius:50%;
  animation:spin .7s linear infinite;
  margin:10px auto;
}
.mini-hediye .mh-name {
  font-size:.78rem; font-weight:800; color:#1e293b;
  line-height:1.3; min-height:16px;
  background:#f1f5f9; border-radius:6px;
}
.mini-hediye .mh-name.yuklu { background:transparent; }
.mini-hediye .mh-price {
  font-size:.72rem; color:#d97706; font-weight:700;
  margin-top:3px; min-height:12px;
}
.mini-hediye .mh-star {
  position:absolute; top:6px; left:6px;
  background:#f59e0b; color:white;
  font-size:.6rem; font-weight:900;
  padding:2px 6px; border-radius:99px;
  display:none;
}
.mini-hediye.yildiz .mh-star { display:block; }
.mini-hediye .mh-links {
  display:flex; flex-wrap:wrap; gap:3px;
  padding:0 8px 8px;
}
.mh-link {
  font-size:.6rem; font-weight:700; padding:2px 6px;
  border-radius:6px; text-decoration:none; transition:.15s;
}
.mh-link:active { opacity:.7; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ARA YÜKLENİYOR */
.ara-yukluyor {
  text-align:center; padding:10px 0 4px;
  font-size:.75rem; font-weight:700; color:#6366f1;
  display:none;
}
.ara-yukluyor.goster { display:block; }

/* TÜMLERE BAK BUTONU */
#tumler-btn-wrap {
  padding:16px 12px 80px;
  opacity:0; pointer-events:none; transition:opacity .5s;
}
#tumler-btn-wrap.goster { opacity:1; pointer-events:auto; }
#tumler-btn {
  width:100%; padding:16px; border:none; border-radius:99px;
  background:linear-gradient(135deg,#6366f1,#2563eb);
  color:white; font-size:1.05rem; font-weight:900;
  cursor:pointer; box-shadow:0 8px 24px rgba(99,102,241,.4);
  transition:transform .15s;
}
#tumler-btn:active { transform:scale(.97); }

/* DEVAM BUTONU (SABIT ALT) */
#devam-wrap {
  position:fixed; bottom:0; left:50%;
  transform:translateX(-50%);
  width:100%; max-width:480px;
  padding:10px 12px 14px;
  background:white;
  box-shadow:0 -2px 12px rgba(0,0,0,0.08);
  z-index:50;
}
#devam-btn {
  width:100%; height:52px; border-radius:99px;
  border:none; cursor:pointer; overflow:hidden;
  display:flex; position:relative;
}
.dilim { flex:1; height:100%; background:#e5e7eb; transition:background .3s; }
#devam-label {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:800; color:#1e3a8a;
  pointer-events:none; letter-spacing:.3px;
}
#devam-btn.hazir #devam-label { color:white; text-shadow:0 1px 3px rgba(0,0,0,.3); }

/* POPUP */
#popup-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.55); z-index:100;
  align-items:flex-end; justify-content:center;
  padding:0 0 0;
}
#popup-overlay.acik { display:flex; }
#popup-box {
  background:white; border-radius:28px 28px 0 0;
  padding:20px 16px 32px;
  width:100%; max-width:480px;
  max-height:82vh; overflow-y:auto;
  transform:translateY(100%); opacity:0;
  transition:transform .3s cubic-bezier(.32,1.1,.42,1), opacity .2s;
}
#popup-overlay.acik #popup-box { transform:translateY(0); opacity:1; }
#popup-handle { width:40px; height:4px; background:#e5e7eb; border-radius:99px; margin:0 auto 16px; }
#popup-title { font-size:1.05rem; font-weight:900; margin-bottom:3px; padding-right:24px; }
#popup-espri { font-size:.76rem; color:#6b7280; margin-bottom:14px; }
#popup-secenekler { display:flex; flex-wrap:wrap; gap:8px; }

.opt {
  border:2px solid; border-radius:20px; font-weight:700;
  cursor:pointer; transition:.15s;
  display:inline-flex; align-items:center; gap:5px;
  line-height:1.3;
}
.opt:active { transform:scale(.93); }
.opt.secildi { filter:brightness(.82); }
.opt .opt-tick { display:none; font-size:.8em; }
.opt.secildi .opt-tick { display:inline; }

.opt-xs { font-size:.74rem; padding:6px 14px; }
.opt-sm { font-size:.80rem; padding:8px 18px; }
.opt-md { font-size:.88rem; padding:10px 22px; }
.opt-lg { font-size:.95rem; padding:11px 26px; border-radius:22px; }
.opt-xl { font-size:1rem;  padding:12px 30px; border-radius:24px; }

#kaydet-btn {
  display:block; margin-top:16px; width:100%;
  background:#e5e7eb; color:#9ca3af;
  font-weight:900; font-size:1rem; padding:14px;
  border-radius:16px; border:none; cursor:not-allowed; transition:.2s;
}
#kaydet-btn.aktif { background:#16a34a; color:white; cursor:pointer; }
#kaydet-btn.aktif:active { transform:scale(.97); background:#15803d; }

/* Header */
.hero { background:linear-gradient(135deg,#4f46e5,#2563eb); color:white; padding:24px 16px 20px; text-align:center; }
.hero h1 { font-size:1.8rem; font-weight:900; margin-bottom:4px; }
.hero p { font-size:.85rem; opacity:.85; }
</style>
</head>

<div style="max-width:480px;margin:0 auto;min-height:100vh;background:white;box-shadow:0 0 40px rgba(0,0,0,.15);overflow:hidden;">

  <!-- HEADER -->
  <div class="hero">
    <div style="font-size:2.4rem;margin-bottom:6px;">🕵️</div>
    <h1>Hediye Dedektifi</h1>
    <p>30 soru, 10 hediye ipucu, 1 mükemmel seçim ✨</p>
  </div>

  <!-- KART ALANI -->
  <div id="ana-alan" style="padding:0 12px 0;"></div>

  <!-- TÜMÜ GÖR BUTONU -->
  <div id="tumler-btn-wrap">
    <button id="tumler-btn" onclick="tumHediyelereGit()">
      🎁 Tüm 10 Hediyeyi Gör →
    </button>
  </div>

</div>

<!-- DEVAM BUTONU -->
<div id="devam-wrap">
  <button id="devam-btn" onclick="devamEt()">

</div>

<!-- POPUP -->
<div id="popup-overlay">
  <div id="popup-box">
    <div id="popup-handle"></div>
    <button onclick="popupKapat()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#9ca3af;">✕</button>
    <div id="popup-title"></div>
    <div id="popup-espri"></div>
    <div id="popup-secenekler"></div>
    <button id="kaydet-btn" onclick="kaydet()">Kaydet</button>
  </div>
</div>

// ============================================================
// DURUM
// ============================================================
const cevaplar = {};
let aktifGruplar = [...GRUPLAR];
let miniHediyeler = {}; // grupId → [{name, price, star, emoji}]
let toplamGrupTamamlandi = 0;
let aktifSoruId = null;
let secilenSu = null;

// ============================================================
// YARDIMCI FONKSİYONLAR
// ============================================================
function getSoru(id) {
  if (id === 'makyaj' && cevaplar.cinsiyet === 'Erkek') {
    return {id:'makyaj', soru:'Bakım / cilt ürünlerine ilgisi var mı?', secenekler:['Çok var','Orta','Yok'], espriNotu:'Krem bile sürmez mi gerçekten 🧴'};
  }
  const setler = ['sorular','soruBebekler','soruCocuklar','soruPetler','soruKedi','soruKopek','soruKus','soruBalik','soruKucukPet'];
  for (const s of setler) {
    const found = (QUIZ_CONFIG[s] || []).find(q => q.id === id);
    if (found) return found;
  }
  return null;
}

function getSecenekler(id) {
  const soru = getSoru(id);
  if (!soru) return [];
  let secs = [...soru.secenekler];
  if (id === 'cinsiyet') {
    const kime = cevaplar.kime || '';
    const filtre = QUIZ_CONFIG.cinsiyetFiltreleri && QUIZ_CONFIG.cinsiyetFiltreleri[kime];
    if (Array.isArray(filtre)) secs = secs.filter(s => filtre.includes(s));
  }
  if (id === 'yas') {
    const kime = cevaplar.kime || '';
    const cinsiyet = cevaplar.cinsiyet || '';
    let key = kime;
    if (kime === 'Kardeş' && (cinsiyet === 'Kız Çocuğu' || cinsiyet === 'Erkek Çocuğu')) key = 'Kardeş_cocuk';
    const filtre = QUIZ_CONFIG.yasFiltreleri && QUIZ_CONFIG.yasFiltreleri[key];
    if (Array.isArray(filtre)) secs = secs.filter(s => filtre.includes(s));
  }
  return secs;
}

function getRenkStyle(id, cevap) {
  if (!cevap) return '';
  const secKey = (id === 'makyaj' && cevaplar.cinsiyet === 'Erkek') ? 'makyaj_erkek' : id;
  const liste = ESPRI_SECENEKLER[secKey] || ESPRI_SECENEKLER[id];
  if (liste) {
    const opt = liste.find(o => o.l === cevap);
    if (opt) return `background:${opt.bg};color:${opt.tx};border:1.5px solid ${opt.br}`;
  }
  const idx = getSecenekler(id).indexOf(cevap);
  const r = OPT_RENKLER[Math.max(0,idx) % OPT_RENKLER.length];
  return `background:${r.bg};color:${r.tx};border:1.5px solid ${r.br}`;
}

function getEspri(id) {
  return ESPRI_MAP[id] || '😊';
}

function isGrupTamamlandi(grup) {
  const zorunluIds = grup.sorular.filter(id => {
    if (id === 'cinsiyet' && ['Anne','Baba','Bebek ❤️','Pet ❤️'].includes(cevaplar.kime)) return false;
    return true;
  });
  return zorunluIds.every(id => cevaplar[id]);
}

// Kime seçimine göre grupları güncelle
function guncellGruplar() {
  const kime = cevaplar.kime || '';
  if (OZEL_GRUPLAR[kime]) {
    // Özel set + genel gruplar (g1 hariç, o zaten özel sette var gibi)
    const ozel = OZEL_GRUPLAR[kime];
    // Pet için pet_tur sonrası dinamik grup eklenir
    if (kime === 'Pet ❤️' && cevaplar.pet_tur) {
      const petSorular = getPetSorular(cevaplar.pet_tur);
      aktifGruplar = [
        GRUPLAR[0], // Kişi & Amaç — kime zaten cevaplandı
        {id:'pg1', baslik:'🐾 Pet Detayları', sorular: petSorular},
        GRUPLAR[1], GRUPLAR[2], GRUPLAR[3],
      ];
    } else if (kime === 'Pet ❤️') {
      aktifGruplar = [
        GRUPLAR[0],
        {id:'pg0', baslik:'🐾 Hangi Hayvan?', sorular:['pet_tur']},
        GRUPLAR[1], GRUPLAR[2], GRUPLAR[3],
      ];
    } else {
      aktifGruplar = ozel.concat(GRUPLAR.slice(1));
    }
  } else {
    aktifGruplar = [...GRUPLAR];
  }
}

function getPetSorular(petTur) {
  if (petTur.includes('Kedi')) return ['kedi_yas','kedi_karakter','kedi_ortam','kedi_tur','kedi_butce'];
  if (petTur.includes('Köpek')) return ['kopek_yas','kopek_irk','kopek_karakter','kopek_tur','kopek_butce'];
  if (petTur.includes('Kuş')) return ['kus_tur','kus_kafes','kus_hediye','kus_butce'];
  if (petTur.includes('Balık')) return ['balik_tip','balik_boyut','balik_hediye','balik_butce'];
  return ['kucukpet_yas','kucukpet_yuva','kucukpet_hediye','kucukpet_butce'];
}

// ============================================================
// RENDER
// ============================================================
function render() {
  guncellGruplar();
  const alan = document.getElementById('ana-alan');
  alan.innerHTML = '';

  aktifGruplar.forEach((grup, gi) => {
    // Grup başlığı
    const baslikDiv = document.createElement('div');
    baslikDiv.className = 'grup-baslik';
    baslikDiv.innerHTML = `<span>${grup.baslik}</span><div class="grup-baslik-cizgi"></div>`;
    alan.appendChild(baslikDiv);

    // Kartlar grid
    const grid = document.createElement('div');
    grid.className = 'grid grid-cols-12 gap-2 px-3 pb-2';
    grid.id = 'grid-' + grup.id;

    grup.sorular.forEach((id, idx) => {
      const soru = getSoru(id);
      if (!soru) return;

      const span = SPAN_DIZI[idx % SPAN_DIZI.length];
      const renk = KART_RENKLER[(gi * 3 + idx) % KART_RENKLER.length];
      const emoji = EMOJI_MAP[id] || '❓';
      const cevap = cevaplar[id];
      const fontSize = span >= 12 ? 'text-base' : span >= 7 ? 'text-sm' : 'text-xs';

      // Kilitli mi?
      const locked = (id === 'cinsiyet' && ['Anne','Baba','Bebek ❤️','Pet ❤️'].includes(cevaplar.kime));

      const kart = document.createElement('button');
      kart.className = `kart col-span-${span} ${renk.bg} border-2 ${renk.border} text-left ${cevap ? 'cevaplandi' : ''} ${locked ? 'opacity-40 cursor-not-allowed' : ''}`;
      kart.dataset.id = id;

      const tagStyle = cevap ? getRenkStyle(id, cevap) : '';
      kart.innerHTML = `
        <span class="kart-emoji">${emoji}</span>
        <h3 class="kart-soru ${fontSize} font-black leading-snug">${soru.soru}</h3>
        <p class="kart-espri">${getEspri(id)}</p>
        <div class="kart-cevap-tag" style="${tagStyle}">${cevap || ''}</div>
      `;
      if (!locked) kart.onclick = () => popupAc(id);
      grid.appendChild(kart);
    });

    alan.appendChild(grid);

    // Mini hediye alanı
    const mhWrap = document.createElement('div');
    mhWrap.className = 'mini-hediye-wrap';
    mhWrap.id = 'mh-' + grup.id;

    // Yüklenme mesajı
    const yukluyor = document.createElement('div');
    yukluyor.className = 'ara-yukluyor col-span-2';
    yukluyor.id = 'ykl-' + grup.id;
    yukluyor.textContent = '🔍 Hediyeler aranıyor...';

    // İki mini hediye kutusu (placeholder)
    for (let k = 0; k < 2; k++) {
      const mh = document.createElement('div');
      mh.className = 'mini-hediye';
      mh.id = `mh-${grup.id}-${k}`;
      mh.innerHTML = `
        <img class="mh-img" src="${GIFT_IMGS[(gi*2+k) % GIFT_IMGS.length]}" alt="hediye">
        <div class="mh-star">⭐ Seçim</div>
        <div class="mh-body">
          <div class="mh-spinner"></div>
          <div class="mh-name" id="mhn-${grup.id}-${k}">&nbsp;</div>
          <div class="mh-price" id="mhp-${grup.id}-${k}"></div>
        </div>
        <div class="mh-links" id="mhl-${grup.id}-${k}"></div>
      `;
      mhWrap.appendChild(mh);
    }

    alan.appendChild(mhWrap);
  });

  // Ayırıcı
  const sep = document.createElement('div');
  sep.style.height = '8px';
  alan.appendChild(sep);

  updateProgress();
  checkGrupTamamlanmalari();
}

// ============================================================
// POPUP
// ============================================================
function popupAc(id) {
  aktifSoruId = id;
  secilenSu = cevaplar[id] || null;
  const soru = getSoru(id);
  if (!soru) return;

  document.getElementById('popup-title').textContent = soru.soru;
  document.getElementById('popup-espri').textContent = getEspri(id);

  const secWrap = document.getElementById('popup-secenekler');
  secWrap.innerHTML = '';

  const secenekler = getSecenekler(id);
  const SIZES = ['opt-md','opt-lg','opt-sm','opt-xl','opt-xs','opt-md','opt-lg','opt-sm'];

  secenekler.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = `opt ${SIZES[i % SIZES.length]}`;
    const secKey = (id === 'makyaj' && cevaplar.cinsiyet === 'Erkek') ? 'makyaj_erkek' : id;
    const liste = ESPRI_SECENEKLER[secKey] || ESPRI_SECENEKLER[id];
    let renk = OPT_RENKLER[i % OPT_RENKLER.length];
    let emoji = '';
    if (liste) {
      const found = liste.find(o => o.l === opt);
      if (found) { renk = found; emoji = found.e || ''; }
    }
    btn.style.cssText = `background:${renk.bg};border-color:${renk.br};color:${renk.tx}`;
    btn.dataset.val = opt;
    btn.innerHTML = (emoji ? emoji + ' ' : '') + opt + '<span class="opt-tick">✔</span>';
    if (secilenSu === opt) btn.classList.add('secildi');
    btn.onclick = () => secimYap(btn, opt);
    secWrap.appendChild(btn);
  });

  updateKaydetBtn();
  document.getElementById('popup-overlay').classList.add('acik');
  document.body.style.overflow = 'hidden';
}

function secimYap(btn, opt) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('secildi'));
  btn.classList.add('secildi');
  secilenSu = opt;
  updateKaydetBtn();
}

function updateKaydetBtn() {
  const btn = document.getElementById('kaydet-btn');
  if (secilenSu) {
    btn.classList.add('aktif');
    btn.textContent = 'Kaydet ✔';
  } else {
    btn.classList.remove('aktif');
    btn.textContent = 'Kaydet';
  }
}

function kaydet() {
  if (!secilenSu || !aktifSoruId) return;
  cevaplar[aktifSoruId] = secilenSu;

  // Kime değişince diğer cevapları sıfırla
  if (aktifSoruId === 'kime') {
    const yeniKime = secilenSu;
    Object.keys(cevaplar).forEach(k => { if(k !== 'kime') delete cevaplar[k]; });
    cevaplar.kime = yeniKime;
    if (yeniKime === 'Anne') cevaplar.cinsiyet = 'Kadın';
    else if (yeniKime === 'Baba') cevaplar.cinsiyet = 'Erkek';
    miniHediyeler = {};
    toplamGrupTamamlandi = 0;
  }

  // Pet_tur değişince pet sorularını sıfırla
  if (aktifSoruId === 'pet_tur') {
    Object.keys(cevaplar).forEach(k => {
      if (!['kime','pet_tur'].includes(k) && (k.startsWith('kedi_') || k.startsWith('kopek_') || k.startsWith('kus_') || k.startsWith('balik_') || k.startsWith('kucukpet_'))) {
        delete cevaplar[k];
      }
    });
    miniHediyeler = {};
  }

  popupKapat();
  render();
  checkGrupTamamlanmalari();
}

function popupKapat() {
  document.getElementById('popup-overlay').classList.remove('acik');
  document.body.style.overflow = '';
}

document.getElementById('popup-overlay').addEventListener('click', function(e) {
  if (e.target === this) popupKapat();
});

// ============================================================
// PROGRESS BUTONU
// ============================================================
function updateProgress() {
  const tumSorular = aktifGruplar.flatMap(g => g.sorular);
  const zorunlu = tumSorular.filter(id => {
    if (id === 'cinsiyet' && ['Anne','Baba','Bebek ❤️','Pet ❤️'].includes(cevaplar.kime)) return false;
    return true;
  });
  const cevaplandi = zorunlu.filter(id => cevaplar[id]).length;
  const toplam = zorunlu.length;

  const btn = document.getElementById('devam-btn');
  const lbl = document.getElementById('devam-label');

  // Dilimler
  if (btn.querySelectorAll('.dilim').length !== toplam) {
    btn.innerHTML = '';
    for (let i = 0; i < Math.min(toplam, 30); i++) {
      const d = document.createElement('div');
      d.className = 'dilim';
      btn.appendChild(d);
    }
    const l = document.createElement('div');
    l.id = 'devam-label';
    btn.appendChild(l);
  }

  btn.querySelectorAll('.dilim').forEach((d, i) => {
    d.style.background = i < cevaplandi ? '#6366f1' : '#e5e7eb';
    d.style.borderRight = i < cevaplandi - 1 ? '1px solid rgba(255,255,255,.4)' : 'none';
  });

  const yenilbl = document.getElementById('devam-label');
  if (cevaplandi >= toplam && toplam > 0) {
    yenilbl.textContent = '🎁 Tüm Hediyeleri Gör →';
    btn.classList.add('hazir');
  } else {
    yenilbl.textContent = cevaplandi + ' / ' + toplam + ' soru cevaplandı';
    btn.classList.remove('hazir');
  }
}

function devamEt() {
  const tumSorular = aktifGruplar.flatMap(g => g.sorular);
  const zorunlu = tumSorular.filter(id => {
    if (id === 'cinsiyet' && ['Anne','Baba','Bebek ❤️','Pet ❤️'].includes(cevaplar.kime)) return false;
    return true;
  });
  const tamamlandi = zorunlu.every(id => cevaplar[id]);
  if (!tamamlandi) return;
  tumHediyelereGit();
}

// ============================================================
// GRUP TAMAMLANMA & MİNİ HEDİYE
// ============================================================
function checkGrupTamamlanmalari() {
  aktifGruplar.forEach((grup) => {
    if (miniHediyeler[grup.id]) return; // zaten yüklendi
    if (!isGrupTamamlandi(grup)) return;

    // Grubu görünür yap
    const mhWrap = document.getElementById('mh-' + grup.id);
    if (!mhWrap) return;
    mhWrap.classList.add('goster');

    // API'den 2 hediye al
    miniHediyeGetir(grup);
    toplamGrupTamamlandi++;

    // 5 grup tamamlandıysa "tümünü gör" butonu çıkar
    if (toplamGrupTamamlandi >= aktifGruplar.length) {
      document.getElementById('tumler-btn-wrap').classList.add('goster');
    }
  });
}

async function miniHediyeGetir(grup) {
  miniHediyeler[grup.id] = 'loading';
  const yukId = 'ykl-' + grup.id;
  const yukEl = document.getElementById(yukId);
  // spinner zaten var kartlarda

  try {
    const prompt = buildMiniPrompt(grup);
    const res = await fetch('/api/gifts', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt, session_id: ''})
    });
    if (!res.ok) throw new Error('API hatası');
    const data = await res.json();
    let hediyeler = [];
    try { hediyeler = JSON.parse(data.result); } catch(e) {
      const m = data.result.match(/\[[\s\S]*\]/);
      if (m) hediyeler = JSON.parse(m[0]);
    }
    if (!Array.isArray(hediyeler)) hediyeler = [hediyeler];

    miniHediyeler[grup.id] = hediyeler;
    renderMiniHediyeler(grup.id, hediyeler);
  } catch(e) {
    miniHediyeler[grup.id] = 'error';
    for (let k = 0; k < 2; k++) {
      const nameEl = document.getElementById(`mhn-${grup.id}-${k}`);
      const spinEl = document.querySelector(`#mh-${grup.id}-${k} .mh-spinner`);
      if (spinEl) spinEl.style.display = 'none';
      if (nameEl) { nameEl.textContent = '—'; nameEl.classList.add('yuklu'); }
    }
  }
}

function buildMiniPrompt(grup) {
  const kime = cevaplar.kime || '';
  const butce = cevaplar.butce || cevaplar.bebek_butce || cevaplar.cocuk_butce || cevaplar.kedi_butce || cevaplar.kopek_butce || '';
  const grupCevaplar = grup.sorular
    .filter(id => cevaplar[id])
    .map(id => { const s = getSoru(id); return s ? `${s.soru}: ${cevaplar[id]}` : ''; })
    .filter(Boolean).join(', ');

  return `Sen bir hediye öneri uzmanısın. Aşağıdaki kişi profili için 2 hediye öner.
Profil: ${grupCevaplar}
Kime: ${kime}. Bütçe: ${butce || 'belirtilmedi'}.
Grup teması: ${grup.baslik}

Her hediye için: name (Türkçe, kısa maks 4 kelime), emoji (1 tane), price (örn: "450 TL"), star (boolean, ilki true), searchQuery (Türkçe 2-3 kelime).
SADECE JSON array döndür, başka hiçbir şey yazma:
[{"name":"...","emoji":"...","price":"...","star":true,"searchQuery":"..."},{"name":"...","emoji":"...","price":"...","star":false,"searchQuery":"..."}]`;
}

const PLT_RENKLER = {
  Trendyol: {bg:'#f97316', tx:'white'},
  Hepsiburada: {bg:'#f59e0b', tx:'white'},
  Amazon: {bg:'#1d4ed8', tx:'white'},
  'Çiçeksepeti': {bg:'#db2777', tx:'white'},
  N11: {bg:'#7c3aed', tx:'white'},
};

function renderMiniHediyeler(grupId, hediyeler) {
  for (let k = 0; k < 2; k++) {
    const h = hediyeler[k];
    if (!h) continue;

    const kart = document.getElementById(`mh-${grupId}-${k}`);
    const nameEl = document.getElementById(`mhn-${grupId}-${k}`);
    const priceEl = document.getElementById(`mhp-${grupId}-${k}`);
    const linksEl = document.getElementById(`mhl-${grupId}-${k}`);
    const spinEl = kart ? kart.querySelector('.mh-spinner') : null;

    if (spinEl) spinEl.style.display = 'none';
    if (nameEl) {
      nameEl.textContent = (h.emoji || '') + ' ' + (h.name || '');
      nameEl.classList.add('yuklu');
    }
    if (priceEl) priceEl.textContent = h.price || '';
    if (h.star && kart) kart.classList.add('yildiz');

    // Platform linkleri
    if (linksEl && h.searchQuery) {
      const q = encodeURIComponent(h.searchQuery);
      const butce = cevaplar.butce || '';
      const fiyatMap = {'0-500 TL':'0-500','500-1500 TL':'500-1500','1500-3000 TL':'1500-3000','3000-5000 TL':'3000-5000','5000-10000 TL':'5000-10000','10000-30000 TL':'10000-30000'};
      const fiyat = fiyatMap[butce] || '';
      const pltLinks = [
        {isim:'Trendyol', url:`https://www.trendyol.com/sr?q=${q}${fiyat ? '&prc='+fiyat : ''}`},
        {isim:'Hepsiburada', url:`https://www.hepsiburada.com/ara?q=${q}${fiyat ? '&prc='+fiyat : ''}`},
        {isim:'Amazon', url:`https://www.amazon.com.tr/s?k=${q}`},
      ];
      pltLinks.forEach(plt => {
        const a = document.createElement('a');
        a.href = plt.url; a.target = '_blank'; a.rel = 'noopener';
        a.className = 'mh-link';
        const r = PLT_RENKLER[plt.isim] || {bg:'#6366f1',tx:'white'};
        a.style.cssText = `background:${r.bg};color:${r.tx}`;
        a.textContent = plt.isim;
        linksEl.appendChild(a);
      });
    }

    // Görsel çek
    if (kart && h.searchQuery) {
      const img = kart.querySelector('.mh-img');
      if (img) fetchMiniGorsel(h.searchQuery, img);
    }
  }
}

const PEXELS_KEY = document.querySelector('meta[name="pexels-key"]')?.content || '';
async function fetchMiniGorsel(query, imgEl) {
  try {
    // Unsplash kaynak URL (ücretsiz)
    const r = await fetch(`https://source.unsplash.com/300x200/?${encodeURIComponent(query)}`);
    if (r.ok) imgEl.src = r.url;
  } catch(e) {}
}

// ============================================================
// TÜM HEDİYELERE GİT
// ============================================================
function tumHediyelereGit() {
  // Tüm cevapları localStorage'a kaydet
  localStorage.setItem('budurBuldumCevaplar', JSON.stringify(cevaplar));
  // Seçilmiş kriterleri de kaydet (hediyeler.html için)
  const kriterler = Object.keys(cevaplar).slice(0,6).map((id,i) => ({id, grup: i < 3 ? 'A' : 'B'}));
  localStorage.setItem('budurBuldumSelectedCriteria', JSON.stringify(kriterler));
  localStorage.setItem('budurBuldumSecilenBurc', cevaplar.dogum || '');
  window.location.href = 'hediyeler.html';
}

// ============================================================
// BAŞLAT
// ============================================================
render();
