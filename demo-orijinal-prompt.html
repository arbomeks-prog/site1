<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — Orijinal Prompt Testi</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f1f5f9; min-height: 100vh; padding: 20px; }
.kapsam { max-width: 600px; margin: 0 auto; }
h1 { font-size: 18px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
.altyazi { font-size: 13px; color: #64748b; margin-bottom: 24px; }
.kart { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.kart label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.kart input, .kart select, .kart textarea {
  width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px;
  padding: 10px 14px; font-size: 14px; color: #1e293b; outline: none;
  font-family: inherit;
}
.kart textarea { height: 80px; resize: none; }
.satir { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn {
  width: 100%; padding: 16px; background: #e8a838; border: none;
  border-radius: 14px; font-size: 16px; font-weight: 800; color: #412402;
  cursor: pointer; margin-bottom: 20px;
}
.btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
#yukleniyor { display: none; text-align: center; padding: 30px; color: #64748b; font-size: 14px; }
#sonuclar { display: none; }
.hediye-kart {
  background: #fff; border-radius: 16px; padding: 18px;
  margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border-left: 4px solid #e8a838;
}
.hediye-kart.star { border-left-color: #f59e0b; }
.hediye-baslik { font-size: 16px; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
.hediye-desc { font-size: 13px; color: #475569; margin-bottom: 6px; line-height: 1.5; }
.hediye-fiyat { font-size: 13px; font-weight: 700; color: #059669; }
.hediye-reason { font-size: 12px; color: #94a3b8; margin-top: 4px; font-style: italic; }
.star-badge { background: #fef3c7; color: #92400e; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
.hata { background: #fee2e2; border-radius: 12px; padding: 16px; color: #991b1b; font-size: 13px; margin-bottom: 12px; }
.baslik-alani { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.temizle-btn { font-size: 12px; color: #64748b; background: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 4px 10px; cursor: pointer; }
</style>
</head>
<body>
<div class="kapsam">
  <h1>🧪 Orijinal Prompt Testi</h1>
  <p class="altyazi">Senin yazdığın orijinal metni değiştirmeden Grok'a gönderir.</p>

  <div class="kart">
    <label>Hediye Kime</label>
    <select id="kime">
      <option>Annem</option><option>Babam</option><option>Sevgilim</option>
      <option>Erkek Arkadaşım</option><option>Kız Arkadaşım</option>
      <option>Kardeşim</option><option>İş Arkadaşım</option>
    </select>
  </div>

  <div class="kart">
    <div class="satir">
      <div>
        <label>Cinsiyet</label>
        <select id="cinsiyet">
          <option>Kadın</option><option>Erkek</option>
        </select>
      </div>
      <div>
        <label>Yaş Aralığı</label>
        <select id="yas">
          <option>18-25</option><option>26-35</option><option>36-45</option>
          <option>46-55</option><option>56-65</option><option>65+</option>
        </select>
      </div>
    </div>
  </div>

  <div class="kart">
    <label>Bütçe</label>
    <select id="butce">
      <option>0-500 TL</option><option>500-1500 TL</option>
      <option>1500-3000 TL</option><option>3000-5000 TL</option>
      <option>5000-10000 TL</option><option>10000-30000 TL</option>
    </select>
  </div>

  <div class="kart">
    <div class="satir">
      <div>
        <label>İçecek Tercihi</label>
        <select id="icecek">
          <option value="">Seçilmedi</option>
          <option>Çay</option><option>Kahve</option><option>İkisi de</option>
        </select>
      </div>
      <div>
        <label>Kişilik</label>
        <select id="kisilik">
          <option value="">Seçilmedi</option>
          <option>Dışadönük</option><option>İçedönük</option>
        </select>
      </div>
    </div>
  </div>

  <div class="kart">
    <label>Hobiler / İlgi Alanları</label>
    <textarea id="hobiler" placeholder="Örn: doğa yürüyüşü, fotoğrafçılık, müzik, bitki yetiştirme..."></textarea>
  </div>

  <div class="kart">
    <div class="satir">
      <div>
        <label>Favori Mevsim</label>
        <select id="mevsim">
          <option value="">Seçilmedi</option>
          <option>İlkbahar</option><option>Yaz</option>
          <option>Sonbahar</option><option>Kış</option>
        </select>
      </div>
      <div>
        <label>Spor Durumu</label>
        <select id="spor">
          <option value="">Seçilmedi</option>
          <option>Spor yapmıyor</option><option>Ara sıra yapıyor</option>
          <option>Düzenli yapıyor</option>
        </select>
      </div>
    </div>
  </div>

  <div class="kart">
    <label>Ekstra Notlar (isteğe bağlı)</label>
    <textarea id="ekstra" placeholder="Burç, özel ilgi alanı, vs..."></textarea>
  </div>

  <button class="btn" id="btn" onclick="hediyeBul()">🎁 Hediye Bul</button>

  <div id="yukleniyor">⏳ Grok arıyor, lütfen bekle... (30-40 sn)</div>

  <div id="sonuclar"></div>
</div>

<script>
async function hediyeBul() {
  const btn = document.getElementById('btn');
  const yukleniyor = document.getElementById('yukleniyor');
  const sonuclar = document.getElementById('sonuclar');

  const kime = document.getElementById('kime').value;
  const cinsiyet = document.getElementById('cinsiyet').value;
  const yas = document.getElementById('yas').value;
  const butce = document.getElementById('butce').value;
  const icecek = document.getElementById('icecek').value;
  const kisilik = document.getElementById('kisilik').value;
  const hobiler = document.getElementById('hobiler').value;
  const mevsim = document.getElementById('mevsim').value;
  const spor = document.getElementById('spor').value;
  const ekstra = document.getElementById('ekstra').value;

  const satirlar = [
    'Hediye kime: ' + kime,
    'Cinsiyeti: ' + cinsiyet,
    'Yaş aralığı: ' + yas,
    'Bütçe: ' + butce + ' (kesinlikle bu aralıkta kal)',
  ];
  if (icecek) satirlar.push('İçecek tercihi: ' + icecek);
  if (kisilik) satirlar.push('Kişilik tipi: ' + kisilik);
  if (hobiler) satirlar.push('Hobiler ve ilgi alanları: ' + hobiler);
  if (mevsim) satirlar.push('Favori mevsim: ' + mevsim);
  if (spor) satirlar.push('Spor durumu: ' + spor);
  if (ekstra) satirlar.push('Ek bilgi: ' + ekstra);

  const prompt = 'Kullanıcı profili:\n' + satirlar.join('\n') + '\n\nGörev: Profile uygun 9 hediye öner. İlk 3 nokta atışı (star:true), diğerleri normal (star:false).\nHer hediye: name, emoji, description (2 cümle), reason (1 cümle kişiselleştirilmiş), price (rakam + " TL"), star, searchQuery (Türkçe 2-3 kelime, sıfat/marka yasak), searchQueryEn (İngilizce görsel araması)\nSadece JSON array döndür.';

  btn.disabled = true;
  yukleniyor.style.display = 'block';
  sonuclar.style.display = 'none';
  sonuclar.innerHTML = '';

  try {
    const res = await fetch('/api/gifts-demo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data.error));

    let metin = data.result || '';
    metin = metin.replace(/```json|```/g, '').trim();
    const hediyeler = JSON.parse(metin);

    sonuclar.innerHTML = '<div class="baslik-alani"><b style="color:#1e293b">🎁 ' + hediyeler.length + ' Hediye Önerisi</b><button class="temizle-btn" onclick="temizle()">Temizle</button></div>';

    hediyeler.forEach(function(h) {
      const div = document.createElement('div');
      div.className = 'hediye-kart' + (h.star ? ' star' : '');
      div.innerHTML =
        '<div class="hediye-baslik">' + (h.emoji || '') + ' ' + (h.name || '') +
        (h.star ? '<span class="star-badge">⭐ Nokta Atışı</span>' : '') + '</div>' +
        '<div class="hediye-desc">' + (h.description || '') + '</div>' +
        '<div class="hediye-fiyat">' + (h.price || '') + '</div>' +
        '<div class="hediye-reason">' + (h.reason || '') + '</div>';
      sonuclar.appendChild(div);
    });

    sonuclar.style.display = 'block';
  } catch(e) {
    sonuclar.innerHTML = '<div class="hata">Hata: ' + e.message + '</div>';
    sonuclar.style.display = 'block';
  }

  yukleniyor.style.display = 'none';
  btn.disabled = false;
}

function temizle() {
  document.getElementById('sonuclar').style.display = 'none';
  document.getElementById('sonuclar').innerHTML = '';
}
</script>
</body>
</html>
