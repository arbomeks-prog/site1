<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kombinasyon Testi</title>
<style>
body { font-family: -apple-system, sans-serif; background: #0f172a; color: #f1f5f9; padding: 30px 20px; max-width: 500px; margin: 0 auto; text-align: center; }
h1 { color: #e8a838; font-size: 20px; margin-bottom: 10px; }
p { color: #94a3b8; font-size: 13px; margin-bottom: 30px; line-height: 1.7; }
.profil { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 24px; text-align: left; }
.profil-baslik { font-size: 11px; font-weight: 900; color: #e8a838; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.profil-satir { font-size: 13px; color: #cbd5e1; line-height: 1.9; }
button { background: #e8a838; color: #1e293b; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 900; cursor: pointer; width: 100%; }
</style>
</head>
<body>
<h1>🎁 Kombinasyon Testi</h1>
<p>Aşağıdaki profille Grok'un kombinasyonları kendisi seçip seçmediğini test ediyoruz.</p>

<div class="profil">
  <div class="profil-baslik">Test Profili</div>
  <div class="profil-satir">
    👤 Arkadaş · Erkek · 26-35<br>
    🎂 Doğum Günü · 0-1000 TL<br>
    🎸 Rock müzik · 🥾 Doğa yürüyüşü<br>
    📚 Kitap okur · 🍜 Asya mutfağı<br>
    ☕ Kahve · 🎬 Aksiyon<br>
    🌍 Seyahat sever · Dışadönük
  </div>
</div>

<button onclick="baslat()">▶ Hediyeleri Gör</button>

<script>
function baslat() {
    var cevaplar = {
        kime: 'Arkadaş', cinsiyet: 'Erkek', yas: '26-35',
        tarz: 'Minimalist', renk: 'Doğal Tonlar', amac: 'Doğum Günü',
        ortam: 'Daha çok dışarıda', butce: '0-1000 TL',
        mevsim: 'Sonbahar', kisilik: 'Dışadönük',
        oncelik: 'Özel ve anlamlı olsun',
        hobiler: 'Müzik / Enstrüman, Seyahat',
        muzik: 'Rock', doga: 'Evet sever',
        kitap: 'Ara sıra', mutfak: 'Asya',
        spor: 'Ara sıra', kahve: 'Kahve',
        film: 'Aksiyon', teknoloji: 'Orta seviyede',
        seyahat: 'Çok sever', sanat: 'Orta',
        foto: 'Ara sıra', dogum: '♏ Akrep'
    };

    var secilen = [
        {id:'muzik', grup:'A'},
        {id:'doga', grup:'A'},
        {id:'hobiler', grup:'A'},
        {id:'mutfak', grup:'B'},
        {id:'seyahat', grup:'B'},
        {id:'kitap', grup:'B'}
    ];

    localStorage.setItem('budurBuldumCevaplar', JSON.stringify(cevaplar));
    localStorage.setItem('budurBuldumAktifSet', 'normal');
    localStorage.setItem('budurBuldumTamamlandi', '1');
    localStorage.setItem('budurBuldumSelectedCriteria', JSON.stringify(secilen));
    localStorage.setItem('budurBuldumButceEsnek', '0');
    localStorage.setItem('budurBuldumSecilenBurc', '♏ Akrep');

    window.location.href = 'hediyeler-kombinasyon-demo.html';
}
</script>
</body>
</html>
