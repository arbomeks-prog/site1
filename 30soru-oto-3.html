<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Soru Otomatik</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #0f172a;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
}
.frame {
    width: 360px;
    height: 640px;
    background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 60%, #0f172a 100%);
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    cursor: none;
}
.top-bar {
    padding: 14px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.logo { font-size: 12px; font-weight: 800; color: #fbbf24; letter-spacing: 0.08em; }
.timer { font-size: 13px; color: white; font-weight: 800; font-variant-numeric: tabular-nums; }

.grid-area {
    flex: 1;
    padding: 4px 12px 8px;
    overflow: hidden;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 5px;
}
.kart {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px 3px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}
.kart.aktif {
    background: rgba(249,115,22,0.25);
    border-color: #f97316;
    transform: scale(1.08);
    box-shadow: 0 0 14px rgba(249,115,22,0.5);
    z-index: 2;
}
.kart.cevaplandi {
    background: rgba(255,255,255,0.06);
    border-width: 2px;
    border-style: solid;
}
.kart-no {
    font-size: 9px;
    font-weight: 800;
    color: rgba(255,255,255,0.35);
    line-height: 1;
    margin-bottom: 2px;
}
.kart.cevaplandi .kart-no { color: rgba(255,255,255,0.6); }
.kart-icerik {
    font-size: 6px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    line-height: 1.3;
    font-weight: 500;
}
.kart.cevaplandi .kart-icerik {
    font-size: 6.5px;
    color: rgba(255,255,255,0.85);
    font-weight: 700;
}
.kart-check { display: none; font-size: 9px; font-weight: 900; margin-top: 1px; }
.kart.cevaplandi .kart-check { display: block; }


/* Hediye kutusu kartlar */
.kart.hediye {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border-width: 2.5px;
    border-style: solid;
    border-color: #fbbf24;
    box-shadow: 0 0 18px rgba(251,191,36,0.5), inset 0 0 12px rgba(251,191,36,0.08);
    animation: hediyePulse 1.5s ease-in-out infinite;
    z-index: 3;
}
@keyframes hediyePulse {
    0%, 100% { box-shadow: 0 0 12px rgba(251,191,36,0.4), inset 0 0 8px rgba(251,191,36,0.06); }
    50% { box-shadow: 0 0 28px rgba(251,191,36,0.8), inset 0 0 16px rgba(251,191,36,0.15); }
}
.kart.hediye .kart-no { color: #fbbf24; font-size: 8px; }
.kart.hediye .kart-icerik { font-size: 18px; color: #fbbf24; }
.kart.hediye .kart-check { display: none; }

/* 30 pastel çerçeve rengi */
.kart.cevaplandi[data-sira="1"] { border-color: #f9a8d4; }
.kart.cevaplandi[data-sira="2"] { border-color: #93c5fd; }
.kart.cevaplandi[data-sira="3"] { border-color: #6ee7b7; }
.kart.cevaplandi[data-sira="4"] { border-color: #fcd34d; }
.kart.cevaplandi[data-sira="5"] { border-color: #c4b5fd; }
.kart.cevaplandi[data-sira="6"] { border-color: #fdba74; }
.kart.cevaplandi[data-sira="7"] { border-color: #a5f3fc; }
.kart.cevaplandi[data-sira="8"] { border-color: #f0abfc; }
.kart.cevaplandi[data-sira="9"] { border-color: #86efac; }
.kart.cevaplandi[data-sira="10"] { border-color: #fda4af; }
.kart.cevaplandi[data-sira="11"] { border-color: #67e8f9; }
.kart.cevaplandi[data-sira="12"] { border-color: #fef08a; }
.kart.cevaplandi[data-sira="13"] { border-color: #d9f99d; }
.kart.cevaplandi[data-sira="14"] { border-color: #bfdbfe; }
.kart.cevaplandi[data-sira="15"] { border-color: #ddd6fe; }
.kart.cevaplandi[data-sira="16"] { border-color: #fecdd3; }
.kart.cevaplandi[data-sira="17"] { border-color: #bbf7d0; }
.kart.cevaplandi[data-sira="18"] { border-color: #fed7aa; }
.kart.cevaplandi[data-sira="19"] { border-color: #e9d5ff; }
.kart.cevaplandi[data-sira="20"] { border-color: #a7f3d0; }
.kart.cevaplandi[data-sira="21"] { border-color: #fde68a; }
.kart.cevaplandi[data-sira="22"] { border-color: #c7d2fe; }
.kart.cevaplandi[data-sira="23"] { border-color: #fbcfe8; }
.kart.cevaplandi[data-sira="24"] { border-color: #99f6e4; }
.kart.cevaplandi[data-sira="25"] { border-color: #fef3c7; }
.kart.cevaplandi[data-sira="26"] { border-color: #f5d0fe; }
.kart.cevaplandi[data-sira="27"] { border-color: #bae6fd; }
.kart.cevaplandi[data-sira="28"] { border-color: #dcfce7; }
.kart.cevaplandi[data-sira="29"] { border-color: #f9a8d4; }
.kart.cevaplandi[data-sira="30"] { border-color: #93c5fd; }

.alt-bar {
    padding: 8px 16px 14px;
    flex-shrink: 0;
    text-align: center;
}
.ilerleme-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
}
.ilerleme-ic {
    height: 100%;
    background: linear-gradient(90deg, #f97316, #fbbf24);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
}
.alt-text { font-size: 10px; color: rgba(255,255,255,0.4); }
.alt-text span { color: #fbbf24; font-weight: 700; }

.basla-btn {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    cursor: pointer;
}
.basla-ic {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(249,115,22,0.5);
}

/* POPUP */
.popup {
    display: none;
    position: absolute;
    inset: 0;
    background: transparent;
    z-index: 10;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.popup.aktif { display: flex; }
.popup-ic {
    background: #1e293b;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 16px;
    width: 100%;
    max-width: 280px;
    position: relative;
}
.popup-no {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 0.08em;
}
.popup-soru {
    font-size: 13px;
    font-weight: 700;
    color: white;
    margin-bottom: 10px;
    line-height: 1.4;
}
.popup-secenekler {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.popup-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(255,255,255,0.65);
    font-size: 11px;
    padding: 9px 12px;
    text-align: left;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    position: relative;
}
.popup-btn.secili {
    background: linear-gradient(135deg, rgba(249,115,22,0.35), rgba(234,88,12,0.25));
    border-color: #f97316;
    color: white;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(249,115,22,0.25);
}

/* CURSOR */
#cursor {
    position: absolute;
    width: 18px;
    height: 18px;
    pointer-events: none;
    z-index: 999;
    display: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
    transition: none;
}

/* BİTTİ */
.bitti {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 30;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px;
    gap: 0;
}
.bitti.goster { display: flex; }
.bitti-sure { font-size: 48px; font-weight: 900; color: #fbbf24; margin-bottom: 12px; text-shadow: 0 2px 20px rgba(251,191,36,0.5); }
.bitti-mesaj { font-size: 22px; font-weight: 900; color: white; line-height: 1.5; text-shadow: 0 2px 12px rgba(0,0,0,0.8); margin-bottom: 24px; }
.bitti-kalp {
    font-size: 72px;
    display: block;
    filter: drop-shadow(0 6px 20px rgba(239,68,68,0.7));
}

/* Hediye kartı satırları */
.kart-row {
    display: flex;
    gap: 8px;
    width: 100%;
    justify-content: center;
    margin: 10px 0;
}
.duygu-kart {
    flex: 1;
    max-width: 96px;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border: 1.5px solid rgba(251,191,36,0.4);
    border-radius: 12px;
    padding: 10px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 9.5px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    line-height: 1.4;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateX(-60px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    min-height: 72px;
}
.duygu-kart.sag { transform: translateX(60px); }
.duygu-kart.goster { opacity: 1; transform: translateX(0); }
.duygu-kart .kart-emoji { font-size: 14px; display: block; margin-bottom: 4px; }
.yeniden-btn {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white; border: none; border-radius: 12px;
    padding: 12px 24px; font-size: 14px; font-weight: 800; cursor: pointer;
}

@media (max-width: 400px) {
    body { padding: 0; align-items: flex-start; }
    .frame { width: 100vw; height: 100svh; border-radius: 0; }
}
</style>
</head>
<body>
<div class="frame" id="frame">
    <div class="top-bar">
        <div class="logo">BUDUR BULDUM</div>
        <div class="timer" id="timer">⏱ 0:00</div>
    </div>
    <div class="grid-area" id="grid"></div>
    <div class="alt-bar">
        <div class="ilerleme-bar"><div class="ilerleme-ic" id="ilerleme"></div></div>
        <div class="alt-text"><span id="tamamlanan">0</span>/30 soru tamamlandı</div>
    </div>

    <div class="basla-btn" id="basla-btn" onclick="baslat()">
        <button class="basla-ic">▶ Başlat — süreyi ölç</button>
    </div>

    <div class="popup" id="popup">
        <div class="popup-ic" id="popup-ic">
            <div class="popup-no" id="popup-no"></div>
            <div class="popup-soru" id="popup-soru"></div>
            <div class="popup-secenekler" id="popup-sec"></div>
        </div>
    </div>

    <!-- Cursor SVG -->
    <svg id="cursor" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 0 L4 20 L8 16 L12 24 L14 23 L10 15 L16 15 Z"/>
    </svg>

    <div class="bitti" id="bitti">
        <div class="bitti-sure" id="bitti-sure"></div>
        <div class="bitti-mesaj">Sevdiğin kişiye<br>2 dakikanı ayır.</div>
        <span class="bitti-kalp">❤️</span>
    </div>
</div>

<script>
const sorular = [
    { soru: "Hediye kime alınıyor?", sec: ["Sevgili","Arkadaş","Anne","Baba"] },
    { soru: "Cinsiyeti nedir?", sec: ["Kadın","Erkek"] },
    { soru: "Yaş aralığı nedir?", sec: ["18-25","26-35","36-45","46+"] },
    { soru: "Doğum tarihi?", sec: ["Biliyorum","Bilmiyorum","Burcunu biliyorum"] },
    { soru: "Tarzı nasıl?", sec: ["Minimalist","Renkli","Klasik","Modern"] },
    { soru: "Hobileri neler?", sec: ["Okumak","Spor","Müzik","Seyahat"] },
    { soru: "Favori renk tonu?", sec: ["Pastel","Koyu","Canlı","Doğal"] },
    { soru: "Hediye ne için?", sec: ["Doğum Günü","Yıl Dönümü","Sürpriz","Başarı"] },
    { soru: "Evde mi dışarıda mı?", sec: ["Evde","Dışarıda","İkisi de"] },
    { soru: "Teknolojiye ilgisi?", sec: ["Çok var","Orta","Az"] },
    { soru: "Bütçe aralığı?", sec: ["0-500₺","500-1500₺","1500-3000₺","3000+₺"] },
    { soru: "Favori mevsim?", sec: ["İlkbahar","Yaz","Sonbahar","Kış"] },
    { soru: "En sevdiği tatlı?", sec: ["Çikolata","Pasta","Dondurma","Hiçbiri"] },
    { soru: "Spor yapıyor mu?", sec: ["Düzenli","Ara sıra","Hiç"] },
    { soru: "Favori müzik türü?", sec: ["Pop","Rock","Klasik","Rap"] },
    { soru: "Hayvan sever mi?", sec: ["Çok","Orta","Pek sevmez"] },
    { soru: "Seyahat sever mi?", sec: ["Çok","Ara sıra","Pek sevmez"] },
    { soru: "Kitap okur mu?", sec: ["Çok","Ara sıra","Hiç"] },
    { soru: "Kahve mi çay mı?", sec: ["Kahve","Çay","İkisi de","Hiçbiri"] },
    { soru: "Favori film türü?", sec: ["Romantik","Komedi","Aksiyon","Dram"] },
    { soru: "Bitki bakımı yapar mı?", sec: ["Evet","Hayır","Deniyor"] },
    { soru: "Oyun oynar mı?", sec: ["Sık sık","Ara sıra","Hiç"] },
    { soru: "Makyaj/bakıma ilgisi?", sec: ["Çok","Orta","Yok"] },
    { soru: "Takı/aksesuar sever mi?", sec: ["Evet","Ara sıra","Hiç"] },
    { soru: "Favori mutfak?", sec: ["Türk","İtalyan","Asya","Sağlıklı"] },
    { soru: "Doğa yürüyüşü yapar mı?", sec: ["Evet","Ara sıra","Hiç"] },
    { soru: "Sanata ilgisi?", sec: ["Çok","Orta","Yok"] },
    { soru: "Fotoğraf çeker mi?", sec: ["Evet","Ara sıra","Hiç"] },
    { soru: "Kişilik tipi?", sec: ["İçedönük","Dışadönük","Dengeli"] },
    { soru: "Hediyede öncelik?", sec: ["Kullanışlı","Güzel","Anlamlı","Uygun fiyat"] },
];

let baslangic = null;
let timerInterval = null;
let adim = 0;
let timeouts = [];

function t(fn, ms) {
    const id = setTimeout(fn, ms);
    timeouts.push(id);
}

// Grid oluştur
const grid = document.getElementById('grid');
sorular.forEach((s, i) => {
    const kart = document.createElement('div');
    kart.className = 'kart';
    kart.id = 'kart-' + i;
    kart.innerHTML = `
        <div class="kart-no">${i+1}</div>
        <div class="kart-icerik" id="kicerik-${i}">${s.soru.length > 18 ? s.soru.substring(0,16)+'…' : s.soru}</div>
        <div class="kart-check">✔</div>
    `;
    grid.appendChild(kart);
});

const cursor = document.getElementById('cursor');
const frame = document.getElementById('frame');

function setCursor(x, y) {
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
}

// Cursor'u smooth animate et (easing ile)
function animateCursor(fromX, fromY, toX, toY, duration, onDone) {
    const start = performance.now();
    function step(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        // ease in-out cubic
        const ease = progress < 0.5
            ? 4 * progress * progress * progress
            : 1 - Math.pow(-2 * progress + 2, 3) / 2;
        const x = fromX + (toX - fromX) * ease;
        const y = fromY + (toY - fromY) * ease;
        setCursor(x, y);
        if (progress < 1) {
            requestAnimationFrame(step);
        } else {
            if (onDone) onDone();
        }
    }
    requestAnimationFrame(step);
}

function getElPos(el) {
    const fr = frame.getBoundingClientRect();
    const r = el.getBoundingClientRect();
    return {
        x: r.left - fr.left + r.width / 2,
        y: r.top - fr.top + r.height / 2
    };
}

function baslat() {
    document.getElementById('basla-btn').style.display = 'none';
    cursor.style.display = 'block';
    setCursor(180, 320);
    baslangic = Date.now();
    timerInterval = setInterval(timerGuncelle, 100);
    adim = 0;
    t(sonrakiSoru, 400);
}

function sonrakiSoru() {
    if (adim >= 30) { bitti(); return; }
    const i = adim;
    const s = sorular[i];

    // Kartı aktif yap
    document.querySelectorAll('.kart').forEach(k => k.classList.remove('aktif'));
    const kart = document.getElementById('kart-' + i);
    kart.classList.add('aktif');

    // Popup aç
    document.getElementById('popup-no').textContent = `SORU ${i+1} / 30`;
    document.getElementById('popup-soru').textContent = s.soru;
    const secDiv = document.getElementById('popup-sec');
    secDiv.innerHTML = s.sec.map(opt =>
        `<div class="popup-btn">${opt}</div>`
    ).join('');
    document.getElementById('popup').classList.add('aktif');

    // Cursor popup üstüne gelsin
    const popupPos = getElPos(document.getElementById('popup-ic'));
    const curX = parseFloat(cursor.style.left) || 180;
    const curY = parseFloat(cursor.style.top) || 300;

    // Rastgele hedef şık
    const btnler = Array.from(secDiv.querySelectorAll('.popup-btn'));
    const hedefIdx = Math.floor(Math.random() * btnler.length);

    // Önce 1-2 başka şıkta gez, sonra hedefe git
    const gezAdimlar = [];
    const digerIdxler = btnler.map((_,idx) => idx).filter(idx => idx !== hedefIdx);
    const gezSayisi = Math.min(digerIdxler.length, 1 + Math.floor(Math.random() * 2));
    for (let g = 0; g < gezSayisi; g++) {
        gezAdimlar.push(digerIdxler[g % digerIdxler.length]);
    }
    gezAdimlar.push(hedefIdx);

    let gecikme = 300;

    // Her şıka sırayla git
    gezAdimlar.forEach((btnIdx, sira) => {
        const sonSira = sira === gezAdimlar.length - 1;
        const gecikmeLocal = gecikme;

        t(() => {
            const pos = getElPos(btnler[btnIdx]);
            const cx = parseFloat(cursor.style.left) || 180;
            const cy = parseFloat(cursor.style.top) || 300;
            const sure = sonSira ? 320 : 380;
            animateCursor(cx, cy, pos.x, pos.y, sure, () => {
                if (sonSira) {
                    // Tıklama efekti: cursor küçülsün
                    cursor.style.transform = 'scale(0.75)';
                    setTimeout(() => { cursor.style.transform = 'scale(1)'; }, 120);

                    // Şık seçili yap
                    btnler[hedefIdx].classList.add('secili');
                    const secilenMetin = btnler[hedefIdx].textContent;

                    // 500ms sonra popup kapat
                    t(() => {
                        document.getElementById('popup').classList.remove('aktif');
                        kart.classList.remove('aktif');
                        kart.classList.add('cevaplandi'); kart.dataset.sira = adim + 1;
                        document.getElementById('kicerik-' + i).textContent = secilenMetin;

                        adim++;
                        document.getElementById('tamamlanan').textContent = adim;
                        document.getElementById('ilerleme').style.width = (adim / 30 * 100) + '%';

                        // Hediye kutusu mantığı: 5,6,15,16,25,26. kartlar
                        // adim=5 → kart[4] (5.kart, sağ), adim=10 → kart[5] (6.kart, sol)
                        // adim=15 → kart[14] (15.kart, sağ), adim=20 → kart[15] (16.kart, sol)
                        // adim=25 → kart[24] (25.kart, sağ), adim=30 → kart[25] (26.kart, sol)
                        const hediyeMap = {5:4, 10:5, 15:14, 20:15, 25:24, 30:25};
                        if (hediyeMap[adim] !== undefined) {
                            const hIdx = hediyeMap[adim];
                            const hKart = document.getElementById('kart-' + hIdx);
                            t(() => {
                                hKart.classList.remove('cevaplandi','aktif');
                                hKart.classList.add('hediye');
                                document.getElementById('kicerik-' + hIdx).textContent = '🎁';
                                document.getElementById('kart-' + hIdx).querySelector('.kart-no').textContent = '🎀';
                            }, 400);
                        }

                        t(sonrakiSoru, 200);
                    }, 500);
                }
            });
        }, gecikmeLocal + sira * 420);
    });
}

function bitti() {
    cursor.style.display = 'none';
    clearInterval(timerInterval);
    const elapsed = (Date.now() - baslangic) / 1000;
    const dk = Math.floor(elapsed / 60);
    const sn = Math.floor(elapsed % 60);
    document.getElementById('bitti-sure').textContent = `${dk}:${sn.toString().padStart(2,'0')}`;
    document.getElementById('bitti').classList.add('goster');

    // Kartları sırayla animate et
    const kartSirasi = ['dk0','dk1','dk2','dk3','dk4','dk5'];
    kartSirasi.forEach((id, i) => {
        t(() => {
            document.getElementById(id).classList.add('goster');
        }, 300 + i * 220);
    });
}

function yeniden() {
    timeouts.forEach(clearTimeout);
    timeouts = [];
    clearInterval(timerInterval);
    cursor.style.display = 'none';
    document.getElementById('bitti').classList.remove('goster');
    document.getElementById('popup').classList.remove('aktif');
    document.getElementById('tamamlanan').textContent = '0';
    document.getElementById('ilerleme').style.width = '0%';
    document.getElementById('timer').textContent = '⏱ 0:00';
    document.querySelectorAll('.kart').forEach((k, i) => {
        k.className = 'kart';
        document.getElementById('kicerik-' + i).textContent =
            sorular[i].soru.length > 18 ? sorular[i].soru.substring(0,16)+'…' : sorular[i].soru;
    });
    baslangic = null; adim = 0;
    document.getElementById('basla-btn').style.display = 'flex';
}

function timerGuncelle() {
    const elapsed = (Date.now() - baslangic) / 1000;
    const dk = Math.floor(elapsed / 60);
    const sn = Math.floor(elapsed % 60);
    document.getElementById('timer').textContent = `⏱ ${dk}:${sn.toString().padStart(2,'0')}`;
}
</script>
</body>
</html>
