<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Özeti | BudurBuldum — Dedektif Çakır Analizi</title>
    <meta name="description" content="Cevaplarınız analiz edildi. Dedektif Çakır profili değerlendiriyor. En önemli kriterleri seçin, kişiselleştirilmiş hediye önerilerinize ulaşın.">
    <link rel="canonical" href="https://budurbuldum.com/ozet.html">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Hediye Profili Özeti | BudurBuldum",
      "description": "Kişiye özel hediye önerileri için profil analizi adımı.",
      "url": "https://budurbuldum.com/ozet.html",
      "inLanguage": "tr"
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="config.js"></script>
    <script src="drama.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { background-color: #F9F9F9; overflow-x: hidden; margin: 0; }
        
        /* Masaüstü ortalama */
        @media (min-width: 1024px) {
            body { display: flex; justify-content: center; }
            #summary-container { max-width: 1200px; }
        }

        .profil-bar { background:#1e293b; color:white; border-radius:16px; padding:10px 14px; font-size:12px; line-height:1.9; word-break:break-word; }
        .profil-bar .lbl { color:#94a3b8; }
        .profil-bar .val { color:#f1f5f9; font-weight:600; }

        .selection-item { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid #f1f5f9; cursor:pointer; transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1); background:white; }
        .selection-item:last-child { border-bottom:none; }
        .s-num  { font-size:14px; color:#cbd5e1; width:24px; flex-shrink:0; font-weight:500; }
        .s-text { flex:1; font-size:14px; color:#64748b; white-space:normal; word-break:break-word; }
        .s-text strong { color:#1e293b; font-weight:700; }
        .s-star { font-size:28px; color:#ef4444; opacity:0; transition:opacity 0.2s; margin-left:8px; flex-shrink:0; }
        .selection-item.selected { transform:translateY(-2px) scale(1.01); background:#fffbeb; box-shadow:0 6px 20px -4px rgba(0,0,0,0.15); border-bottom-color:transparent; border-radius:12px; margin:2px 0; }
        .selection-item.selected .s-num  { color:#ef4444; font-weight:700; }
        .selection-item.selected .s-text { color:#92400e; }
        .selection-item.selected .s-text strong { color:#92400e; }
        .selection-item.selected .s-star { opacity:1; }

        .burc-btn { transition:all 0.2s; cursor:pointer; padding:8px 6px; border-radius:12px; border:2px solid #e2e8f0; text-align:center; background:white; outline:none; }
        .burc-btn.selected { border-color:#6366f1; background:#eef2ff; font-weight:700; }
        .burc-btn .burc-sembol { font-size:20px; display:block; }
        .burc-btn .burc-isim  { font-size:10px; color:#475569; }

        /* Çakır yorum kartı */
        .chakir-yorum {
            background: linear-gradient(135deg, #1e293b, #1e3a8a);
            border-radius: 16px; padding: 14px 16px; margin-bottom: 14px;
            display: flex; align-items: flex-start; gap: 10px;
        }
        .chakir-yorum-ava {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #e8a838, #f5c96a);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .chakir-yorum-text { font-size: .82rem; color: #e2e8f0; line-height: 1.55; }
        .chakir-yorum-text strong { color: #fbbf24; }
    </style>
</head>
<body>

<!-- Drama altyapısı -->
<div id="drama-overlay"><div class="drama-popup-inner"></div></div>
<div id="drama-inact-bar">
    <span class="drama-inact-emo">👀</span>
    <div class="drama-inact-texts">
        <div class="drama-inact-baslik">Burada durdu mu?</div>
        <div class="drama-inact-metin">Kriterleri seç ve devam et. Hediyelerin hazır.</div>
    </div>
    <div class="drama-inact-timer">12</div>
    <button class="drama-inact-btn" onclick="Drama.dismissInact()">Seçiyorum!</button>
</div>
<div id="drama-banner-0" class="drama-banner drama-banner-sari"><span class="drama-banner-txt"></span><span class="drama-banner-x" onclick="Drama.closeBanner(0)">✕</span></div>
<div id="drama-banner-1" class="drama-banner drama-banner-pembe"><span class="drama-banner-txt"></span><span class="drama-banner-x" onclick="Drama.closeBanner(1)">✕</span></div>
<div id="drama-banner-2" class="drama-banner drama-banner-mor"><span class="drama-banner-txt"></span><span class="drama-banner-x" onclick="Drama.closeBanner(2)">✕</span></div>
<div id="drama-banner-3" class="drama-banner drama-banner-yesil"><span class="drama-banner-txt"></span><span class="drama-banner-x" onclick="Drama.closeBanner(3)">✕</span></div>

<!-- Ana içerik -->
<div id="summary-container" class="min-h-screen bg-[#F9F9F9] py-6 px-4">
    <div class="max-w-xl mx-auto">

        <!-- Üst nav -->
        <div class="flex justify-between items-center mb-4">
            <a id="geri-btn" href="#" class="text-gray-500 text-sm" style="text-decoration:none;">← Geri</a>
            <a href="index.html" style="display:flex;align-items:center;gap:7px;text-decoration:none;">
                <div style="width:28px;height:28px;background:linear-gradient(135deg,#e8a838,#f5c96a);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;">🎁</div>
                <span style="font-family:Georgia,serif;font-size:16px;font-weight:900;color:#1e293b;">budur<span style="color:#e8a838;">buldum</span></span>
            </a>
            <a href="index.html" class="text-gray-500 text-sm" style="text-decoration:none;">Ana Sayfa</a>
        </div>

        <!-- Çakır yorum kartı -->
        <div class="chakir-yorum">
            <div class="chakir-yorum-ava">🔍</div>
            <div class="chakir-yorum-text" id="chakir-ozet-yorum">
                Cevaplar analiz ediliyor...
            </div>
        </div>

        <!-- Profil bar -->
        <div class="profil-bar mb-2" id="profil-bar"></div>

        <!-- Bütçe değiştirme -->
        <div class="flex items-center gap-2 mb-4 px-1">
            <span class="text-xs text-zinc-500 font-medium">Bütçe:</span>
            <div class="flex gap-1 flex-wrap" id="butce-butonlar"></div>
        </div>

        <!-- Kriter başlığı -->
        <div class="flex items-center justify-between px-1 mb-2">
            <div class="text-sm font-semibold text-zinc-600" id="kriter-baslik">
                <span>🎯 En önemli 6 kriteri seç</span>
                <span class="text-xs text-amber-600 ml-2">⭐ Burç Seçmeyi Unutmayın</span>
            </div>
            <span id="sel-count" class="text-xs font-bold px-2 py-1 bg-gray-100 text-gray-600 rounded-full">0/6</span>
        </div>

        <!-- Kriter listesi -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden mb-4">
            <div id="selections-list"></div>
        </div>

        <!-- Burç paneli -->
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-32">
            <div class="flex items-center justify-between mb-2">
                <div class="text-sm font-semibold text-zinc-700">⭐ Burcuna uygun hediye ekleyelim mi?</div>
                <span id="burc-badge" class="text-xs px-2 py-1 bg-indigo-100 text-indigo-700 rounded-full font-bold hidden">+1</span>
            </div>
            <div id="burc-panel"></div>
        </div>

        <!-- SABİT BUTON -->
        <div class="fixed bottom-6 left-0 right-0 px-4">
            <div class="max-w-xl mx-auto">
                <button onclick="showGifts()" id="show-gifts-btn" disabled
                    class="w-full bg-[#1e40af] text-white font-semibold text-xl px-10 py-5 rounded-3xl shadow-2xl flex items-center justify-center gap-3 transition-all disabled:bg-gray-400 disabled:cursor-not-allowed">
                    <i class="fas fa-gift"></i>
                    <span id="show-gifts-label">6 kriter seç → Hediyeleri Gör ✨</span>
                </button>
            </div>
        </div>

    </div>
</div>

<script>
let selectedCriteria = [];
let secilenBurc = null;

window.onload = function() {
    const cevaplar = QuizHelper.getCevaplar();
    const aktifSet = QuizHelper.getAktifSet();
    const sorular  = QuizHelper.getAktifSorular();
    const isOzel   = aktifSet !== 'normal';

    // Geri butonu
    var lastSoru = sorular[sorular.length - 1];
    for (var i = sorular.length - 1; i >= 0; i--) {
        if (QuizHelper.soruGecerliMi(sorular[i].id)) { lastSoru = sorular[i]; break; }
    }
    document.getElementById('geri-btn').href = lastSoru.sayfa;

    // Çakır yorumu
    renderChakir(cevaplar, sorular);

    // Profil bar
    renderProfilBar(cevaplar, sorular, isOzel);

    // Bütçe butonları
    renderButceButonlar(cevaplar, sorular, isOzel);

    // Kriter listesi
    renderKriterListesi(cevaplar, sorular, isOzel);

    // Burç paneli
    renderBurcPanel(cevaplar);

    // Durum
    afterSummaryReady();

    // Drama
    Drama.init('ozet');
};

// ── Çakır yorum ──────────────────────────────────────────
function renderChakir(cevaplar, sorular) {
    const el = document.getElementById('chakir-ozet-yorum');
    const kime    = cevaplar.kime    || '';
    const yas     = cevaplar.yas     || '';
    const tarz    = cevaplar.tarz    || '';
    const butce   = cevaplar.butce   || '';
    const hobiler = cevaplar.hobiler || '';

    const havuzKisisel = [
        'Tamam. Cevaplarını gördüm. <strong>Beklediğimden daha ilginç bir profil çıktı.</strong> Kriterleri seç, gerisini halledelim.',
        '<strong>Quiz bitti. Analiz yapıldı.</strong> Şimdi hangisinin önemli olduğunu sen söyle — ben hediyeyi bulayım.',
        'Cevapların kaydedildi. <strong>Dedektif Çakır hazır.</strong> Önemli gördüğün kriterleri işaretle.',
        '<strong>İlginç bir profil.</strong> Şu kriterleri dikkatle seç — hediyenin kalitesi buna bağlı.',
    ];

    // Kişiye özel ek
    let ozel = '';
    if (kime === 'Kendime') ozel = ' Kendine hediye alıyorsun — bu cesaret sayılır.';
    else if (kime === 'Sevgili') ozel = ' Sevgiliye hediye. Baskı yüksek, biliyorum.';
    else if (butce && butce.includes('Limitsiz')) ozel = ' Limitsiz bütçe seçtin. Bu ciddi bir özgüven.';
    else if (hobiler) ozel = ' ' + hobiler + ' ilgisi var — bu iyi bir ipucu.';

    const rastgele = havuzKisisel[Math.floor(Math.random() * havuzKisisel.length)];
    el.innerHTML = rastgele + ozel;
}

// ── Profil bar ──────────────────────────────────────────
function renderProfilBar(cevaplar, sorular, isOzel) {
    var profil = '';
    if (isOzel) {
        profil = sorular
            .map(function(s) {
                return cevaplar[s.id]
                    ? '<span class="lbl">' + s.soru.split('?')[0] + ': </span><span class="val">' + cevaplar[s.id] + '</span>'
                    : '';
            })
            .filter(Boolean).join(' &nbsp;·&nbsp; ');
    } else {
        profil = QUIZ_CONFIG.profilSabitler
            .filter(function(p) { return cevaplar[p.id]; })
            .map(function(p) { return '<span class="lbl">' + p.etiket + ': </span><span class="val">' + cevaplar[p.id] + '</span>'; })
            .join(' &nbsp;·&nbsp; ');
    }
    document.getElementById('profil-bar').innerHTML = profil;
}

// ── Bütçe butonları ──────────────────────────────────────
function renderButceButonlar(cevaplar, sorular, isOzel) {
    var butceSoru = sorular.find(function(s) { return s.id.includes('butce'); });
    if (!butceSoru) return;
    var butceDiv = document.getElementById('butce-butonlar');
    butceDiv.innerHTML = '';
    butceSoru.secenekler.forEach(function(b) {
        var isActive = cevaplar[butceSoru.id] === b;
        var bb = document.createElement('button');
        bb.className = 'text-xs px-3 py-1 rounded-full border-2 font-semibold transition-all ' +
            (isActive ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-zinc-600 border-zinc-300 hover:border-blue-400');
        bb.textContent = b;
        bb.onclick = function() {
            QuizHelper.setCevap(butceSoru.id, b);
            var c2 = QuizHelper.getCevaplar();
            renderProfilBar(c2, sorular, isOzel);
            butceDiv.querySelectorAll('button').forEach(function(x) {
                var active = x.textContent === b;
                x.className = 'text-xs px-3 py-1 rounded-full border-2 font-semibold transition-all ' +
                    (active ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-zinc-600 border-zinc-300 hover:border-blue-400');
            });
        };
        butceDiv.appendChild(bb);
    });
}

// ── Kriter listesi ───────────────────────────────────────
function renderKriterListesi(cevaplar, sorular, isOzel) {
    var list = document.getElementById('selections-list');
    list.innerHTML = '';
    var sira = 1;
    var sabitIdler = QUIZ_CONFIG.profilSabitler.map(function(p) { return p.id; });
    var negatifler = QUIZ_CONFIG.negatifler;

    for (var i = 0; i < sorular.length; i++) {
        var s = sorular[i];
        if (!cevaplar[s.id]) continue;
        if (!isOzel && sabitIdler.includes(s.id)) continue;
        if (negatifler.some(function(n) { return cevaplar[s.id].includes(n); })) continue;

        var div = document.createElement('div');
        div.className = 'selection-item';
        div.dataset.soruId = s.id;
        div.innerHTML = '<span class="s-num">' + sira + '.</span>' +
            '<span class="s-text">' + s.soru + ' <strong>' + cevaplar[s.id] + '</strong></span>' +
            '<span class="s-star">★</span>';
        (function(d, sid) {
            d.onclick = function() { toggleSelection(d, sid); };
        })(div, s.id);
        list.appendChild(div);
        sira++;
    }
}

// ── Burç paneli ──────────────────────────────────────────
function renderBurcPanel(cevaplar) {
    var panel = document.getElementById('burc-panel');
    panel.innerHTML = '';
    secilenBurc = null;

    var mevcutBurc = null;
    var dc = cevaplar.dogum || '';
    if (dc) {
        var m = dc.match(/([♈♉♊♋♌♍♎♏♐♑♒♓]) (\S+)/);
        if (m) mevcutBurc = m[0];
    }

    var toggleBtn = document.createElement('div');
    toggleBtn.className = 'text-sm font-semibold text-indigo-700 mb-3';
    if (mevcutBurc) {
        secilenBurc = mevcutBurc;
        toggleBtn.textContent = '⭐ Burç seçimi — ' + mevcutBurc + ' seçili';
        document.getElementById('burc-badge').classList.remove('hidden');
    } else {
        toggleBtn.textContent = '⭐ Burcu biliyorsan seç (opsiyonel)';
    }

    var grid = document.createElement('div');
    grid.className = 'grid grid-cols-4 gap-2 mt-2';
    QUIZ_CONFIG.burclar.forEach(function(b) {
        var bb = document.createElement('button');
        bb.className = 'burc-btn';
        bb.innerHTML = '<span class="burc-sembol">' + b.sembol + '</span><span class="burc-isim">' + b.isim + '</span>';
        if (mevcutBurc && mevcutBurc.includes(b.isim)) bb.classList.add('selected');
        bb.onclick = function() {
            var zaten = bb.classList.contains('selected');
            grid.querySelectorAll('.burc-btn').forEach(function(x) { x.classList.remove('selected'); });
            if (!zaten) {
                bb.classList.add('selected');
                secilenBurc = b.sembol + ' ' + b.isim;
                toggleBtn.textContent = '⭐ Burç seçimi — ' + secilenBurc + ' seçili';
                document.getElementById('burc-badge').classList.remove('hidden');
            } else {
                secilenBurc = null;
                toggleBtn.textContent = '⭐ Burcu biliyorsan seç (opsiyonel)';
                document.getElementById('burc-badge').classList.add('hidden');
            }
        };
        grid.appendChild(bb);
    });
    panel.appendChild(toggleBtn);
    panel.appendChild(grid);
}

// ── Durum güncelle ───────────────────────────────────────
function afterSummaryReady() {
    var items = document.querySelectorAll('#selections-list .selection-item');
    var adet  = items.length;
    var btn   = document.getElementById('show-gifts-btn');
    var lbl   = document.getElementById('show-gifts-label');
    var baslik = document.getElementById('kriter-baslik');

    if (adet === 0) {
        if (baslik) baslik.textContent = '🎯 Profil tamamlandı';
        document.getElementById('selections-list').innerHTML =
            '<div onclick="showGifts()" style="cursor:pointer;display:flex;align-items:center;gap:16px;padding:20px;background:linear-gradient(135deg,#eff6ff,#eef2ff);border-radius:16px;border:2px solid #bfdbfe;">' +
            '<span style="font-size:40px;">🎁</span>' +
            '<div style="flex:1;"><div style="font-weight:700;color:#1d4ed8;font-size:17px;">Hediyeleri görelim mi?</div>' +
            '<div style="font-size:13px;color:#6366f1;margin-top:6px;">Profil bilgilerinle en uygun hediyeleri buluyoruz</div></div>' +
            '<span style="color:#3b82f6;font-size:28px;font-weight:bold;">→</span></div>';
        document.getElementById('sel-count').textContent = '';
        btn.disabled = false;
        lbl.textContent = 'Hediyeleri Gör ✨';
    } else {
        var limit = Math.min(6, adet);
        if (baslik) baslik.textContent = '🎯 En önemli ' + limit + ' kriteri seç';
        document.getElementById('sel-count').textContent = '0/' + limit;
        btn.disabled = true;
        lbl.textContent = limit + ' kriter seç → Hediyeleri Gör ✨';
    }
}

function toggleSelection(el, soruId) {
    if (el.classList.contains('selected')) {
        selectedCriteria = selectedCriteria.filter(function(c) { return c.id !== soruId; });
        el.classList.remove('selected');
    } else {
        var maxSel = Math.min(6, document.querySelectorAll('.selection-item').length);
        if (maxSel > 0 && selectedCriteria.length >= maxSel) return;
        var grup = selectedCriteria.length < 3 ? 'A' : 'B';
        selectedCriteria.push({ id: soruId, grup: grup });
        el.classList.add('selected');
    }
    updateSelCount();
}

function updateSelCount() {
    var t = selectedCriteria.length;
    var available = document.querySelectorAll('#selections-list .selection-item').length;
    var limit = Math.min(6, available);
    document.getElementById('sel-count').textContent = t + '/' + limit;
    var btn = document.getElementById('show-gifts-btn');
    var lbl = document.getElementById('show-gifts-label');
    if (available === 0 || t >= limit) {
        btn.disabled = false;
        lbl.textContent = 'Hediyeleri Gör ✨';
    } else {
        btn.disabled = true;
        lbl.textContent = (limit - t) + ' tane daha seç ✨';
    }
}

function showGifts() {
    localStorage.setItem('budurBuldumSelectedCriteria', JSON.stringify(selectedCriteria));
    localStorage.setItem('budurBuldumSecilenBurc', secilenBurc || '');
    window.location.href = 'hediyeler.html';
}
</script>
</body>
</html>
