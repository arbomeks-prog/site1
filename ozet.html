    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #F9F9F9; overflow-x: hidden; margin: 0; }
        /* Floating 6 kriter seç butonu - sağda dikey */
        #floating-kriter-btn {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 16px 0 0 16px;
            padding: 16px 10px;
            box-shadow: -4px 0 20px rgba(30,64,175,0.35);
            cursor: default;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.08em;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            min-height: 140px;
            transition: background 0.4s, box-shadow 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #floating-kriter-btn.complete {
            background: #16a34a;
            box-shadow: -4px 0 20px rgba(22,163,74,0.4);
        }
        #floating-count-badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 900;
            position: absolute;
            top: -8px;
            right: 4px;
            border: 2px solid white;
            writing-mode: horizontal-tb;
        }
        /* Countdown animasyonu */
        @keyframes pulse-sel {
            0%   { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .selection-item.just-selected { animation: pulse-sel 0.2s ease; }
        /* Burç başlık */
        #burc-baslik {
            font-size: 18px;
            font-weight: 900;
            color: #4338ca;
            letter-spacing: 0.02em;
            margin-bottom: 10px;
        }
        .profil-bar { background:#1e293b; color:white; border-radius:16px; padding:10px 14px; font-size:12px; line-height:1.9; word-break:break-word; }
        .profil-bar .lbl { color:#94a3b8; }
        .profil-bar .val { color:#f1f5f9; font-weight:600; }
        .selection-item { display:flex; align-items:center; padding:6px 16px; border-bottom:1px solid #f1f5f9; cursor:pointer; transition:all 0.2s ease; background:white; }
        .selection-item:last-child { border-bottom:none; }
        .s-num { font-size:14px; color:#1e293b; width:26px; flex-shrink:0; font-weight:700; }
        .s-text { flex:1; font-size:13px; color:#94a3b8; }
        .s-text strong { color:#64748b; font-weight:600; }
        .s-star { display:none; }
        .selection-item.selected { background:white; }
        .selection-item.selected .s-num { color:#16a34a; font-weight:900; font-size:15px; }
        .selection-item.selected .s-text { font-size:15px; font-weight:800; color:#1e293b; }
        .selection-item.selected .s-text strong { color:#1e293b; font-weight:900; }
        .burc-btn { transition:all 0.2s; cursor:pointer; padding:8px 6px; border-radius:12px; border:2px solid #e2e8f0; text-align:center; background:white; outline:none; }
        .burc-btn.selected { border-color:#6366f1; background:#eef2ff; font-weight:700; }
        .burc-btn .burc-sembol { font-size:20px; display:block; }
        .burc-btn .burc-isim { font-size:10px; color:#475569; }
    </style>

<body>

<div id="summary-container" class="min-h-screen bg-[#F9F9F9] py-6 px-4">
    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <a id="geri-btn" href="#" class="text-gray-500 text-sm" style="text-decoration:none;">← Geri</a>
            <a href="index.html" style="display:flex;align-items:center;gap:7px;text-decoration:none;">
                <div style="width:28px;height:28px;background:linear-gradient(135deg,#e8a838,#f5c96a);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;">🎁</div>
                <span style="font-family:Georgia,serif;font-size:16px;font-weight:900;color:#1e293b;">budur<span style="color:#e8a838;">buldum</span></span>
            </a>
            <a href="index.html" class="text-gray-500 text-sm" style="text-decoration:none;">Ana Sayfa</a>
        </div>
        <div id="profil-bar" class="profil-bar mb-2"></div>
        <!-- Bütçe değiştirme -->
        <div class="text-center mb-2" id="butce-baslik-wrapper">
            <span style="font-size:13px;font-weight:800;color:#1e40af;letter-spacing:0.05em;border-bottom:2px solid #1e40af;padding-bottom:2px;">💰 BÜTÇEYİ DEĞİŞTİREBİLİRSİNİZ</span>
        </div>
        <div class="flex items-center gap-2 mb-4 px-1">
            <div class="flex gap-1 flex-wrap" id="butce-butonlar"></div>
        </div>
        <div class="px-1 mb-3 flex items-center gap-2">
            <div id="kriter-baslik" style="font-size:22px;font-weight:900;color:#1e293b;letter-spacing:0.01em;line-height:1.2;white-space:nowrap;">🎯 En önemli 6 kriteri seç</div>
            <span id="sel-count" class="text-sm font-bold px-3 py-1 bg-blue-100 text-blue-700 rounded-full flex-shrink-0">0/6</span>
        </div>
        <div class="bg-white rounded-xl overflow-hidden mb-1" style="border:1px solid #f1f5f9;">
            <div id="selections-list"></div>
        </div>
        <!-- Hediyeleri Gör butonu - listenin hemen altında, başlangıçta gizli -->
        <div class="px-1 mb-4" id="hediye-btn-wrapper" style="display:none;">
            <button onclick="showGifts()" id="show-gifts-btn" disabled
                class="w-full bg-[#1e40af] text-white font-semibold text-xl px-10 py-5 rounded-3xl shadow-2xl flex items-center justify-center gap-3 transition-all disabled:bg-gray-400 disabled:cursor-not-allowed">
                <i class="fas fa-gift"></i>
                <span id="show-gifts-label">6 kriter seç → Hediyeleri Gör ✨</span>
            </button>
        </div>
        <div class="text-center py-2 mb-3">
            <span style="font-size:13px;color:#94a3b8;font-weight:600;">↓ aşağıya kaydır ↓</span>
        </div>
        <!-- Burç paneli -->
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-8">
            <div class="flex items-center justify-between mb-3">
                <div id="burc-baslik">⭐ Burcunu seç — şansını artır!</div>
                <span id="burc-badge" class="text-xs px-2 py-1 bg-indigo-100 text-indigo-700 rounded-full font-bold hidden">+1</span>
            </div>
            <div id="burc-panel"></div>
        </div>
    </div>
</div>
<!-- Floating 6 kriter seç - sağda dikey -->
<div id="floating-kriter-btn">
    <span id="floating-count-badge" style="display:none;">0</span>
    6 KRİTER SEÇ
</div>

<script>
    let selectedCriteria = [];
    let secilenBurc = null;

    window.onload = function() {
        // Sayfa açılınca smooth scroll ile "bütçeyi değiştirebilirsiniz" yazısına in
        setTimeout(function() {
            const target = document.getElementById('butce-baslik-wrapper');
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }, 600);
        // Quiz tamamlama sesi
        if(typeof BudurSes!=='undefined') BudurSes.tamam();

        const cevaplar = QuizHelper.getCevaplar();
        const aktifSet = QuizHelper.getAktifSet();
        const sorular = QuizHelper.getAktifSorular();
        const isOzel = aktifSet !== 'normal';

        // Geri butonu — son geçerli soruya dön
        let lastSoru = sorular[sorular.length - 1];
        for (let i = sorular.length - 1; i >= 0; i--) {
            if (QuizHelper.soruGecerliMi(sorular[i].id)) {
                lastSoru = sorular[i];
                break;
            }
        }
        document.getElementById('geri-btn').href = lastSoru.sayfa;

        // Profil barı
        renderProfilBar(cevaplar, sorular, isOzel);

        // Bütçe butonları
        renderButceButonlar(cevaplar, sorular, isOzel);

        // Kriter listesi
        renderKriterListesi(cevaplar, sorular, isOzel);

        // Burç paneli
        renderBurcPanel(cevaplar);

        // Durumu kontrol et
        afterSummaryReady();
    };

    function renderProfilBar(cevaplar, sorular, isOzel) {
        let profil = '';
        if (isOzel) {
            profil = sorular
                .map(s => cevaplar[s.id] ? '<span class="lbl">' + s.soru.split('?')[0] + ': </span><span class="val">' + cevaplar[s.id] + '</span>' : '')
                .filter(Boolean).join(' &nbsp;·&nbsp; ');
        } else {
            profil = QUIZ_CONFIG.profilSabitler
                .filter(p => cevaplar[p.id])
                .map(p => '<span class="lbl">' + p.etiket + ': </span><span class="val">' + cevaplar[p.id] + '</span>')
                .join(' &nbsp;·&nbsp; ');
        }
        document.getElementById('profil-bar').innerHTML = profil;
    }

    function renderButceButonlar(cevaplar, sorular, isOzel) {
        const butceSoru = sorular.find(s => s.id.includes('butce'));
        if (!butceSoru) return;
        const butceler = butceSoru.secenekler;
        const butceDiv = document.getElementById('butce-butonlar');
        butceDiv.innerHTML = '';
        butceler.forEach(b => {
            const isActive = cevaplar[butceSoru.id] === b;
            const bb = document.createElement('button');
            bb.className = 'text-xs px-3 py-1 rounded-full border-2 font-semibold transition-all ' +
                (isActive ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-zinc-600 border-zinc-300 hover:border-blue-400');
            bb.textContent = b;
            bb.onclick = function() {
                QuizHelper.setCevap(butceSoru.id, b);
                // Güncelle
                const c2 = QuizHelper.getCevaplar();
                renderProfilBar(c2, sorular, isOzel);
                butceDiv.querySelectorAll('button').forEach(x => {
                    const active = x.textContent === b;
                    x.className = 'text-xs px-3 py-1 rounded-full border-2 font-semibold transition-all ' +
                        (active ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-zinc-600 border-zinc-300 hover:border-blue-400');
                });
            };
            butceDiv.appendChild(bb);
        });
    }

    function renderKriterListesi(cevaplar, sorular, isOzel) {
        const list = document.getElementById('selections-list');
        list.innerHTML = '';
        let sira = 1;
        const sabitIdler = QUIZ_CONFIG.profilSabitler.map(p => p.id);
        const negatifler = QUIZ_CONFIG.negatifler;

        for (let i = 0; i < sorular.length; i++) {
            const s = sorular[i];
            if (!cevaplar[s.id]) continue;
            // Normal sette sabit olanları atla (profil barında zaten var)
            if (!isOzel && sabitIdler.includes(s.id)) continue;
            // Negatif cevapları atla
            if (negatifler.some(n => cevaplar[s.id].includes(n))) continue;

            const div = document.createElement('div');
            div.className = 'selection-item';
            div.dataset.soruId = s.id;
            div.innerHTML = '<span class="s-num">' + sira + '.</span>' +
                '<span class="s-text">' + s.soru + ' <strong>' + cevaplar[s.id] + '</strong></span>' +
                '<span class="s-star">★</span>';
            div.onclick = function() { toggleSelection(div, s.id); };
            list.appendChild(div);
            sira++;
        }
    }

    function renderBurcPanel(cevaplar) {
        const panel = document.getElementById('burc-panel');
        panel.innerHTML = '';
        secilenBurc = null;

        // Mevcut burç var mı?
        let mevcutBurc = null;
        const dc = cevaplar.dogum || '';
        if (dc) {
            const m = dc.match(/([♈♉♊♋♌♍♎♏♐♑♒♓]) (\S+)/);
            if (m) mevcutBurc = m[0];
        }

        const burcBaslik = document.getElementById('burc-baslik');
        if (mevcutBurc) {
            secilenBurc = mevcutBurc;
            if (burcBaslik) burcBaslik.textContent = '⭐ Burç seçimi — ' + mevcutBurc + ' seçili';
            document.getElementById('burc-badge').classList.remove('hidden');
        } else {
            if (burcBaslik) burcBaslik.textContent = '⭐ Burcunu seç — şansını artır!';
        }

        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-4 gap-2 mt-2';
        QUIZ_CONFIG.burclar.forEach(b => {
            const bb = document.createElement('button');
            bb.className = 'burc-btn';
            bb.innerHTML = '<span class="burc-sembol">' + b.sembol + '</span><span class="burc-isim">' + b.isim + '</span>';
            if (mevcutBurc && mevcutBurc.includes(b.isim)) bb.classList.add('selected');
            bb.onclick = function() {
                const zaten = bb.classList.contains('selected');
                grid.querySelectorAll('.burc-btn').forEach(x => { x.classList.remove('selected'); });
                if (!zaten) {
                    bb.classList.add('selected');
                    secilenBurc = b.sembol + ' ' + b.isim;
                    if (burcBaslik) burcBaslik.textContent = '⭐ Burç seçimi — ' + secilenBurc + ' seçili';
                    document.getElementById('burc-badge').classList.remove('hidden');
                } else {
                    secilenBurc = null;
                    if (burcBaslik) burcBaslik.textContent = '⭐ Burcunu seç — şansını artır!';
                    document.getElementById('burc-badge').classList.add('hidden');
                }
            };
            grid.appendChild(bb);
        });
        panel.appendChild(grid);
    }

    function updateFloatingBtn(selected, limit) {
        const fb = document.getElementById('floating-kriter-btn');
        const badge = document.getElementById('floating-count-badge');
        if (!fb) return;
        const kalan = limit - selected;
        if (kalan <= 0) {
            fb.classList.add('complete');
            fb.innerHTML = '<span id="floating-count-badge" style="display:none;"></span>✓ TAMAM!';
        } else {
            fb.classList.remove('complete');
            badge.style.display = 'flex';
            badge.textContent = selected;
            fb.innerHTML = '<span id="floating-count-badge" style="position:absolute;top:-8px;right:4px;background:#ef4444;color:white;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border:2px solid white;writing-mode:horizontal-tb;">' + selected + '</span>' + kalan + ' KALDI';
        }
    }

    function afterSummaryReady() {
        const secilenItems = document.querySelectorAll('#selections-list .selection-item');
        const adet = secilenItems.length;
        const btn = document.getElementById('show-gifts-btn');
        const lbl = document.getElementById('show-gifts-label');
        const baslik = document.getElementById('kriter-baslik');
        const wrapper = document.getElementById('hediye-btn-wrapper');

        if (adet === 0) {
            if (baslik) baslik.textContent = '🎯 Profil tamamlandı';
            document.getElementById('selections-list').innerHTML =
                '<div onclick="showGifts()" style="cursor:pointer;display:flex;align-items:center;gap:16px;padding:20px;background:linear-gradient(135deg,#eff6ff,#eef2ff);border-radius:16px;border:2px solid #bfdbfe;">' +
                '<span style="font-size:40px;">🎁</span>' +
                '<div style="flex:1;"><div style="font-weight:700;color:#1d4ed8;font-size:17px;">Hediyeleri görelim mi?</div>' +
                '<div style="font-size:13px;color:#6366f1;margin-top:6px;">Profil bilgilerinle en uygun hediyeleri buluyoruz</div></div>' +
                '<span style="color:#3b82f6;font-size:28px;font-weight:bold;">→</span></div>';
            document.getElementById('sel-count').textContent = '';
            if (wrapper) { wrapper.style.display = 'block'; }
            btn.disabled = false;
            lbl.textContent = 'Hediyeleri Gör ✨';
            document.getElementById('floating-kriter-btn').style.display = 'none';
        } else {
            const limit = Math.min(6, adet);
            if (baslik) baslik.textContent = '🎯 En önemli ' + limit + ' kriteri seç';
            document.getElementById('sel-count').textContent = '0/' + limit;
            btn.disabled = true;
            lbl.textContent = limit + ' kriter seç → Hediyeleri Gör ✨';
            updateFloatingBtn(0, limit);
        }
    }

    function toggleSelection(el, soruId) {
        if (el.classList.contains('selected')) {
            selectedCriteria = selectedCriteria.filter(c => c.id !== soruId);
            el.classList.remove('selected');
        } else {
            const maxSel = Math.min(6, document.querySelectorAll('.selection-item').length);
            if (maxSel > 0 && selectedCriteria.length >= maxSel) return;
            const grup = selectedCriteria.length < 3 ? 'A' : 'B';
            selectedCriteria.push({ id: soruId, grup: grup });
            el.classList.add('selected');
            // Geri sayım animasyonu
            el.classList.add('just-selected');
            setTimeout(() => el.classList.remove('just-selected'), 400);
        }
        updateSelCount();
    }

    function updateSelCount() {
        const t = selectedCriteria.length;
        const available = document.querySelectorAll('#selections-list .selection-item').length;
        const limit = Math.min(6, available);
        document.getElementById('sel-count').textContent = t + '/' + limit;
        const btn = document.getElementById('show-gifts-btn');
        const lbl = document.getElementById('show-gifts-label');
        const wrapper = document.getElementById('hediye-btn-wrapper');

        updateFloatingBtn(t, limit);

        if (available === 0 || t >= limit) {
            btn.disabled = false;
            lbl.textContent = 'Hediyeleri Gör ✨';
            if (wrapper) { wrapper.style.display = 'block'; }
            // 6 seçim tamam → smooth scroll ile butona in
            setTimeout(function() {
                btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        } else {
            btn.disabled = true;
            lbl.textContent = (limit - t) + ' tane daha seç ✨';
        }
    }

    function showGifts() {
        // Seçilen kriterleri ve burcu localStorage'a kaydet
        localStorage.setItem('budurBuldumSelectedCriteria', JSON.stringify(selectedCriteria));
        localStorage.setItem('budurBuldumSecilenBurc', secilenBurc || '');

        // Quiz cevaplarını veritabanına kaydet (sendBeacon sayfa kapansa bile çalışır)
        try {
            const sessionId = localStorage.getItem('budurBuldumSessionId');
            if (sessionId) {
                const cevaplar = QuizHelper.getCevaplar();
                const logData = JSON.stringify({
                    session_id: sessionId,
                    cinsiyet: cevaplar.cinsiyet || localStorage.getItem('budurBuldumGender') || '',
                    yas: cevaplar.yas || '',
                    iliski_durumu: cevaplar.kime || '',
                    butce: cevaplar.butce || '',
                    ilgi_alanlari: cevaplar.hobiler || '',
                    ozel_not: JSON.stringify({
                        tum_cevaplar: cevaplar,
                        secilen_kriterler: selectedCriteria,
                        burc: secilenBurc || ''
                    })
                });
                navigator.sendBeacon('/api/log-quiz', new Blob([logData], { type: 'application/json' }));
            }
        } catch(e) { console.warn('Log hatası (ignored):', e); }

        // Hediye sayfasına git
        window.location.href = 'hediyeler.html';
    }
</script>
