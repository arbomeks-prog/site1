<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d1a; overflow: hidden; width: 100vw; height: 100vh; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<audio id="ses-ciglik" src="ses-muzik.mp3" preload="auto"></audio>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const ZEMIN = () => H * 0.72;
const TL = () => W * 0.33;
const TR = () => W * 0.67;

// Çiftler halinde — aynı anda çıkacak
const CIFTER = [
  {sol:"Babalar günü\ngeliyor eyvah...", sag:"Ben babama ne\nalacağım şimdi?"},
  {sol:"Kaç gün kaldı\nbabalar gününe?", sag:"Babamı en çok\nne severdi benim?"},
  {sol:"Hep aynı şeyleri\nalıyoruz yazık ya...", sag:"Müzik zevki\nneydi babamın?"},
  {sol:"En sevdiği renk\ntonunu düşünüyorum...", sag:"Hediye güzel mi\ngözüksün..."},
  {sol:"Hediye anlamlı mı\nolsun...", sag:"Geç mi kaldım,\nkargo gelir mi?"},
  {sol:"Yine mi 100 site\ngezeceğim?", sag:"Keşke bir yer olsa\nbana sorsaydı..."},
];

let frame = 0;
let ox = -80, kx = 0;

// Özel balonlar
let ozelFaz = 'bekle'; // bekle -> karmas -> cildirma -> ciglik -> logo -> bitti
let ozelTimer = 0;
let ozelOpacity = 0;
let ciglikGoster = false;
let ciglikScale = 0;
let ciglikAngle = 0;
let ciglikY = 0; // ciglik resmi aşağı düşecek
let budurY = -200; // yukarıdan iniyor
let buldumY = -200;
let logoFaz = 0; // 0=hazır değil, 1=iniyor, 2=durdu, 3=ciglik düşüyor, 4=bitti
let logoTimer = 0;
let guluyor = false;
let oOtur = false, kOtur = false;
let oOturT = 0, kOturT = 0;

let ozelBasladi = false;
let aktifCift = null; // {sol, sag, opacity, faz, timer}
let ciftIdx = 0;

function sonrakiCift() {
  if (ciftIdx >= CIFTER.length) return;
  aktifCift = { ...CIFTER[ciftIdx++], opacity: 0, faz: 'in', timer: 0 };
}

function updateYazi() {
  if (!aktifCift) {
    if (frame > 60) sonrakiCift();
    return;
  }
  aktifCift.timer++;
  const fadeSpd = 0.04, durSure = 200;
  if (aktifCift.faz === 'in') {
    aktifCift.opacity = Math.min(aktifCift.opacity + fadeSpd, 1);
    if (aktifCift.opacity >= 1) { aktifCift.faz = 'dur'; aktifCift.timer = 0; }
  } else if (aktifCift.faz === 'dur') {
    if (aktifCift.timer > durSure) { aktifCift.faz = 'out'; aktifCift.timer = 0; }
  } else {
    aktifCift.opacity = Math.max(aktifCift.opacity - fadeSpd, 0);
    if (aktifCift.opacity <= 0) {
      aktifCift = null;
      if (ciftIdx < CIFTER.length) setTimeout(sonrakiCift, 200);
      else if (!ozelBasladi) { ozelBasladi = true; setTimeout(baslaTepki, 300); }
    }
  }
}

function baslaTepki() {
  ozelFaz = 'karmas';
  ozelTimer = 0;
  ozelOpacity = 0;
}

function updateOzel() {
  if (ozelFaz === 'bekle') return;
  ozelTimer++;

  if (ozelFaz === 'karmas') {
    ozelOpacity = Math.min(ozelOpacity + 0.05, 1);
    if (ozelTimer > 220) { ozelFaz = 'cildirma'; ozelTimer = 0; ozelOpacity = 0; }
  } else if (ozelFaz === 'cildirma') {
    ozelOpacity = Math.min(ozelOpacity + 0.05, 1);
    if (ozelTimer > 220) {
      ozelFaz = 'ciglik';
      ozelTimer = 0;
      ciglikGoster = true;
      ciglikScale = 0;
      document.getElementById('ses-ciglik').currentTime = 0;
      document.getElementById('ses-ciglik').play();
    }
  } else if (ozelFaz === 'ciglik') {
    ciglikScale = Math.min(ciglikScale + 0.04, 1);
    ciglikAngle = Math.sin(ozelTimer * 0.25) * 0.12;
    ciglikY = 0;
    if (ozelTimer > 180) { ozelFaz = 'logo'; ozelTimer = 0; logoFaz = 1; }
  } else if (ozelFaz === 'logo') {
    logoTimer++;
    if (logoFaz === 1) {
      // BUDUR ve BULDUM yukarıdan iner
      budurY = Math.min(budurY + 12, 0);
      buldumY = Math.min(buldumY + 12, 0);
      if (budurY >= 0 && buldumY >= 0) { logoFaz = 2; logoTimer = 0; }
    } else if (logoFaz === 2) {
      // Kısa dur, sonra çığlık aşağı düşsün
      if (logoTimer > 40) { logoFaz = 3; logoTimer = 0; }
    } else if (logoFaz === 3) {
      // Çığlık resmi hızla aşağı düşer
      ciglikY += 60;
      if (ciglikY > H) { ciglikGoster = false; logoFaz = 4; guluyor = true; setTimeout(baslaQA, 300); }
    }
  }
}

function drawOzelYazi(metin1, metin2, opacity) {
  if (opacity <= 0) return;
  ctx.save();
  ctx.globalAlpha = opacity;
  const fontSize = W * 0.052;
  const satirH = fontSize * 1.55;

  function yazSatirlar(metin, isKiz) {
    const satirlar = metin.split('\n');
    const topY = H * 0.38;
    const textX = isKiz ? W * 0.86 : W * 0.14;
    ctx.font = `italic bold ${fontSize}px 'Comic Sans MS', cursive, sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = isKiz ? 'right' : 'left';
    satirlar.forEach((s, i) => {
      const xOff = (i%2===0?-1:1)*W*0.007;
      const ang = (i%2===0?-1:1)*0.025;
      ctx.save(); ctx.translate(textX+xOff, topY+i*satirH); ctx.rotate(ang);
      ctx.fillText(s, 0, 0); ctx.restore();
    });
    return { x: textX, y: topY + satirlar.length * satirH + W*0.01 };
  }

  const p1 = yazSatirlar(metin1, false);
  const p2 = yazSatirlar(metin2, true);

  // Oklar
  const oHeadY = oOtur ? ZEMIN()-W*0.065*1.4-W*0.0012*80-W*0.0012*44-W*0.0012*11 : ZEMIN()-W*0.0012*80-W*0.0012*33;
  const kHeadY = oHeadY;
  ctx.save();
  ctx.globalAlpha = opacity;
  drawOk(p1.x, p1.y, ox, oHeadY, 1);
  drawOk(p2.x, p2.y, kx, kHeadY, 1);
  ctx.restore();
  ctx.restore();
}

const ciglikImg = new Image();
ciglikImg.src = '/assets/ciglik-bg.jpg';

function drawCiglik() {
  if (!ciglikGoster || ciglikScale <= 0) return;
  const size = W * 0.55 * ciglikScale;
  ctx.save();
  ctx.translate(W/2, H*0.42 + ciglikY);
  ctx.rotate(ciglikAngle);
  ctx.drawImage(ciglikImg, -size/2, -size/2, size, size);
  ctx.restore();
}

// 10 soru çifti — sol=oglan cevabı sola uçar, sag=kiz sağa uçar
const QA_CIFTER = [
  {sol:"Hediye kime?", solC:"Babam 👨", sag:"Ne için?", sagC:"Babalar Günü 🎁"},
  {sol:"Tarzı nasıl?", solC:"Klasik/Şık", sag:"Hobisi ne?", sagC:"Teknoloji 💻"},
  {sol:"Bütçen?", solC:"500-1500 TL", sag:"Öncelik?", sagC:"Anlamlı olsun"},
  {sol:"Yaşı?", solC:"45-55", sag:"Cinsiyeti?", sagC:"Erkek"},
  {sol:"Renk tercihi?", solC:"Koyu tonlar", sag:"Ortam?", sagC:"Ev/İş"},
  {sol:"Mevsim?", solC:"İlkbahar", sag:"Tarz?", sagC:"Modern"},
  {sol:"Müzik zevki?", solC:"Rock/Caz", sag:"Spor yapar mı?", sagC:"Evet 🏃"},
  {sol:"Seyahat sever mi?", solC:"Çok sever ✈️", sag:"Teknoloji?", sagC:"Meraklı 📱"},
  {sol:"Hediye boyutu?", solC:"Küçük/Şık", sag:"Teslimat?", sagC:"Kargoya ver"},
  {sol:"Son dokunuş?", solC:"Özel kutu 🎀", sag:"Mesaj?", sagC:"Kişisel not"},
];

let qaIdx = 0;
let qaFaz = 'bekle'; // bekle, soru, ucus
let qaTimer = 0;
let qaOpacity = 0;
let qaUcusX_sol = 0; // sola uçan cevap
let qaUcusX_sag = 0; // sağa uçan cevap
let qaUcusOp = 0;
let qaGosterSoru = false;
let qaHiz = 90; // ilk soru yavaş, giderek azalır

function baslaQA() {
  qaFaz = 'soru';
  qaTimer = 0;
  qaOpacity = 0;
  qaGosterSoru = true;
}

function updateQA() {
  if (qaFaz === 'bekle') return;
  qaTimer++;

  if (qaFaz === 'soru') {
    qaOpacity = Math.min(qaOpacity + 0.08, 1);
    const bekleSure = Math.max(qaHiz - qaIdx * 7, 30); // giderek hızlanır
    if (qaTimer > bekleSure) {
      qaFaz = 'ucus';
      qaTimer = 0;
      qaUcusX_sol = 0;
      qaUcusX_sag = 0;
      qaUcusOp = 1;
    }
  } else if (qaFaz === 'ucus') {
    qaUcusX_sol -= W * 0.025; // sola uçar
    qaUcusX_sag += W * 0.025; // sağa uçar
    qaUcusOp = Math.max(qaUcusOp - 0.07, 0);
    if (qaUcusOp <= 0) {
      qaIdx++;
      if (qaIdx < QA_CIFTER.length) {
        qaFaz = 'soru';
        qaTimer = 0;
        qaOpacity = 0;
      } else {
        qaFaz = 'bitti';
        qaGosterSoru = false;
      }
    }
  }
}

function drawQA() {
  if (!qaGosterSoru || qaIdx >= QA_CIFTER.length) return;
  const c = QA_CIFTER[qaIdx];
  const fs = W * 0.042;
  const merkez = W / 2;
  const soruY = H * 0.30;

  ctx.save();

  // Sol soru (oğlan)
  ctx.globalAlpha = qaOpacity;
  ctx.font = `italic bold ${fs}px 'Comic Sans MS', cursive, sans-serif`;
  ctx.fillStyle = '#7ec8f8';
  ctx.textAlign = 'right';
  ctx.fillText(c.sol, merkez - W*0.05, soruY);

  // Sağ soru (kız)
  ctx.fillStyle = '#f8a4c8';
  ctx.textAlign = 'left';
  ctx.fillText(c.sag, merkez + W*0.05, soruY);

  // Cevaplar — uçuş fazında
  if (qaFaz === 'ucus') {
    ctx.globalAlpha = qaUcusOp;
    ctx.font = `bold ${fs*0.9}px 'Comic Sans MS', cursive, sans-serif`;
    // Sol cevap sola uçar
    ctx.fillStyle = '#FFD93D';
    ctx.textAlign = 'right';
    ctx.fillText('✓ ' + c.solC, merkez - W*0.05 + qaUcusX_sol, soruY + fs*1.4);
    // Sağ cevap sağa uçar
    ctx.textAlign = 'left';
    ctx.fillText('✓ ' + c.sagC, merkez + W*0.05 + qaUcusX_sag, soruY + fs*1.4);
  }

  ctx.restore();
}

function drawLogo() {
  if (logoFaz < 1) return;
  const fs = W * 0.055; // küçük halo boyutu
  const basR = W * 0.0012 * 22;
  const kafaY = ZEMIN() - W*0.0012*80 - basR*8.5; // kafanın hemen üstü

  ctx.font = `900 ${fs}px 'Bebas Neue', 'Arial Black', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD93D';

  // BUDUR — oğlanın kafası üstüne iner
  ctx.save();
  ctx.translate(ox, kafaY + budurY);
  ctx.fillText('BUDUR', 0, 0);
  ctx.restore();

  // BULDUM — kızın kafası üstüne iner
  ctx.save();
  ctx.translate(kx, kafaY + buldumY);
  ctx.fillText('BULDUM', 0, 0);
  ctx.restore();
}

function drawZemin() {
  ctx.fillStyle = '#0d0d1a'; ctx.fillRect(0, 0, W, H);
  const grad = ctx.createRadialGradient(W/2, H*0.28, 20, W/2, H*0.28, W*0.7);
  grad.addColorStop(0, 'rgba(255,230,150,0.10)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1e1e38'; ctx.fillRect(0, ZEMIN(), W, H - ZEMIN());
  ctx.fillStyle = '#4a4a8a'; ctx.fillRect(0, ZEMIN(), W, 2);
}

function drawTabure(x) {
  const Z = ZEMIN(), s = W * 0.07;
  ctx.strokeStyle = '#c8a96e'; ctx.lineWidth = W * 0.007; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x-s, Z-s*1.4); ctx.lineTo(x+s, Z-s*1.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s*0.8, Z-s*1.4); ctx.lineTo(x-s*0.9, Z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+s*0.8, Z-s*1.4); ctx.lineTo(x+s*0.9, Z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s*0.8, Z-s*0.7); ctx.lineTo(x+s*0.8, Z-s*0.7); ctx.stroke();
}

function drawTelefon(x, y, angle) {
  const tw = W*0.03, th = W*0.055;
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle='#111'; ctx.strokeStyle='#999'; ctx.lineWidth=W*0.003;
  ctx.beginPath(); ctx.roundRect(-tw/2,-th/2,tw,th,tw*0.2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#3af'; ctx.fillRect(-tw/2+tw*0.12,-th/2+th*0.1,tw*0.76,th*0.72);
  ctx.restore();
}

function drawOk(x1, y1, x2, y2, opacity) {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = W * 0.004;
  ctx.setLineDash([W*0.012, W*0.008]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  const mx = (x1+x2)/2, my = y1 + (y2-y1)*0.4;
  ctx.quadraticCurveTo(mx, my, x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);
  // Ok ucu
  const angle = Math.atan2(y2 - my, x2 - mx);
  ctx.save();
  ctx.translate(x2, y2);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(-W*0.022, -W*0.01);
  ctx.moveTo(0,0); ctx.lineTo(-W*0.022,  W*0.01);
  ctx.stroke();
  ctx.restore();
  ctx.restore();
}

function drawMetin(metin, isKiz, opacity) {
  if (opacity <= 0) return;
  ctx.save();
  ctx.globalAlpha = opacity;
  const fontSize = W * 0.052;
  const satirlar = metin.split('\n');
  const satirH = fontSize * 1.55;
  const topY = H * 0.38;
  const textX = isKiz ? W * 0.86 : W * 0.14;

  ctx.font = `italic bold ${fontSize}px 'Comic Sans MS', cursive, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = isKiz ? 'right' : 'left';

  satirlar.forEach((s, i) => {
    const xOff = (i % 2 === 0 ? -1 : 1) * W * 0.007;
    const ang = (i % 2 === 0 ? -1 : 1) * 0.025;
    ctx.save();
    ctx.translate(textX + xOff, topY + i * satirH);
    ctx.rotate(ang);
    ctx.fillText(s, 0, 0);
    ctx.restore();
  });

  ctx.restore();
  // Ok başlangıç noktası — yazının altı ortası
  return { x: textX, y: topY + satirlar.length * satirH + W*0.01 };
}

function drawYazilar() {
  if (!aktifCift) return;
  const op = aktifCift.opacity;

  // Sol yazı (oğlan)
  const solP = drawMetin(aktifCift.sol, false, op);
  // Sağ yazı (kız)
  const sagP = drawMetin(aktifCift.sag, true, op);

  // Oğlan ok hedefi — oturmadıysa karakterin üstü, oturmuşsa kafa hizası
  const oHeadY = oOtur
    ? ZEMIN() - W*0.065*1.4 - W*0.0012*80 - W*0.0012*22*2 - W*0.0012*22*0.5
    : ZEMIN() - W*0.0012*80 - W*0.0012*22*1.5;
  const kHeadY = kOtur
    ? ZEMIN() - W*0.065*1.4 - W*0.0012*80 - W*0.0012*22*2 - W*0.0012*22*0.5
    : ZEMIN() - W*0.0012*80 - W*0.0012*22*1.5;

  if (solP) drawOk(solP.x, solP.y, ox, oHeadY, op);
  if (sagP) drawOk(sagP.x, sagP.y, kx, kHeadY, op);
}

function drawAdam(cx, isKiz, oturuyor, oturmaT) {
  const Z = ZEMIN(), t = Math.min(oturmaT,1);
  const govdeH=W*0.0012*80, basR=W*0.0012*22;
  const telDir = isKiz ? -1 : 1, s=W*0.065;

  let bedy;
  if (!oturuyor) bedy = Z - govdeH;
  else { const hY = Z-s*1.4-govdeH-basR*0.3; bedy = (Z-govdeH)+(hY-(Z-govdeH))*t; }
  const heady = bedy - basR - basR*0.5;

  ctx.strokeStyle = isKiz ? '#f8a4c8' : '#7ec8f8';
  ctx.lineWidth = W*0.008; ctx.lineCap = 'round';

  if (!oturuyor || t < 0.7) {
    const la = Math.sin(frame*0.06)*(oturuyor?0:0.35);
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx-basR+Math.sin(la)*basR*1.2,Z); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx+basR-Math.sin(la)*basR*1.2,Z); ctx.stroke();
  } else {
    const bw=basR*1.5;
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx-bw,bedy+govdeH+bw*0.8); ctx.lineTo(cx-bw+telDir*bw*2,bedy+govdeH+bw*0.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx+bw,bedy+govdeH+bw*0.8); ctx.lineTo(cx+bw+telDir*bw*2,bedy+govdeH+bw*0.8); ctx.stroke();
  }

  ctx.beginPath(); ctx.moveTo(cx,bedy); ctx.lineTo(cx,bedy+govdeH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH*0.3); ctx.lineTo(cx+telDir*basR*2.2,bedy+govdeH*0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH*0.3); ctx.lineTo(cx-telDir*basR*1.6,bedy+govdeH*0.65); ctx.stroke();
  drawTelefon(cx+telDir*basR*3, bedy+govdeH*0.42, telDir*-0.4);

  ctx.beginPath(); ctx.arc(cx,heady,basR,0,Math.PI*2);
  ctx.fillStyle = isKiz?'#f8a4c8':'#7ec8f8'; ctx.fill(); ctx.stroke();

  if (isKiz) {
    ctx.strokeStyle='#f060a0'; ctx.lineWidth=W*0.01;
    ctx.beginPath(); ctx.moveTo(cx-basR,heady-basR*0.3); ctx.quadraticCurveTo(cx-basR*1.8,heady+basR*0.8,cx-basR*1.4,heady+basR*1.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+basR,heady-basR*0.3); ctx.quadraticCurveTo(cx+basR*1.8,heady+basR*0.8,cx+basR*1.4,heady+basR*1.6); ctx.stroke();
    ctx.lineWidth=W*0.008;
  }

  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-basR*0.35,heady-basR*0.15,basR*0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+basR*0.35,heady-basR*0.15,basR*0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(cx-basR*0.35,heady-basR*0.1,basR*0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+basR*0.35,heady-basR*0.1,basR*0.15,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=W*0.005;
  ctx.beginPath(); ctx.arc(cx, heady+basR*0.9, basR*0.38, Math.PI*1.15, Math.PI*1.85, false); ctx.stroke();
}

function update() {
  frame++;
  if (kx === 0) kx = W + 80;
  if (!oOtur) { ox += 0.2; if (ox >= TL()) { ox = TL(); oOtur = true; } }
  else oOturT = Math.min(oOturT+0.018, 1);
  if (!kOtur) { kx -= 0.2; if (kx <= TR()) { kx = TR(); kOtur = true; } }
  else kOturT = Math.min(kOturT+0.018, 1);
  updateYazi();
  updateOzel();
  updateQA();
}

function draw() {
  drawZemin();
  drawTabure(TL()); drawTabure(TR());
  drawYazilar();
  // Özel sekans yazıları
  if (ozelFaz === 'karmas') drawOzelYazi("Ben ne yapacağım\nşimdi ??!!!##@@@", "+₺#&#\nşimdi??", ozelOpacity);
  if (ozelFaz === 'cildirma' || ozelFaz === 'ciglik') drawOzelYazi("Çıldıracağım\nşimdiiiiii.....", "!!!!!\nÇıldıracağım!!!!!", ozelOpacity);
  drawCiglik();
  drawQA();
  drawLogo();
  drawAdam(ox, false, oOtur, oOturT);
  drawAdam(kx, true, kOtur, kOturT);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
kx = W + 80;
loop();
</script>
</body>
</html>
