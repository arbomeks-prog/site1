<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const ZEMIN = () => H * 0.72;
const TL = () => W * 0.38;
const TR = () => W * 0.62;

// Çiftler halinde — aynı anda çıkacak
const CIFTER = [
  {sol:"Kaç gün kaldı\nbabalar gününe?", sag:"Babamı en çok\nne severdi benim?"},
  {sol:"Hep aynı şeyleri\nalıyoruz yazık ya...", sag:"Müzik zevki\nneydi babamın?"},
  {sol:"En sevdiği renk\ntonunu düşünüyorum...", sag:"Hediye güzel mi\ngözüksün..."},
  {sol:"Hediye anlamlı mı\nolsun...", sag:"Geç mi kaldım,\nkargo gelir mi?"},
  {sol:"Yine mi 100 site\ngezeceğim?", sag:"Keşke bir yer olsa\nbana sorsaydı..."},
];

let frame = 0;
let ox = W * 0.05, kx = W * 0.95; // ekran kenarlarında başla
let oOtur = false, kOtur = false;
let oOturT = 0, kOturT = 0;

// Özel balonlar
let ozelFaz = 'bekle';
let ozelTimer = 0;
let ozelOpacity = 0;
let ciglikGoster = false;
let ciglikScale = 0;
let ciglikAngle = 0;
let ciglikY = 0;
let budurY = -200;
let buldumY = -200;
let logoFaz = 0;
let logoTimer = 0;
let guluyor = false;

let ozelBasladi = false;
let aktifCift = null; // {sol, sag, opacity, faz, timer}
let ciftIdx = 0;

function sonrakiCift() {
  if (ciftIdx >= CIFTER.length) return;
  aktifCift = { ...CIFTER[ciftIdx++], opacity: 0, faz: 'in', timer: 0 };
  // Düşünce balonlarını seslendir
  oku(aktifCift.sol, false);
  setTimeout(() => oku(aktifCift.sag, true), 1500);
}

function updateYazi() {
  if (!aktifCift) {
    if (frame > 60) sonrakiCift();
    return;
  }
  aktifCift.timer++;
  const fadeSpd = 0.04, durSure = 200;
  if (aktifCift.faz === 'in') {
    aktifCift.opacity = Math.min(aktifCift.opacity + fadeSpd, 1);
    if (aktifCift.opacity >= 1) { aktifCift.faz = 'dur'; aktifCift.timer = 0; }
  } else if (aktifCift.faz === 'dur') {
    if (aktifCift.timer > durSure) { aktifCift.faz = 'out'; aktifCift.timer = 0; }
  } else {
    aktifCift.opacity = Math.max(aktifCift.opacity - fadeSpd, 0);
    if (aktifCift.opacity <= 0) {
      aktifCift = null;
      if (ciftIdx < CIFTER.length) setTimeout(sonrakiCift, 200);
      else if (!ozelBasladi) { ozelBasladi = true; setTimeout(baslaTepki, 300); }
    }
  }
}

function baslaTepki() {
  ozelFaz = 'cildirma';
  ozelTimer = 0;
  ozelOpacity = 0;
}

function updateOzel() {
  if (ozelFaz === 'bekle') return;
  ozelTimer++;

  if (ozelFaz === 'karmas') {
    ozelOpacity = Math.min(ozelOpacity + 0.05, 1);
    if (ozelTimer > 220) { ozelFaz = 'cildirma'; ozelTimer = 0; ozelOpacity = 0; }
  } else if (ozelFaz === 'cildirma') {
    ozelOpacity = Math.min(ozelOpacity + 0.05, 1);
    if (ozelTimer > 60) {
      ozelFaz = 'ciglik';
      ozelTimer = 0;
      ciglikGoster = true;
      ciglikScale = 0;
      const sesEl = document.getElementById('ses-ciglik');
      sesEl.currentTime = 0;
      sesEl.loop = false;
      sesEl.volume = 0.5;
      sesEl.play();
      setTimeout(() => { sesEl.pause(); sesEl.currentTime = 0; }, 2500);
    }
  } else if (ozelFaz === 'ciglik') {
    ciglikScale = Math.min(ciglikScale + 0.04, 1);
    ciglikAngle = Math.sin(ozelTimer * 0.25) * 0.12;
    ciglikY = 0;
    if (ozelTimer > 180) { ozelFaz = 'logo'; ozelTimer = 0; logoFaz = 1; }
  } else if (ozelFaz === 'logo') {
    logoTimer++;
    if (logoFaz === 1) {
      // BUDUR ve BULDUM yukarıdan iner
      budurY = Math.min(budurY + 12, 0);
      buldumY = Math.min(buldumY + 12, 0);
      if (budurY >= 0 && buldumY >= 0) { logoFaz = 2; logoTimer = 0; }
    } else if (logoFaz === 2) {
      // Kısa dur, sonra çığlık aşağı düşsün
      if (logoTimer > 40) { logoFaz = 3; logoTimer = 0; }
    } else if (logoFaz === 3) {
      // Çığlık resmi hızla aşağı düşer
      ciglikY += 60;
      if (ciglikY > H) {
        ciglikGoster = false; logoFaz = 4; guluyor = true;
        setTimeout(baslaQA, 300);
        const fon = document.getElementById('ses-fon');
        fon.volume = 0.4; fon.currentTime = 0; fon.play().catch(()=>{});
      }
    }
  }
}

function drawOzelYazi(metin1, metin2, opacity) {
  if (opacity <= 0) return;
  ctx.save();
  ctx.globalAlpha = opacity;
  const fontSize = W * 0.052;
  const satirH = fontSize * 1.55;

  function yazSatirlar(metin, isKiz) {
    const satirlar = metin.split('\n');
    const topY = H * 0.38;
    const textX = isKiz ? W * 0.86 : W * 0.14;
    ctx.font = `italic bold ${fontSize}px 'Comic Sans MS', cursive, sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = isKiz ? 'right' : 'left';
    satirlar.forEach((s, i) => {
      const xOff = (i%2===0?-1:1)*W*0.007;
      const ang = (i%2===0?-1:1)*0.025;
      ctx.save(); ctx.translate(textX+xOff, topY+i*satirH); ctx.rotate(ang);
      ctx.fillText(s, 0, 0); ctx.restore();
    });
    return { x: textX, y: topY + satirlar.length * satirH + W*0.01 };
  }

  const p1 = yazSatirlar(metin1, false);
  const p2 = yazSatirlar(metin2, true);

  // Oklar
  const oHeadY = oOtur ? ZEMIN()-W*0.065*1.4-W*0.0012*80-W*0.0012*44-W*0.0012*11 : ZEMIN()-W*0.0012*80-W*0.0012*33;
  const kHeadY = oHeadY;
  ctx.save();
  ctx.globalAlpha = opacity;
  drawOk(p1.x, p1.y, ox, oHeadY, 1);
  drawOk(p2.x, p2.y, kx, kHeadY, 1);
  ctx.restore();
  ctx.restore();
}

const ciglikImg = new Image();
ciglikImg.src = '/assets/ciglik-bg.jpg';

function drawCiglik() {
  if (!ciglikGoster || ciglikScale <= 0) return;
  const size = W * 0.55 * ciglikScale;
  ctx.save();
  ctx.translate(W/2, H*0.42 + ciglikY);
  ctx.rotate(ciglikAngle);
  ctx.drawImage(ciglikImg, -size/2, -size/2, size, size);
  ctx.restore();
}

// 10 soru çifti — quiz kartı stili
const QA_CIFTER = [
  {sol:"Hediye kime?",      solC:"Babam 👨",      solOpts:["Sevgili","Arkadaş","Babam 👨","Kardeş"],
   sag:"Ne için?",          sagC:"Babalar Günü",  sagOpts:["Doğum Günü","Babalar Günü","Sürpriz","Başarı"]},
  {sol:"Tarzı nasıl?",      solC:"Klasik/Şık",    solOpts:["Minimalist","Klasik/Şık","Spor","Modern"],
   sag:"Hobisi ne?",        sagC:"Teknoloji 💻",  sagOpts:["Okumak","Spor","Teknoloji 💻","Müzik"]},
  {sol:"Bütçen?",           solC:"500-1500 TL",   solOpts:["0-500 TL","500-1500 TL","1500-3000 TL","3000+ TL"],
   sag:"Öncelik?",          sagC:"Anlamlı olsun", sagOpts:["Kullanışlı","Güzel","Anlamlı olsun","Ucuz"]},
  {sol:"Yaşı?",             solC:"45-55",         solOpts:["30-45","45-55","55-65","65+"],
   sag:"Ortam?",            sagC:"Ev/İş",         sagOpts:["Dışarı","Ev/İş","Spor","Her yer"]},
  {sol:"Renk tercihi?",     solC:"Koyu tonlar",   solOpts:["Açık","Koyu tonlar","Renkli","Fark etmez"],
   sag:"Tarz?",             sagC:"Modern",        sagOpts:["Klasik","Modern","Spor","Bohemian"]},
  {sol:"Müzik zevki?",      solC:"Rock/Caz",      solOpts:["Pop","Rock/Caz","Klasik","Arabesk"],
   sag:"Spor yapar mı?",    sagC:"Evet 🏃",       sagOpts:["Hiç","Bazen","Evet 🏃","Çok aktif"]},
  {sol:"Seyahat sever mi?", solC:"Çok sever ✈️",  solOpts:["Sevmez","Bazen","Çok sever ✈️","Sürekli"],
   sag:"Teknoloji?",        sagC:"Meraklı 📱",    sagOpts:["Uzak","Temel","Meraklı 📱","Tutkun"]},
  {sol:"Hediye boyutu?",    solC:"Küçük/Şık",     solOpts:["Küçük/Şık","Orta","Büyük","Fark etmez"],
   sag:"Teslimat?",         sagC:"Kargo yeter",   sagOpts:["Elden","Kargo yeter","Süpriz","Sürpriz paket"]},
  {sol:"Makyaj/Koku?",      solC:"Parfüm sever",  solOpts:["İlgisiz","Az","Parfüm sever","Çok sever"],
   sag:"Yemek zevki?",      sagC:"Et/Izgara",     sagOpts:["Vejetaryen","Et/Izgara","Her şey","Tatlı"]},
  {sol:"Son dokunuş?",      solC:"Özel kutu 🎀",  solOpts:["Yalın","Fiyonk","Özel kutu 🎀","Kart"],
   sag:"Mesaj?",            sagC:"Kişisel not",   sagOpts:["Yok","Kısa","Kişisel not","Şiir"]},
];

let qaIdx = 0;
let qaFaz = 'bekle';
let qaTimer = 0;
let qaKartX = 0;
let qaKartY = 0;
let qaKartDir = 0;
let qaHighlight = false;
let qaHighTimer = 0;
let qaCikisDirX = -1;
let qaCikisDirY = 0;
// Sol ve sağ kart ayrı çıkış offsetleri
let qaSolX = 0, qaSolY = 0;
let qaSagX = 0, qaSagY = 0;
// Çıkış yön çiftleri — sol kart / sağ kart
const CIKIS_YONLERI = [
  {sol:{dx:-1,dy:-0.5}, sag:{dx:1, dy:0.5}},   // sol: sol-yukarı, sağ: sağ-aşağı
  {sol:{dx:0, dy:-1},   sag:{dx:0, dy:1}},       // sol: yukarı, sağ: aşağı
  {sol:{dx:-1,dy:0.5},  sag:{dx:1, dy:-0.5}},   // sol: sol-aşağı, sağ: sağ-yukarı
  {sol:{dx:1, dy:-1},   sag:{dx:-1,dy:1}},       // sol: sağ-yukarı, sağ: sol-aşağı
  {sol:{dx:0, dy:1},    sag:{dx:0, dy:-1}},      // sol: aşağı, sağ: yukarı
];
let solCevaplar = []; // biriken cevaplar sol
let sagCevaplar = []; // biriken cevaplar sağ
let qaAktif = false;

// Kart boyutları
const KW = () => W * 0.72;
const KH = () => H * 0.38;
const KX = () => W/2;
const KY = () => H * 0.22;

// ---- SESLER ----
function emojiTemizle(metin) {
  return metin.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/[\u2600-\u27FF]/g, '').trim();
}

let erkekSes = null;
let kizSes = null;

function sesBaslat() {
  const sesler = window.speechSynthesis.getVoices();
  erkekSes = sesler.find(v => v.lang.startsWith('tr') && v.name.toLowerCase().includes('erkek'))
           || sesler.find(v => v.lang.startsWith('tr') && !v.name.toLowerCase().includes('female'))
           || sesler.find(v => v.lang.startsWith('tr'))
           || null;
  kizSes   = sesler.find(v => v.lang.startsWith('tr') && (v.name.toLowerCase().includes('kadin') || v.name.toLowerCase().includes('female')))
           || sesler.find(v => v.lang.startsWith('tr') && v !== erkekSes)
           || erkekSes;
}

// Mobil ses unlock — ilk dokunuşta hem audio hem speechSynthesis açılır
let sesUnlocked = false;
function sesCoz() {
  if (sesUnlocked) return;
  sesUnlocked = true;
  // SpeechSynthesis unlock
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  window.speechSynthesis.speak(u);
  sesBaslat();
}
window.speechSynthesis.onvoiceschanged = sesBaslat;
sesBaslat();

function oku(metin, isKiz) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(emojiTemizle(metin));
  u.lang = 'tr-TR';
  u.rate = isKiz ? 1.1 : 0.95;
  u.pitch = isKiz ? 1.4 : 0.8;
  window.speechSynthesis.speak(u);
}
// ---- SESLER SON ----


// Harf yağmuru
const SATIR1 = 'Babana hediye aldın mı?';
const SATIR2 = 'BudurBuldum dedin mi? 🎁';
let harfler1 = [];
let harfler2 = [];
let harfBasladi = false;
let harfFrame = 0;

function baslaHarfYagmuru() {
  if (harfBasladi) return;
  harfBasladi = true;
  const fs1 = W * 0.052;
  const fs2 = W * 0.045;
  ctx.font = `bold ${fs1}px sans-serif`;
  let x = W/2 - ctx.measureText(SATIR1).width/2;
  for (let i = 0; i < SATIR1.length; i++) {
    const ch = SATIR1[i];
    harfler1.push({ char:ch, x:x, y:-H*0.15-Math.random()*H*0.2, hedefY:H*0.10, hiz:9+Math.random()*5, opacity:0, delay:i*4, fs:fs1, renk:'#FFD93D' });
    x += ctx.measureText(ch).width;
  }
  ctx.font = `bold ${fs2}px sans-serif`;
  let x2 = W/2 + ctx.measureText(SATIR2).width/2;
  for (let i = SATIR2.length-1; i >= 0; i--) {
    const ch = SATIR2[i];
    x2 -= ctx.measureText(ch).width;
    harfler2.push({ char:ch, x:x2, y:-H*0.15-Math.random()*H*0.25, hedefY:H*0.17, hiz:9+Math.random()*5, opacity:0, delay:(SATIR2.length-1-i)*4+20, fs:fs2, renk:'#ff9ecd' });
  }
}

function updateHarfler() {
  if (!harfBasladi) return;
  harfFrame++;
  [...harfler1, ...harfler2].forEach(h => {
    if (harfFrame < h.delay) return;
    if (h.y < h.hedefY) h.y = Math.min(h.y + h.hiz, h.hedefY);
    h.opacity = Math.min(h.opacity + 0.1, 1);
  });
}

function drawHarfler() {
  [...harfler1, ...harfler2].forEach(h => {
    if (h.opacity <= 0) return;
    ctx.save();
    ctx.globalAlpha = h.opacity;
    ctx.fillStyle = h.renk;
    ctx.font = `bold ${h.fs}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(h.char, h.x, h.y);
    ctx.restore();
  });
}


function baslaQA() {
  qaAktif = true;
  qaFaz = 'giris';
  qaTimer = 0;
  qaKartX = W; // sağdan girer
  qaHighlight = false;
}

function updateQA() {
  if (!qaAktif || qaIdx >= QA_CIFTER.length) return;
  qaTimer++;
  const hiz = 60; // 1 sn

  if (qaFaz === 'giris') {
    qaKartX = Math.max(qaKartX - W*0.06, KX());
    qaSolX = qaKartX - KX(); qaSolY = 0;
    qaSagX = qaKartX - KX(); qaSagY = 0;
    if (qaKartX <= KX()) {
      qaSolX = 0; qaSolY = 0; qaSagX = 0; qaSagY = 0;
      qaFaz = 'bekle';
      qaTimer = 0;
    }
  } else if (qaFaz === 'bekle') {
    if (qaTimer > 25) {
      qaHighlight = true; qaFaz = 'highlight'; qaTimer = 0;
      const sd = document.getElementById('ses-dogru');
      const st = document.getElementById('ses-tik');
      sd.currentTime = 0; sd.volume = 0.4; sd.play().catch(()=>{});
      st.currentTime = 0; st.volume = 0.4; st.play().catch(()=>{});
    }
  } else if (qaFaz === 'highlight') {
    if (qaTimer > hiz) { qaFaz = 'cikis'; qaTimer = 0; }
  } else if (qaFaz === 'cikis') {
    const yon = CIKIS_YONLERI[qaIdx % CIKIS_YONLERI.length];
    qaSolX += yon.sol.dx * W * 0.07;
    qaSolY += yon.sol.dy * H * 0.07;
    qaSagX += yon.sag.dx * W * 0.07;
    qaSagY += yon.sag.dy * H * 0.07;
    const disari = Math.abs(qaSolX) > W || Math.abs(qaSolY) > H;
    if (disari) {
      const c = QA_CIFTER[qaIdx];
      solCevaplar.push(c.solC);
      sagCevaplar.push(c.sagC);
      // Kalpler fırlasın
      for (let i = 0; i < 5; i++) kalpEkle(ox, ZEMIN() - W*0.15);
      for (let i = 0; i < 5; i++) kalpEkle(kx, ZEMIN() - W*0.15);
      qaIdx++;
      qaSolX = 0; qaSolY = 0; qaSagX = 0; qaSagY = 0;
      qaKartX = W;
      if (qaIdx < QA_CIFTER.length) {
        qaFaz = 'giris';
        qaTimer = 0;
        qaHighlight = false;
      } else {
        qaAktif = false;
        setTimeout(baslaHediyeler, 400);
      }
    }
  }
}

function drawKart(cx, cy, kw, kh, soru, cevap, opts, renk, highlight, offsetX, offsetY) {
  ctx.save();
  ctx.translate(offsetX || 0, offsetY || 0);

  // Kart arka planı
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.strokeStyle = renk;
  ctx.lineWidth = W*0.005;
  ctx.beginPath();
  ctx.rect(cx - kw/2, cy, kw, kh, W*0.02);
  ctx.fill(); ctx.stroke();

  // Soru
  const fs = W * 0.038;
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `bold ${fs}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(soru, cx, cy + kh*0.16);

  // Seçenekler — 2x2 grid
  const optW = kw*0.44, optH = kh*0.16;
  const optFs = W*0.028;
  opts.forEach((o, i) => {
    const col = i % 2, row = Math.floor(i/2);
    const ox = cx - kw*0.24 + col*kw*0.49;
    const oy = cy + kh*0.28 + row*(optH + kh*0.04);
    const isCorrect = o === cevap;
    ctx.fillStyle = highlight && isCorrect ? '#4CAF50' : '#f0f0f0';
    ctx.strokeStyle = highlight && isCorrect ? '#388E3C' : '#ddd';
    ctx.lineWidth = W*0.003;
    ctx.beginPath(); ctx.rect(ox-optW/2, oy, optW, optH, W*0.01); ctx.fill(); ctx.stroke();
    ctx.fillStyle = highlight && isCorrect ? '#fff' : '#333';
    ctx.font = `${highlight && isCorrect ? 'bold' : 'normal'} ${optFs}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(o, ox, oy + optH*0.62);
  });

  ctx.restore();
}

function drawBirikenCevaplar() {
  if (solCevaplar.length === 0) return;
  const fs = W * 0.035;
  const satirH = fs * 1.5;

  ctx.save();
  ctx.font = `bold ${fs}px sans-serif`;

  // Sol cevaplar — sol dış çizgiye (x=10) sağa yaslı
  solCevaplar.forEach((c, i) => {
    const y = ZEMIN() - W*0.02 - i*satirH;
    ctx.fillStyle = '#7ec8f8';
    ctx.textAlign = 'left';
    ctx.globalAlpha = 0.85;
    ctx.fillText('✓ ' + c, 10, y);
  });

  // Sağ cevaplar — sağ dış çizgiye (x=W-10) sola yaslı
  sagCevaplar.forEach((c, i) => {
    const y = ZEMIN() - W*0.02 - i*satirH;
    ctx.fillStyle = '#f8a4c8';
    ctx.textAlign = 'right';
    ctx.globalAlpha = 0.85;
    ctx.fillText('✓ ' + c, W - 10, y);
  });

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawQA() {
  drawBirikenCevaplar();
  if (!qaAktif || qaIdx >= QA_CIFTER.length) return;
  const c = QA_CIFTER[qaIdx];
  const kw = KW(), kh = KH(), cx = KX(), cy = KY();

  // Giriş sırasında her iki kart aynı X offset ile gelir, çıkışta ayrılır
  const girişOffX = qaFaz === 'giris' ? (qaKartX - KX()) : 0;
  const solOffX = qaFaz === 'cikis' ? qaSolX : girişOffX;
  const solOffY = qaFaz === 'cikis' ? qaSolY : 0;
  const sagOffX = qaFaz === 'cikis' ? qaSagX : girişOffX;
  const sagOffY = qaFaz === 'cikis' ? qaSagY : 0;

  drawKart(cx - kw*0.26, cy, kw*0.48, kh, c.sol, c.solC, c.solOpts, '#7ec8f8', qaHighlight, solOffX, solOffY);
  drawKart(cx + kw*0.26, cy, kw*0.48, kh, c.sag, c.sagC, c.sagOpts, '#f8a4c8', qaHighlight, sagOffX, sagOffY);
}

let hediyelarBasladi = false;
let hediyelarGoster = [];
let hediyelarTimer = 0;
const hImgCache = {};

function updateHediyeler() {
  if (!hediyelarBasladi) return;
  hediyelarTimer++;
  const idx = Math.min(Math.floor(hediyelarTimer / 6), HEDIYELER.length);
  for (let i = 0; i < idx; i++) {
    hediyelarGoster[i].opacity = Math.min(hediyelarGoster[i].opacity + 0.05, 1);
  }
}

function drawHediyeler() {
  if (!hediyelarBasladi || hediyelarGoster.length === 0) return;
  const cols = 6;
  const pad = W * 0.006;
  const topH = ZEMIN() * 0.56;
  const kartW = Math.floor((W - pad*(cols+1)) / cols);
  const kartH = (topH - pad*3) / 2;

  hediyelarGoster.forEach((h, i) => {
    if (h.opacity <= 0) return;
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = pad + col*(kartW+pad);
    const y = pad + row*(kartH+pad);

    ctx.save();
    ctx.globalAlpha = h.opacity;

    // Beyaz kart
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = h.renk;
    ctx.lineWidth = W*0.007;
    ctx.beginPath(); ctx.rect(x, y, kartW, kartH, W*0.012); ctx.fill(); ctx.stroke();

    // Görsel
    const imgH = kartH * 0.55;
    if (h.img && h.img.complete) {
      ctx.save();
      ctx.beginPath(); ctx.rect(x, y, kartW, imgH, [W*0.012, W*0.012, 0, 0]); ctx.clip();
      ctx.drawImage(h.img, x, y, kartW, imgH);
      ctx.restore();
    } else {
      ctx.fillStyle = h.renk + '33';
      ctx.fillRect(x, y, kartW, imgH);
    }

    // İsim
    const fs = kartW * 0.18;
    ctx.fillStyle = '#111';
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(h.isim, x+kartW/2, y+imgH+fs*1.1, kartW-pad);

    // Fiyat
    ctx.fillStyle = '#f59e0b';
    ctx.font = `bold ${fs*1.05}px sans-serif`;
    ctx.fillText(h.fiyat, x+kartW/2, y+imgH+fs*2.3, kartW-pad);

    // Platform butonları — renkli, fiyatın altında
    const pfs = fs * 0.7;
    const btnH = kartH * 0.13;
    const btnY = y + imgH + fs*2.9;
    const platforms = [{label:'Trendyol', color:'#f27a1a'}, {label:'Hepsiburada', color:'#ff6000'}, {label:'Amazon', color:'#ff9900'}];
    const btnW = (kartW - pad*4) / 3;
    platforms.forEach((p, pi) => {
      const bx = x + pad + pi*(btnW+pad);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.rect(bx, btnY, btnW, btnH, btnH*0.3); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${pfs}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(p.label, bx+btnW/2, btnY+btnH*0.67, btnW-2);
    });

    ctx.restore();
  });
}

function drawLogo() {
  if (logoFaz < 1) return;
  const fs = W * 0.055; // küçük halo boyutu
  const basR = W * 0.0012 * 22;
  const kafaY = ZEMIN() - W*0.0012*80 - basR*8.5; // kafanın hemen üstü

}

function drawZemin() {
  ctx.fillStyle = '#0d0d1a'; ctx.fillRect(0, 0, W, H);
  const grad = ctx.createRadialGradient(W/2, H*0.28, 20, W/2, H*0.28, W*0.7);
  grad.addColorStop(0, 'rgba(255,230,150,0.10)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1e1e38'; ctx.fillRect(0, ZEMIN(), W, H - ZEMIN());
  ctx.fillStyle = '#4a4a8a'; ctx.fillRect(0, ZEMIN(), W, 2);

}

function drawTabure(x) {
  const Z = ZEMIN(), s = W * 0.07;
  ctx.strokeStyle = '#c8a96e'; ctx.lineWidth = W * 0.007; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x-s, Z-s*1.4); ctx.lineTo(x+s, Z-s*1.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s*0.8, Z-s*1.4); ctx.lineTo(x-s*0.9, Z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+s*0.8, Z-s*1.4); ctx.lineTo(x+s*0.9, Z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s*0.8, Z-s*0.7); ctx.lineTo(x+s*0.8, Z-s*0.7); ctx.stroke();
}

function drawTelefon(x, y, angle) {
  const tw = W*0.03, th = W*0.055;
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle='#111'; ctx.strokeStyle='#999'; ctx.lineWidth=W*0.003;
  ctx.beginPath(); ctx.rect(-tw/2,-th/2,tw,th,tw*0.2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#3af'; ctx.fillRect(-tw/2+tw*0.12,-th/2+th*0.1,tw*0.76,th*0.72);
  ctx.restore();
}

function drawOk(x1, y1, x2, y2, opacity) {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = W * 0.004;
  ctx.setLineDash([W*0.012, W*0.008]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  const mx = (x1+x2)/2, my = y1 + (y2-y1)*0.4;
  ctx.quadraticCurveTo(mx, my, x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);
  // Ok ucu
  const angle = Math.atan2(y2 - my, x2 - mx);
  ctx.save();
  ctx.translate(x2, y2);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(-W*0.022, -W*0.01);
  ctx.moveTo(0,0); ctx.lineTo(-W*0.022,  W*0.01);
  ctx.stroke();
  ctx.restore();
  ctx.restore();
}

function drawMetin(metin, isKiz, opacity) {
  if (opacity <= 0) return;
  ctx.save();
  ctx.globalAlpha = opacity;
  const fontSize = W * 0.052;
  const satirlar = metin.split('\n');
  const satirH = fontSize * 1.55;
  const topY = H * 0.38;
  const textX = isKiz ? W * 0.86 : W * 0.14;

  ctx.font = `italic bold ${fontSize}px 'Comic Sans MS', cursive, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = isKiz ? 'right' : 'left';

  satirlar.forEach((s, i) => {
    const xOff = (i % 2 === 0 ? -1 : 1) * W * 0.007;
    const ang = (i % 2 === 0 ? -1 : 1) * 0.025;
    ctx.save();
    ctx.translate(textX + xOff, topY + i * satirH);
    ctx.rotate(ang);
    ctx.fillText(s, 0, 0);
    ctx.restore();
  });

  ctx.restore();
  // Ok başlangıç noktası — yazının altı ortası
  return { x: textX, y: topY + satirlar.length * satirH + W*0.01 };
}

function drawYazilar() {
  if (!aktifCift) return;
  const op = aktifCift.opacity;

  // Sol yazı (oğlan)
  const solP = drawMetin(aktifCift.sol, false, op);
  // Sağ yazı (kız)
  const sagP = drawMetin(aktifCift.sag, true, op);

  // Oğlan ok hedefi — oturmadıysa karakterin üstü, oturmuşsa kafa hizası
  const oHeadY = oOtur
    ? ZEMIN() - W*0.065*1.4 - W*0.0012*80 - W*0.0012*22*2 - W*0.0012*22*0.5
    : ZEMIN() - W*0.0012*80 - W*0.0012*22*1.5;
  const kHeadY = kOtur
    ? ZEMIN() - W*0.065*1.4 - W*0.0012*80 - W*0.0012*22*2 - W*0.0012*22*0.5
    : ZEMIN() - W*0.0012*80 - W*0.0012*22*1.5;

  if (solP) drawOk(solP.x, solP.y, ox, oHeadY, op);
  if (sagP) drawOk(sagP.x, sagP.y, kx, kHeadY, op);
}

function drawAdam(cx, isKiz, oturuyor, oturmaT) {
  const Z = ZEMIN(), t = Math.min(oturmaT,1);
  const govdeH=W*0.0012*80, basR=W*0.0012*22;
  const telDir = isKiz ? -1 : 1, s=W*0.065;

  let bedy;
  if (!oturuyor) bedy = Z - govdeH;
  else { const hY = Z-s*1.4-govdeH-basR*0.3; bedy = (Z-govdeH)+(hY-(Z-govdeH))*t; }
  const heady = bedy - basR - basR*0.5;

  ctx.strokeStyle = isKiz ? '#f8a4c8' : '#7ec8f8';
  ctx.lineWidth = W*0.008; ctx.lineCap = 'round';

  if (!oturuyor || t < 0.7) {
    const la = Math.sin(frame*0.06)*(oturuyor?0:0.35);
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx-basR+Math.sin(la)*basR*1.2,Z); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx+basR-Math.sin(la)*basR*1.2,Z); ctx.stroke();
  } else {
    const bw=basR*1.5;
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx-bw,bedy+govdeH+bw*0.8); ctx.lineTo(cx-bw+telDir*bw*2,bedy+govdeH+bw*0.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx+bw,bedy+govdeH+bw*0.8); ctx.lineTo(cx+bw+telDir*bw*2,bedy+govdeH+bw*0.8); ctx.stroke();
  }

  ctx.beginPath(); ctx.moveTo(cx,bedy); ctx.lineTo(cx,bedy+govdeH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH*0.3); ctx.lineTo(cx+telDir*basR*2.2,bedy+govdeH*0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH*0.3); ctx.lineTo(cx-telDir*basR*1.6,bedy+govdeH*0.65); ctx.stroke();
  const telAci = guluyor ? telDir*-0.4 + Math.sin(frame*0.15)*0.5 : telDir*-0.4;
  drawTelefon(cx+telDir*basR*3, bedy+govdeH*0.42, telAci);

  ctx.beginPath(); ctx.arc(cx,heady,basR,0,Math.PI*2);
  ctx.fillStyle = isKiz?'#f8a4c8':'#7ec8f8'; ctx.fill(); ctx.stroke();

  if (isKiz) {
    ctx.strokeStyle='#f060a0'; ctx.lineWidth=W*0.01;
    ctx.beginPath(); ctx.moveTo(cx-basR,heady-basR*0.3); ctx.quadraticCurveTo(cx-basR*1.8,heady+basR*0.8,cx-basR*1.4,heady+basR*1.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+basR,heady-basR*0.3); ctx.quadraticCurveTo(cx+basR*1.8,heady+basR*0.8,cx+basR*1.4,heady+basR*1.6); ctx.stroke();
    ctx.lineWidth=W*0.008;
  }

  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-basR*0.35,heady-basR*0.15,basR*0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+basR*0.35,heady-basR*0.15,basR*0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(cx-basR*0.35,heady-basR*0.1,basR*0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+basR*0.35,heady-basR*0.1,basR*0.15,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=W*0.005;
  if (guluyor) {
    ctx.beginPath(); ctx.arc(cx, heady+basR*0.55, basR*0.42, Math.PI*0.15, Math.PI*0.85, false); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(cx, heady+basR*0.9, basR*0.38, Math.PI*1.15, Math.PI*1.85, false); ctx.stroke();
  }
  // Yürürken gözyaşı
  if (!oturuyor) gozYasiEkle(cx, heady, basR, isKiz);
}

// Gözyaşı sistemi
let gozYaslari = []; // {x, y, vy, opacity, isKiz}
function gozYasiEkle(cx, heady, basR, isKiz) {
  if (Math.random() > 0.08) return; // seyrek düşsün
  gozYaslari.push({
    x: cx + (Math.random() > 0.5 ? basR*0.35 : -basR*0.35),
    y: heady + basR*0.15,
    vy: 1.5 + Math.random()*2,
    opacity: 1,
    isKiz
  });
}
function updateGozYaslari() {
  gozYaslari = gozYaslari.filter(y => y.opacity > 0);
  gozYaslari.forEach(y => { y.y += y.vy; y.opacity -= 0.02; });
}
function drawGozYaslari() {
  gozYaslari.forEach(y => {
    ctx.save();
    ctx.globalAlpha = y.opacity;
    ctx.fillStyle = y.isKiz ? '#f8c8e8' : '#a8d8f8';
    ctx.beginPath();
    ctx.ellipse(y.x, y.y, W*0.004, W*0.007, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// Kalp sistemi
let kalpler = []; // {x, y, vy, opacity, scale, renk}
function kalpEkle(x, y) {
  const renkler = ['#ff6b9d','#ff9ecd','#ff4d4d','#ffb3c6','#ff1493'];
  kalpler.push({
    x: x + (Math.random()-0.5)*W*0.1,
    y: y,
    vy: -(2 + Math.random()*2),
    vx: (Math.random()-0.5)*1.5,
    opacity: 1,
    scale: 0.5 + Math.random()*0.8,
    renk: renkler[Math.floor(Math.random()*renkler.length)]
  });
}
function updateKalpler() {
  kalpler = kalpler.filter(k => k.opacity > 0);
  kalpler.forEach(k => { k.y += k.vy; k.x += k.vx; k.opacity -= 0.015; });
}
function drawKalp(ctx, x, y, size, renk, opacity) {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.fillStyle = renk;
  ctx.beginPath();
  ctx.moveTo(x, y + size*0.3);
  ctx.bezierCurveTo(x, y, x - size, y, x - size, y + size*0.4);
  ctx.bezierCurveTo(x - size, y + size*0.9, x, y + size*1.3, x, y + size*1.3);
  ctx.bezierCurveTo(x, y + size*1.3, x + size, y + size*0.9, x + size, y + size*0.4);
  ctx.bezierCurveTo(x + size, y, x, y, x, y + size*0.3);
  ctx.fill();
  ctx.restore();
}
function drawKalpler() {
  kalpler.forEach(k => drawKalp(ctx, k.x, k.y, W*0.018*k.scale, k.renk, k.opacity));
}


function update() {
  frame++;
  if (!oOtur) {
    ox += 0.2;
    if (ox >= TL()) {
      ox = TL(); oOtur = true;
      document.getElementById('ses-erkek').pause();
      document.getElementById('ses-erkek').currentTime = 0;
    }
  } else oOturT = Math.min(oOturT + 0.018, 1);
  if (!kOtur) {
    kx -= 0.2;
    if (kx <= TR()) {
      kx = TR(); kOtur = true;
      document.getElementById('ses-kiz').pause();
      document.getElementById('ses-kiz').currentTime = 0;
    }
  } else kOturT = Math.min(kOturT + 0.018, 1);
  updateHarfler();
  updateYazi();
  updateOzel();
  updateQA();
  updateHediyeler();
  updateCTA();
  updateGozYaslari();
  updateKalpler();
}

let ctaOpacity = 0;

function updateCTA() {
  if (hediyelarBasladi) ctaOpacity = Math.min(ctaOpacity + 0.008, 1);
}

function drawCTA() {
  if (ctaOpacity <= 0) return;
  const Z = ZEMIN();
  const altH = H - Z;
  const cy = Z + altH * 0.38;
  ctx.save();
  ctx.globalAlpha = ctaOpacity;

  // Ana başlık
  const fs1 = W * 0.055;
  ctx.font = `900 ${fs1}px 'Bebas Neue', 'Arial Black', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD93D';
  ctx.fillText('Babanın hediyesini buldun mu?', W/2, cy);

  // Alt metin
  const fs2 = W * 0.032;
  ctx.font = `${fs2}px sans-serif`;
  ctx.fillStyle = '#cccccc';
  ctx.fillText('Akıllı algoritmamız sana özel seçiyor.', W/2, cy + fs1 * 1.1);

  // Buton
  const btnW = W * 0.62, btnH = altH * 0.22;
  const btnX = W/2 - btnW/2;
  const btnY = cy + fs1 * 1.7;
  const pulse = 1 + Math.sin(frame * 0.06) * 0.03;
  ctx.save();
  ctx.translate(W/2, btnY + btnH/2);
  ctx.scale(pulse, pulse);
  ctx.translate(-W/2, -(btnY + btnH/2));
  const grad = ctx.createLinearGradient(btnX, btnY, btnX + btnW, btnY);
  grad.addColorStop(0, '#FF6B35');
  grad.addColorStop(1, '#FFD93D');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `bold ${W * 0.038}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('🎁  budurbuldum.com\'a git', W/2, btnY + btnH * 0.63);
  ctx.restore();

  ctx.restore();
}


function draw() {
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, H);
  ctx.clip();
  drawZemin();
  drawTabure(TL()); drawTabure(TR());
  drawHarfler();
  drawYazilar();
  // Özel sekans yazıları
  if (ozelFaz === 'karmas') drawOzelYazi("Ben ne yapacağım\nşimdi ??!!!##@@@", "+₺#&#\nşimdi??", ozelOpacity);
  if (ozelFaz === 'cildirma' || ozelFaz === 'ciglik') drawOzelYazi("Çıldıracağım\nşimdiiiiii.....", "!!!!!\nÇıldıracağım!!!!!", ozelOpacity);
  drawCiglik();
  drawHediyeler();
  drawQA();
  drawLogo();
  drawAdam(ox, false, oOtur, oOturT);
  drawAdam(kx, true, kOtur, kOturT);
  drawGozYaslari();
  drawKalpler();
  drawCTA();
  ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
ox = W * 0.05;
kx = W * 0.95;
// loop baslatHerSey() ile başlar

function baslatHerSey() {
  sesCoz();
  baslaHarfYagmuru();
  // Yürüyüş sesleri
  const se = document.getElementById('ses-erkek');
  const sk = document.getElementById('ses-kiz');
  se.volume = 0.7; se.currentTime = 0; se.play().catch(()=>{});
  sk.volume = 0.7; sk.currentTime = 0; sk.play().catch(()=>{});
  loop();
}
ox = W * 0.05;
kx = W * 0.95;
document.getElementById('startBtn').style.display = 'flex';
