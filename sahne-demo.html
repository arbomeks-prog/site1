<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d1a; overflow: hidden; width: 100vw; height: 100vh; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const ZEMIN = () => H * 0.72;
const TL = () => W * 0.33;
const TR = () => W * 0.67;

const CUMLELER = [
  {t:"Babalar günü geliyor eyvah...", kim:0},
  {t:"Ben babama ne alacağım şimdi?", kim:1},
  {t:"Kaç gün kaldı babalar gününe?", kim:0},
  {t:"Babamı en çok ne severdi benim?", kim:1},
  {t:"Hep de aynı şeyleri alıyoruz yazık ya...", kim:0},
  {t:"Müzik zevki neydi babamın?", kim:1},
  {t:"En sevdiği renk tonunu düşünüyorum ama...", kim:0},
  {t:"Hediye güzel mi gözüksün...", kim:1},
  {t:"Hediye anlamlı mı olsun...", kim:0},
  {t:"Geç mi kaldım, kargodan gelir mi ki?", kim:1},
  {t:"Yine mi 100 tane internet sitesi gezeceğim?", kim:0},
  {t:"Keşke bir yer olsa bana ne istediğimi sorsa...", kim:1},
];

let frame = 0;
let ox = -80, kx = 0;
let oOtur = false, kOtur = false;
let oOturT = 0, kOturT = 0;
let sahneHazir = false;

// Balon sistemi
let aktifBalon = null; // {kim, metin, opacity, faz} faz: 'in','dur','out'
let balonTimer = 0;
let cumleIdx = 0;
let balonAcik = false;

function sonrakiBalon() {
  if (cumleIdx >= CUMLELER.length) return;
  aktifBalon = { ...CUMLELER[cumleIdx], opacity: 0, faz: 'in' };
  cumleIdx++;
  balonTimer = 0;
  balonAcik = true;
}

function drawZemin() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);
  const grad = ctx.createRadialGradient(W/2, H*0.28, 20, W/2, H*0.28, W*0.7);
  grad.addColorStop(0, 'rgba(255,230,150,0.13)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1e1e38'; ctx.fillRect(0, ZEMIN(), W, H - ZEMIN());
  ctx.fillStyle = '#4a4a8a'; ctx.fillRect(0, ZEMIN(), W, 2);
}

function drawTabure(x) {
  const Z = ZEMIN(), s = W * 0.07;
  ctx.strokeStyle = '#c8a96e'; ctx.lineWidth = W * 0.007; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x-s, Z-s*1.4); ctx.lineTo(x+s, Z-s*1.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s*0.8, Z-s*1.4); ctx.lineTo(x-s*0.9, Z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+s*0.8, Z-s*1.4); ctx.lineTo(x+s*0.9, Z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s*0.8, Z-s*0.7); ctx.lineTo(x+s*0.8, Z-s*0.7); ctx.stroke();
}

function drawTelefon(x, y, angle) {
  const tw = W*0.03, th = W*0.055;
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle='#111'; ctx.strokeStyle='#999'; ctx.lineWidth=W*0.003;
  ctx.beginPath(); ctx.roundRect(-tw/2,-th/2,tw,th,tw*0.2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#3af'; ctx.fillRect(-tw/2+tw*0.12,-th/2+th*0.1,tw*0.76,th*0.72);
  ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(-tw/2+tw*0.12,-th/2+th*0.1,tw*0.76,th*0.18);
  ctx.restore();
}

function drawBalon(cx, headY, isKiz, metin, opacity) {
  if (opacity <= 0) return;
  ctx.save();
  ctx.globalAlpha = opacity;

  const bw = W * 0.22;
  const bh = W * 0.19;
  const bx = cx;
  const by = headY - bh - W*0.05;

  const renk = isKiz ? '#f8a4c8' : '#7ec8f8';
  ctx.fillStyle = 'rgba(255,255,255,0.96)';
  ctx.strokeStyle = renk;
  ctx.lineWidth = W * 0.004;
  ctx.beginPath(); ctx.ellipse(bx, by, bw, bh, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();

  // Köprü daireler
  for (let i = 0; i < 3; i++) {
    const r = W*(0.010 - i*0.003);
    ctx.beginPath(); ctx.arc(bx, by+bh+i*W*0.018+W*0.004, r, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  }

  // Metni kelimelere böl, alt alta, hafif kaymış el yazısı stili
  const kelimeler = metin.split(' ');
  const satirlar = [];
  let satir = '';
  const maxKar = 8;
  kelimeler.forEach(k => {
    if ((satir + ' ' + k).trim().length > maxKar && satir.length > 0) {
      satirlar.push(satir.trim());
      satir = k;
    } else {
      satir = (satir + ' ' + k).trim();
    }
  });
  if (satir) satirlar.push(satir.trim());

  const fontSize = W * 0.042;
  const satirH = fontSize * 1.4;
  const topY = by - (satirlar.length - 1) * satirH / 2;

  satirlar.forEach((s, i) => {
    // Her satır hafif farklı açı ve x kayması - komik çizgi roman efekti
    const kaymalar = [-W*0.008, W*0.01, -W*0.005, W*0.012, -W*0.007];
    const acilar = [-0.04, 0.05, -0.03, 0.06, -0.02];
    const kx2 = bx + (kaymalar[i % kaymalar.length] || 0);
    const aci = acilar[i % acilar.length] || 0;
    ctx.save();
    ctx.translate(kx2, topY + i * satirH);
    ctx.rotate(aci);
    ctx.fillStyle = '#111';
    ctx.font = `bold ${fontSize}px 'Comic Sans MS', cursive, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s, 0, 0);
    ctx.restore();
  });

  ctx.restore();
}

function drawAdam(cx, isKiz, oturuyor, oturmaT) {
  const Z = ZEMIN(), t = Math.min(oturmaT,1);
  const scale = W*0.0012, govdeH=80*scale, basR=22*scale;
  const telDir = isKiz ? -1 : 1, s=W*0.065;

  let bedy;
  if (!oturuyor) bedy = Z - govdeH;
  else { const hY = Z-s*1.4-govdeH-basR*0.3; bedy = (Z-govdeH)+(hY-(Z-govdeH))*t; }
  const heady = bedy - basR - basR*0.5;

  ctx.strokeStyle = isKiz ? '#f8a4c8' : '#7ec8f8';
  ctx.lineWidth = W*0.008; ctx.lineCap = 'round';

  // Bacaklar
  if (!oturuyor || t < 0.7) {
    const la = Math.sin(frame*0.06)*(oturuyor?0:0.35);
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx-basR+Math.sin(la)*basR*1.2,Z); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx+basR-Math.sin(la)*basR*1.2,Z); ctx.stroke();
  } else {
    const bw=basR*1.5;
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx-bw,bedy+govdeH+bw*0.8); ctx.lineTo(cx-bw+telDir*bw*2,bedy+govdeH+bw*0.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx+bw,bedy+govdeH+bw*0.8); ctx.lineTo(cx+bw+telDir*bw*2,bedy+govdeH+bw*0.8); ctx.stroke();
  }

  ctx.beginPath(); ctx.moveTo(cx,bedy); ctx.lineTo(cx,bedy+govdeH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH*0.3); ctx.lineTo(cx+telDir*basR*2.2,bedy+govdeH*0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH*0.3); ctx.lineTo(cx-telDir*basR*1.6,bedy+govdeH*0.65); ctx.stroke();
  drawTelefon(cx+telDir*basR*3, bedy+govdeH*0.42, telDir*-0.4);

  ctx.beginPath(); ctx.arc(cx,heady,basR,0,Math.PI*2);
  ctx.fillStyle = isKiz?'#f8a4c8':'#7ec8f8'; ctx.fill(); ctx.stroke();

  if (isKiz) {
    ctx.strokeStyle='#f060a0'; ctx.lineWidth=W*0.01;
    ctx.beginPath(); ctx.moveTo(cx-basR,heady-basR*0.3); ctx.quadraticCurveTo(cx-basR*1.8,heady+basR*0.8,cx-basR*1.4,heady+basR*1.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+basR,heady-basR*0.3); ctx.quadraticCurveTo(cx+basR*1.8,heady+basR*0.8,cx+basR*1.4,heady+basR*1.6); ctx.stroke();
    ctx.lineWidth=W*0.008;
  }

  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-basR*0.35,heady-basR*0.15,basR*0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+basR*0.35,heady-basR*0.15,basR*0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(cx-basR*0.35,heady-basR*0.1,basR*0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+basR*0.35,heady-basR*0.1,basR*0.15,0,Math.PI*2); ctx.fill();

  // Mutsuz ağız
  ctx.strokeStyle='#222'; ctx.lineWidth=W*0.005;
  ctx.beginPath(); ctx.arc(cx, heady+basR*0.9, basR*0.38, Math.PI*1.15, Math.PI*1.85, false); ctx.stroke();

  return heady; // balon için
}

function updateBalon() {
  if (!aktifBalon) {
    // İlk balonu başlat - yürürken de
    if (frame > 80) sonrakiBalon();
    return;
  }

  balonTimer++;
  const fadeSpd = 0.04;
  const durSure = 220; // ~2sn

  if (aktifBalon.faz === 'in') {
    aktifBalon.opacity = Math.min(aktifBalon.opacity + fadeSpd, 1);
    if (aktifBalon.opacity >= 1) { aktifBalon.faz = 'dur'; balonTimer = 0; }
  } else if (aktifBalon.faz === 'dur') {
    if (balonTimer > durSure) { aktifBalon.faz = 'out'; balonTimer = 0; }
  } else if (aktifBalon.faz === 'out') {
    aktifBalon.opacity = Math.max(aktifBalon.opacity - fadeSpd, 0);
    if (aktifBalon.opacity <= 0) {
      aktifBalon = null;
      setTimeout(sonrakiBalon, 300); // kısa bekle, sonraki çıksın
    }
  }
}

function update() {
  frame++;
  const tl = TL(), tr = TR();
  if (kx === 0) kx = W + 80;
  if (!oOtur) { ox += 0.2; if (ox >= tl) { ox = tl; oOtur = true; } }
  else oOturT = Math.min(oOturT+0.018, 1);
  if (!kOtur) { kx -= 0.2; if (kx <= tr) { kx = tr; kOtur = true; } }
  else kOturT = Math.min(kOturT+0.018, 1);
  updateBalon();
}

function draw() {
  drawZemin();
  drawTabure(TL()); drawTabure(TR());
  const oHeady = drawAdam(ox, false, oOtur, oOturT);
  const kHeady = drawAdam(kx, true, kOtur, kOturT);

  if (aktifBalon) {
    const isKiz = aktifBalon.kim === 1;
    const cx = isKiz ? kx : ox;
    const hy = isKiz ? kHeady : oHeady;
    drawBalon(cx, hy, isKiz, aktifBalon.t, aktifBalon.opacity);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
kx = W + 80;
loop();
</script>
</body>
</html>
