<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d1a; overflow: hidden; width: 100vw; height: 100vh; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const ZEMIN = () => H * 0.72;
const TL = () => W * 0.33;
const TR = () => W * 0.67;

const CUMLELER = [
  {t:"Babalar günü\ngeliyor eyvah...", kim:0},
  {t:"Ben babama ne\nalacağım şimdi?", kim:1},
  {t:"Kaç gün kaldı\nbabalar gününe?", kim:0},
  {t:"Babamı en çok\nne severdi benim?", kim:1},
  {t:"Hep aynı şeyleri\nalıyoruz yazık ya...", kim:0},
  {t:"Müzik zevki\nneydi babamın?", kim:1},
  {t:"En sevdiği renk\ntonunu düşünüyorum...", kim:0},
  {t:"Hediye güzel mi\ngözüksün...", kim:1},
  {t:"Hediye anlamlı mı\nolsun...", kim:0},
  {t:"Geç mi kaldım,\nkargo gelir mi ki?", kim:1},
  {t:"Yine mi 100 site\ngezeceğim?", kim:0},
  {t:"Keşke bir yer olsa\nbana sorsaydı...", kim:1},
];

let frame = 0;
let ox = -80, kx = 0;
let oOtur = false, kOtur = false;
let oOturT = 0, kOturT = 0;

// Yazı sistemi
let aktifYazi = null; // {t, kim, opacity, faz, timer}
let cumleIdx = 0;

function sonrakiYazi() {
  if (cumleIdx >= CUMLELER.length) return;
  aktifYazi = { ...CUMLELER[cumleIdx++], opacity: 0, faz: 'in', timer: 0 };
}

function updateYazi() {
  if (!aktifYazi) {
    if (ox > -60 || kx < W + 60) sonrakiYazi();
    return;
  }
  aktifYazi.timer++;
  const fadeSpd = 0.04, durSure = 180;
  if (aktifYazi.faz === 'in') {
    aktifYazi.opacity = Math.min(aktifYazi.opacity + fadeSpd, 1);
    if (aktifYazi.opacity >= 1) { aktifYazi.faz = 'dur'; aktifYazi.timer = 0; }
  } else if (aktifYazi.faz === 'dur') {
    if (aktifYazi.timer > durSure) { aktifYazi.faz = 'out'; aktifYazi.timer = 0; }
  } else {
    aktifYazi.opacity = Math.max(aktifYazi.opacity - fadeSpd, 0);
    if (aktifYazi.opacity <= 0) { aktifYazi = null; setTimeout(sonrakiYazi, 150); }
  }
}

function drawZemin() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);
  const grad = ctx.createRadialGradient(W/2, H*0.28, 20, W/2, H*0.28, W*0.7);
  grad.addColorStop(0, 'rgba(255,230,150,0.10)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1e1e38'; ctx.fillRect(0, ZEMIN(), W, H - ZEMIN());
  ctx.fillStyle = '#4a4a8a'; ctx.fillRect(0, ZEMIN(), W, 2);
}

function drawTabure(x) {
  const Z = ZEMIN(), s = W * 0.07;
  ctx.strokeStyle = '#c8a96e'; ctx.lineWidth = W * 0.007; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x-s, Z-s*1.4); ctx.lineTo(x+s, Z-s*1.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s*0.8, Z-s*1.4); ctx.lineTo(x-s*0.9, Z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+s*0.8, Z-s*1.4); ctx.lineTo(x+s*0.9, Z); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-s*0.8, Z-s*0.7); ctx.lineTo(x+s*0.8, Z-s*0.7); ctx.stroke();
}

function drawTelefon(x, y, angle) {
  const tw = W*0.03, th = W*0.055;
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle='#111'; ctx.strokeStyle='#999'; ctx.lineWidth=W*0.003;
  ctx.beginPath(); ctx.roundRect(-tw/2,-th/2,tw,th,tw*0.2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#3af'; ctx.fillRect(-tw/2+tw*0.12,-th/2+th*0.1,tw*0.76,th*0.72);
  ctx.restore();
}

function drawYazi(yazi) {
  if (!yazi || yazi.opacity <= 0) return;
  ctx.save();
  ctx.globalAlpha = yazi.opacity;

  const isKiz = yazi.kim === 1;
  const charX = isKiz ? kx : ox;
  const fontSize = W * 0.052;
  const satirlar = yazi.t.split('\n');
  const satirH = fontSize * 1.5;
  const topY = H * 0.22;

  ctx.font = `italic bold ${fontSize}px 'Comic Sans MS', cursive, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = isKiz ? 'right' : 'left';

  const textX = isKiz ? W * 0.88 : W * 0.12;

  satirlar.forEach((s, i) => {
    const angle = (i % 2 === 0 ? -1 : 1) * 0.03;
    const xOff = (i % 2 === 0 ? -1 : 1) * W * 0.008;
    ctx.save();
    ctx.translate(textX + xOff, topY + i * satirH);
    ctx.rotate(angle);
    ctx.fillText(s, 0, 0);
    ctx.restore();
  });

  // Ok — yazıdan karaktere doğru
  const yaziBotY = topY + satirlar.length * satirH + W*0.02;
  const okHedefX = charX;
  const okHedefY = ZEMIN() - H*0.15;

  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = W * 0.004;
  ctx.setLineDash([W*0.012, W*0.008]);
  ctx.beginPath();
  ctx.moveTo(textX, yaziBotY);
  ctx.quadraticCurveTo(
    (textX + okHedefX) / 2, yaziBotY + (okHedefY - yaziBotY) * 0.3,
    okHedefX, okHedefY
  );
  ctx.stroke();
  ctx.setLineDash([]);

  // Ok ucu
  const dx = okHedefX - (textX + okHedefX)/2 * 0.3;
  const dy = okHedefY - (yaziBotY + (okHedefY-yaziBotY)*0.3) * 0.3;
  const angle2 = Math.atan2(okHedefY - yaziBotY, okHedefX - textX);
  ctx.save();
  ctx.translate(okHedefX, okHedefY);
  ctx.rotate(angle2);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-W*0.025, -W*0.012);
  ctx.moveTo(0, 0);
  ctx.lineTo(-W*0.025, W*0.012);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = W*0.004;
  ctx.stroke();
  ctx.restore();

  ctx.restore();
}

function drawAdam(cx, isKiz, oturuyor, oturmaT) {
  const Z = ZEMIN(), t = Math.min(oturmaT,1);
  const scale = W*0.0012, govdeH=80*scale, basR=22*scale;
  const telDir = isKiz ? -1 : 1, s=W*0.065;

  let bedy;
  if (!oturuyor) bedy = Z - govdeH;
  else { const hY = Z-s*1.4-govdeH-basR*0.3; bedy = (Z-govdeH)+(hY-(Z-govdeH))*t; }
  const heady = bedy - basR - basR*0.5;

  ctx.strokeStyle = isKiz ? '#f8a4c8' : '#7ec8f8';
  ctx.lineWidth = W*0.008; ctx.lineCap = 'round';

  if (!oturuyor || t < 0.7) {
    const la = Math.sin(frame*0.06)*(oturuyor?0:0.35);
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx-basR+Math.sin(la)*basR*1.2,Z); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx+basR-Math.sin(la)*basR*1.2,Z); ctx.stroke();
  } else {
    const bw=basR*1.5;
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx-bw,bedy+govdeH+bw*0.8); ctx.lineTo(cx-bw+telDir*bw*2,bedy+govdeH+bw*0.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH); ctx.lineTo(cx+bw,bedy+govdeH+bw*0.8); ctx.lineTo(cx+bw+telDir*bw*2,bedy+govdeH+bw*0.8); ctx.stroke();
  }

  ctx.beginPath(); ctx.moveTo(cx,bedy); ctx.lineTo(cx,bedy+govdeH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH*0.3); ctx.lineTo(cx+telDir*basR*2.2,bedy+govdeH*0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,bedy+govdeH*0.3); ctx.lineTo(cx-telDir*basR*1.6,bedy+govdeH*0.65); ctx.stroke();
  drawTelefon(cx+telDir*basR*3, bedy+govdeH*0.42, telDir*-0.4);

  ctx.beginPath(); ctx.arc(cx,heady,basR,0,Math.PI*2);
  ctx.fillStyle = isKiz?'#f8a4c8':'#7ec8f8'; ctx.fill(); ctx.stroke();

  if (isKiz) {
    ctx.strokeStyle='#f060a0'; ctx.lineWidth=W*0.01;
    ctx.beginPath(); ctx.moveTo(cx-basR,heady-basR*0.3); ctx.quadraticCurveTo(cx-basR*1.8,heady+basR*0.8,cx-basR*1.4,heady+basR*1.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+basR,heady-basR*0.3); ctx.quadraticCurveTo(cx+basR*1.8,heady+basR*0.8,cx+basR*1.4,heady+basR*1.6); ctx.stroke();
    ctx.lineWidth=W*0.008;
  }

  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-basR*0.35,heady-basR*0.15,basR*0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+basR*0.35,heady-basR*0.15,basR*0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(cx-basR*0.35,heady-basR*0.1,basR*0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+basR*0.35,heady-basR*0.1,basR*0.15,0,Math.PI*2); ctx.fill();

  // Mutsuz ağız
  ctx.strokeStyle='#222'; ctx.lineWidth=W*0.005;
  ctx.beginPath(); ctx.arc(cx, heady+basR*0.9, basR*0.38, Math.PI*1.15, Math.PI*1.85, false); ctx.stroke();
}

function update() {
  frame++;
  const tl = TL(), tr = TR();
  if (kx === 0) kx = W + 80;
  if (!oOtur) { ox += 0.2; if (ox >= tl) { ox = tl; oOtur = true; } }
  else oOturT = Math.min(oOturT+0.018, 1);
  if (!kOtur) { kx -= 0.2; if (kx <= tr) { kx = tr; kOtur = true; } }
  else kOturT = Math.min(kOturT+0.018, 1);
  updateYazi();
}

function draw() {
  drawZemin();
  drawTabure(TL()); drawTabure(TR());
  drawYazi(aktifYazi);
  drawAdam(ox, false, oOtur, oOturT);
  drawAdam(kx, true, kOtur, kOturT);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
kx = W + 80;
loop();
</script>
</body>
</html>
