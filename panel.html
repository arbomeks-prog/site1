<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel | BudurBuldum</title>
<meta name="robots" content="noindex, nofollow">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f172a;font-family:-apple-system,sans-serif;color:#e2e8f0;min-height:100vh;}
.giris{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.giris-kart{background:#1e293b;border-radius:20px;padding:36px 28px;width:100%;max-width:340px;text-align:center;}
.giris-kart h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;}
.giris-kart p{font-size:13px;color:#64748b;margin-bottom:24px;}
.giris-kart input{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:13px 16px;color:#fff;font-size:16px;outline:none;margin-bottom:12px;}
.giris-kart button{width:100%;background:#e8a838;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:800;color:#412402;cursor:pointer;}
.hata{font-size:13px;color:#f87171;margin-top:8px;min-height:18px;}
.nav{background:#1e293b;border-bottom:1px solid rgba(255,255,255,0.08);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-size:16px;font-weight:700;color:#fff;}
.nav-logo span{color:#e8a838;}
.nav-right{font-size:12px;color:#64748b;cursor:pointer;background:none;border:none;}
.wrap{max-width:560px;margin:0 auto;padding:20px 16px 60px;}
.tarih{font-size:13px;color:#64748b;margin-bottom:20px;}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.metric{background:#1e293b;border-radius:14px;padding:16px 14px;text-align:center;}
.metric.full{grid-column:1/-1;}
.metric-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;}
.metric-val{font-size:30px;font-weight:700;color:#e8a838;}
.metric-sub{font-size:11px;color:#475569;margin-top:4px;}
.section{background:#1e293b;border-radius:16px;padding:18px;margin-bottom:12px;}
.section-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-label{font-size:13px;color:#e2e8f0;min-width:100px;}
.bar-track{flex:1;height:8px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;background:#e8a838;}
.bar-count{font-size:12px;color:#94a3b8;min-width:28px;text-align:right;}
.huni{display:flex;flex-direction:column;gap:8px;}
.huni-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px;}
.huni-label{font-size:14px;color:#e2e8f0;}
.huni-val{font-size:20px;font-weight:700;color:#e8a838;}
.huni-oran{font-size:12px;color:#64748b;margin-left:6px;}
.gun-row{display:flex;align-items:flex-end;gap:6px;height:60px;margin-top:8px;}
.gun-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.gun-bar{width:100%;background:#e8a838;border-radius:4px 4px 0 0;min-height:4px;}
.gun-label{font-size:10px;color:#64748b;}
.gun-sayi{font-size:11px;color:#94a3b8;}
.admin-btn{width:100%;margin-top:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px;font-size:12px;color:#475569;cursor:pointer;}
.loading{text-align:center;padding:40px;color:#475569;font-size:14px;}
</style>
</head>
<body>

<div id="giris-ekrani" class="giris">
  <div class="giris-kart">
    <h1>🔒 Panel</h1>
    <p>BudurBuldum yönetim paneli</p>
    <input id="sifre-input" type="text" placeholder="Şifre" onkeydown="if(event.key==='Enter')girisYap()"/>
    <button onclick="girisYap()">Gir</button>
    <p class="hata" id="giris-hata"></p>
  </div>
</div>

<div id="panel-ekrani" style="display:none;">
  <nav class="nav">
    <span class="nav-logo">budur<span>buldum</span> panel</span>
    <button class="nav-right" onclick="cikisYap()">Çıkış</button>
  </nav>
  <div class="wrap">
    <p class="tarih" id="tarih-yazisi" style="margin-top:16px;"></p>
    <div id="panel-icerik" class="loading">Yükleniyor...</div>
  </div>
</div>

<script>
var SIFRE = '';

function girisYap() {
  var s = document.getElementById('sifre-input').value.trim();
  if (!s) return;
  SIFRE = s;
  document.getElementById('giris-hata').textContent = '';
  panelYukle();
}

function cikisYap() {
  SIFRE = '';
  document.getElementById('panel-ekrani').style.display = 'none';
  document.getElementById('giris-ekrani').style.display = 'flex';
  document.getElementById('sifre-input').value = '';
}

function adminIsaretle() {
  localStorage.setItem('bb_admin', '1');
  alert('Bu cihaz admin olarak işaretlendi. Artık senin girişlerin sayılmayacak.');
}

function panelYukle() {
  fetch('/api/panel?sifre=' + encodeURIComponent(SIFRE))
    .then(function(r) { return r.json().then(function(d){ return {status:r.status,data:d}; }); })
    .then(function(obj) {
      if (obj.status === 401) { document.getElementById('giris-hata').textContent = 'Şifre yanlış.'; return; }
      if (!obj.data.success) { document.getElementById('giris-hata').textContent = 'Hata: ' + (obj.data.error||'bilinmiyor'); return; }
      document.getElementById('giris-ekrani').style.display = 'none';
      document.getElementById('panel-ekrani').style.display = 'block';
      var d = new Date();
      document.getElementById('tarih-yazisi').textContent = d.toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
      render(obj.data);
    })
    .catch(function(e) { document.getElementById('giris-hata').textContent = 'Bağlantı hatası.'; });
}

function render(d) {
  var tamamlama_orani = d.toplam_giren > 0 ? Math.round(d.toplam_tamamlayan / d.toplam_giren * 100) : 0;
  var bugun_oran = d.bugun_toplam > 0 ? Math.round(d.bugun_tamamlayan / d.bugun_toplam * 100) : 0;

  var html = '';

  // Bugün
  html += '<div class="metrics">';
  html += '<div class="metric"><div class="metric-label">Bugün quiz başlatan</div><div class="metric-val">' + d.bugun_toplam + '</div></div>';
  html += '<div class="metric"><div class="metric-label">Bugün tamamlayan</div><div class="metric-val">' + d.bugun_tamamlayan + '</div><div class="metric-sub">%' + bugun_oran + ' tamamlama</div></div>';
  html += '</div>';

  // Huni
  html += '<div class="section"><div class="section-title">Tüm zamanlar</div><div class="huni">';
  html += '<div class="huni-row"><span class="huni-label">Quiz başlatan</span><span><span class="huni-val">' + d.toplam_giren + '</span></span></div>';
  html += '<div class="huni-row"><span class="huni-label">Tamamlayan</span><span><span class="huni-val">' + d.toplam_tamamlayan + '</span><span class="huni-oran">%' + tamamlama_orani + '</span></span></div>';
  html += '<div class="huni-row"><span class="huni-label">Yarıda bırakan</span><span><span class="huni-val">' + (d.toplam_giren - d.toplam_tamamlayan) + '</span><span class="huni-oran">%' + (100 - tamamlama_orani) + '</span></span></div>';
  html += '</div></div>';

  // Son 7 gün
  if (d.son_7_gun && d.son_7_gun.length > 0) {
    var maxVal = Math.max.apply(null, d.son_7_gun.map(function(g){ return parseInt(g.sayi); }));
    html += '<div class="section"><div class="section-title">Son 7 gün (tamamlayan)</div><div class="gun-row">';
    d.son_7_gun.forEach(function(g) {
      var pct = maxVal > 0 ? Math.round(parseInt(g.sayi) / maxVal * 100) : 0;
      var tarih = new Date(g.tarih);
      var gun = tarih.toLocaleDateString('tr-TR',{weekday:'short'});
      html += '<div class="gun-bar-wrap"><div class="gun-sayi">' + g.sayi + '</div><div class="gun-bar" style="height:' + Math.max(pct*0.5,4) + 'px;"></div><div class="gun-label">' + gun + '</div></div>';
    });
    html += '</div></div>';
  }

  // Kime dağılımı
  if (d.kime_dagilim && d.kime_dagilim.length > 0) {
    var maxK = Math.max.apply(null, d.kime_dagilim.map(function(k){ return parseInt(k.sayi); }));
    html += '<div class="section"><div class="section-title">Kime hediye aranıyor</div>';
    d.kime_dagilim.forEach(function(k) {
      var pct = maxK > 0 ? Math.round(parseInt(k.sayi) / maxK * 100) : 0;
      html += '<div class="bar-row"><span class="bar-label">' + (k.iliski_durumu||'—') + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;"></div></div><span class="bar-count">' + k.sayi + '</span></div>';
    });
    html += '</div>';
  }

  // Bütçe dağılımı
  if (d.butce_dagilim && d.butce_dagilim.length > 0) {
    var maxB = Math.max.apply(null, d.butce_dagilim.map(function(b){ return parseInt(b.sayi); }));
    html += '<div class="section"><div class="section-title">Bütçe dağılımı</div>';
    d.butce_dagilim.forEach(function(b) {
      var pct = maxB > 0 ? Math.round(parseInt(b.sayi) / maxB * 100) : 0;
      html += '<div class="bar-row"><span class="bar-label">' + (b.butce||'—') + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;"></div></div><span class="bar-count">' + b.sayi + '</span></div>';
    });
    html += '</div>';
  }

  // Yarıda bırakanlar detay
  if (d.yarim_detay && d.yarim_detay.length > 0) {
    html += '<div class="section"><div class="section-title">Yarıda bırakanlar (son 50)</div>';
    html += '<div style="overflow-x:auto;">';
    html += '<table style="width:100%;border-collapse:collapse;font-size:12px;">';
    html += '<thead><tr>';
    html += '<th style="text-align:left;padding:6px 8px;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.08);">Kime</th>';
    html += '<th style="text-align:left;padding:6px 8px;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.08);">Cevaplanan</th>';
    html += '<th style="text-align:left;padding:6px 8px;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.08);">Bütçe</th>';
    html += '<th style="text-align:left;padding:6px 8px;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.08);">Ne zaman</th>';
    html += '</tr></thead><tbody>';
    d.yarim_detay.forEach(function(r) {
      var cevapSayisi = 0;
      try {
        var ozel = JSON.parse(r.ozel_not);
        var cv = ozel.tum_cevaplar || {};
        cevapSayisi = Object.keys(cv).filter(function(k){ return cv[k] && cv[k] !== ''; }).length;
      } catch(e) {}
      var zaman = '';
      try {
        var d2 = new Date(r.updated_at);
        var fark = Math.floor((Date.now() - d2) / 60000);
        if (fark < 60) zaman = fark + ' dk önce';
        else if (fark < 1440) zaman = Math.floor(fark/60) + ' sa önce';
        else zaman = Math.floor(fark/1440) + ' gün önce';
      } catch(e) {}
      html += '<tr>';
      html += '<td style="padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.05);color:#e2e8f0;">' + (r.iliski_durumu||'—') + '</td>';
      html += '<td style="padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.05);color:#e8a838;font-weight:700;">' + cevapSayisi + ' soru</td>';
      html += '<td style="padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.05);color:#94a3b8;">' + (r.butce||'—') + '</td>';
      html += '<td style="padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.05);color:#64748b;">' + zaman + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
  }

  html += '<button class="admin-btn" onclick="adminIsaretle()">🔧 Bu cihazı admin olarak işaretle</button>';

  document.getElementById('panel-icerik').innerHTML = html;
}
</script>
</body>
</html>
