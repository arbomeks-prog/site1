<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Soru Otomatik</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #0f172a;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
}
.frame {
    width: 360px;
    height: 640px;
    background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 60%, #0f172a 100%);
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    cursor: none;
}
.top-bar {
    padding: 14px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.logo { font-size: 12px; font-weight: 800; color: #fbbf24; letter-spacing: 0.08em; }
.timer { font-size: 13px; color: white; font-weight: 800; font-variant-numeric: tabular-nums; }

.grid-area {
    flex: 1;
    padding: 4px 12px 8px;
    overflow: hidden;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 5px;
}
.kart {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px 3px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}
.kart.aktif {
    background: rgba(249,115,22,0.25);
    border-color: #f97316;
    transform: scale(1.08);
    box-shadow: 0 0 14px rgba(249,115,22,0.5);
    z-index: 2;
}
.kart.cevaplaniyor {
    transition: all 0.6s ease;
    background: rgba(16,185,129,0.08);
    border-color: rgba(16,185,129,0.3);
    opacity: 0.6;
    transform: scale(0.97);
}
.kart.cevaplandi {
    transition: all 0.6s ease;
    background: linear-gradient(135deg, rgba(16,185,129,0.25), rgba(5,150,105,0.15));
    border-color: #10b981;
    opacity: 1;
    transform: scale(1);
}
.kart-no {
    font-size: 9px;
    font-weight: 800;
    color: rgba(255,255,255,0.35);
    line-height: 1;
    margin-bottom: 2px;
    transition: color 0.5s;
}
.kart.cevaplandi .kart-no { color: #10b981; }
.kart-icerik {
    font-size: 6px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    line-height: 1.3;
    font-weight: 500;
    transition: color 0.5s, font-size 0.4s;
}
.kart.cevaplandi .kart-icerik {
    font-size: 6.5px;
    color: #6ee7b7;
    font-weight: 700;
}
.kart-check {
    display: none;
    font-size: 9px;
    color: #10b981;
    font-weight: 900;
    margin-top: 1px;
}
.kart.cevaplandi .kart-check { display: block; }

.alt-bar {
    padding: 8px 16px 14px;
    flex-shrink: 0;
    text-align: center;
}
.ilerleme-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
}
.ilerleme-ic {
    height: 100%;
    background: linear-gradient(90deg, #f97316, #fbbf24);
    border-radius: 99px;
    transition: width 0.6s ease;
    width: 0%;
}
.alt-text { font-size: 10px; color: rgba(255,255,255,0.4); }
.alt-text span { color: #fbbf24; font-weight: 700; }

.basla-btn {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    cursor: pointer;
}
.basla-ic {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(249,115,22,0.5);
}

.popup {
    display: none;
    position: absolute;
    inset: 0;
    background: transparent;
    z-index: 10;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.popup.aktif { display: flex; }
.popup-ic {
    background: #1e293b;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 16px;
    width: 100%;
    max-width: 280px;
    position: relative;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
}
.popup-no {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 0.08em;
}
.popup-soru {
    font-size: 13px;
    font-weight: 700;
    color: white;
    margin-bottom: 10px;
    line-height: 1.4;
}
.popup-secenekler {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.popup-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(255,255,255,0.65);
    font-size: 11px;
    padding: 9px 12px;
    text-align: left;
    font-weight: 500;
}
.popup-btn.secili {
    background: linear-gradient(135deg, rgba(249,115,22,0.35), rgba(234,88,12,0.25));
    border-color: #f97316;
    color: white;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(249,115,22,0.25);
}

#cursor {
    position: absolute;
    width: 20px;
    height: 20px;
    pointer-events: none;
    z-index: 999;
    display: none;
    filter: drop-shadow(0 2px 5px rgba(0,0,0,0.7));
    transition: transform 0.1s ease;
}

.bitti {
    display: none;
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #0f172a, #1e3a8a);
    z-index: 30;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
}
.bitti.goster { display: flex; }
.bitti-emoji { font-size: 48px; margin-bottom: 12px; }
.bitti-sure { font-size: 40px; font-weight: 900; color: #fbbf24; margin-bottom: 4px; }
.bitti-alt { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 16px; }
.bitti-mesaj { font-size: 15px; font-weight: 700; color: white; line-height: 1.6; margin-bottom: 24px; }
.yeniden-btn {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white; border: none; border-radius: 12px;
    padding: 12px 24px; font-size: 14px; font-weight: 800; cursor: pointer;
}

@media (max-width: 400px) {
    body { padding: 0; align-items: flex-start; }
    .frame { width: 100vw; height: 100svh; border-radius: 0; }
}
</style>
</head>
<body>
<div class="frame" id="frame">
    <div class="top-bar">
        <div class="logo">BUDUR BULDUM</div>
        <div class="timer" id="timer">⏱ 0:00</div>
    </div>
    <div class="grid-area" id="grid"></div>
    <div class="alt-bar">
        <div class="ilerleme-bar"><div class="ilerleme-ic" id="ilerleme"></div></div>
        <div class="alt-text"><span id="tamamlanan">0</span>/30 soru tamamlandı</div>
    </div>

    <div class="basla-btn" id="basla-btn" onclick="baslat()">
        <button class="basla-ic">▶ Başlat — süreyi ölç</button>
    </div>

    <div class="popup" id="popup">
        <div class="popup-ic" id="popup-ic">
            <div class="popup-no" id="popup-no"></div>
            <div class="popup-soru" id="popup-soru"></div>
            <div class="popup-secenekler" id="popup-sec"></div>
        </div>
    </div>

    <svg id="cursor" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 0 L4 20 L8 16 L12 24 L14 23 L10 15 L16 15 Z"/>
    </svg>

    <div class="bitti" id="bitti">
        <div class="bitti-emoji">🎁</div>
        <div class="bitti-sure" id="bitti-sure"></div>
        <div class="bitti-alt">30 soruyu tamamladın</div>
        <div class="bitti-mesaj">Sevdiğin kişiye<br>2 dakikanı ayırdın. ❤️</div>
        <button class="yeniden-btn" onclick="yeniden()">↺ Tekrar dene</button>
    </div>
</div>

<script>
const sorular = [
    { soru: "Hediye kime alınıyor?", sec: ["Sevgili","Arkadaş","Anne","Baba"] },
    { soru: "Cinsiyeti nedir?", sec: ["Kadın","Erkek"] },
    { soru: "Yaş aralığı nedir?", sec: ["18-25","26-35","36-45","46+"] },
    { soru: "Doğum tarihi?", sec: ["Biliyorum","Bilmiyorum","Burcunu biliyorum"] },
    { soru: "Tarzı nasıl?", sec: ["Minimalist","Renkli","Klasik","Modern"] },
    { soru: "Hobileri neler?", sec: ["Okumak","Spor","Müzik","Seyahat"] },
    { soru: "Favori renk tonu?", sec: ["Pastel","Koyu","Canlı","Doğal"] },
    { soru: "Hediye ne için?", sec: ["Doğum Günü","Yıl Dönümü","Sürpriz","Başarı"] },
    { soru: "Evde mi dışarıda mı?", sec: ["Evde","Dışarıda","İkisi de"] },
    { soru: "Teknolojiye ilgisi?", sec: ["Çok var","Orta","Az"] },
    { soru: "Bütçe aralığı?", sec: ["0-500₺","500-1500₺","1500-3000₺","3000+₺"] },
    { soru: "Favori mevsim?", sec: ["İlkbahar","Yaz","Sonbahar","Kış"] },
    { soru: "En sevdiği tatlı?", sec: ["Çikolata","Pasta","Dondurma","Hiçbiri"] },
    { soru: "Spor yapıyor mu?", sec: ["Düzenli","Ara sıra","Hiç"] },
    { soru: "Favori müzik türü?", sec: ["Pop","Rock","Klasik","Rap"] },
    { soru: "Hayvan sever mi?", sec: ["Çok","Orta","Pek sevmez"] },
    { soru: "Seyahat sever mi?", sec: ["Çok","Ara sıra","Pek sevmez"] },
    { soru: "Kitap okur mu?", sec: ["Çok","Ara sıra","Hiç"] },
    { soru: "Kahve mi çay mı?", sec: ["Kahve","Çay","İkisi de","Hiçbiri"] },
    { soru: "Favori film türü?", sec: ["Romantik","Komedi","Aksiyon","Dram"] },
    { soru: "Bitki bakımı yapar mı?", sec: ["Evet","Hayır","Deniyor"] },
    { soru: "Oyun oynar mı?", sec: ["Sık sık","Ara sıra","Hiç"] },
    { soru: "Makyaj/bakıma ilgisi?", sec: ["Çok","Orta","Yok"] },
    { soru: "Takı/aksesuar sever mi?", sec: ["Evet","Ara sıra","Hiç"] },
    { soru: "Favori mutfak?", sec: ["Türk","İtalyan","Asya","Sağlıklı"] },
    { soru: "Doğa yürüyüşü yapar mı?", sec: ["Evet","Ara sıra","Hiç"] },
    { soru: "Sanata ilgisi?", sec: ["Çok","Orta","Yok"] },
    { soru: "Fotoğraf çeker mi?", sec: ["Evet","Ara sıra","Hiç"] },
    { soru: "Kişilik tipi?", sec: ["İçedönük","Dışadönük","Dengeli"] },
    { soru: "Hediyede öncelik?", sec: ["Kullanışlı","Güzel","Anlamlı","Uygun fiyat"] },
];

let baslangic = null;
let timerInterval = null;
let adim = 0;
let timeouts = [];
let animFrame = null;

function t(fn, ms) {
    const id = setTimeout(fn, ms);
    timeouts.push(id);
    return id;
}

const grid = document.getElementById('grid');
sorular.forEach((s, i) => {
    const kart = document.createElement('div');
    kart.className = 'kart';
    kart.id = 'kart-' + i;
    kart.innerHTML = `
        <div class="kart-no">${i+1}</div>
        <div class="kart-icerik" id="kicerik-${i}">${s.soru.length > 18 ? s.soru.substring(0,16)+'…' : s.soru}</div>
        <div class="kart-check">✔</div>
    `;
    grid.appendChild(kart);
});

const cursor = document.getElementById('cursor');
const frame = document.getElementById('frame');

let curX = 180, curY = 320;

function setCursor(x, y) {
    curX = x; curY = y;
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
}

// İnsan gibi ease — biraz overshoot
function humanEase(p) {
    // ease in-out + hafif geri sallanma
    const base = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
    // küçük sinüs titremesi
    return base + Math.sin(p * Math.PI) * 0.015;
}

function animateCursor(toX, toY, duration, onDone) {
    const fromX = curX, fromY = curY;
    const start = performance.now();

    function step(now) {
        const elapsed = now - start;
        const p = Math.min(elapsed / duration, 1);
        const e = humanEase(p);
        setCursor(fromX + (toX - fromX) * e, fromY + (toY - fromY) * e);
        if (p < 1) {
            animFrame = requestAnimationFrame(step);
        } else {
            setCursor(toX, toY);
            if (onDone) onDone();
        }
    }
    animFrame = requestAnimationFrame(step);
}

function getCenter(el) {
    const fr = frame.getBoundingClientRect();
    const r = el.getBoundingClientRect();
    return { x: r.left - fr.left + r.width/2, y: r.top - fr.top + r.height/2 };
}

function rnd(min, max) { return min + Math.random() * (max - min); }

function baslat() {
    document.getElementById('basla-btn').style.display = 'none';
    cursor.style.display = 'block';
    setCursor(180, 320);
    baslangic = Date.now();
    timerInterval = setInterval(timerGuncelle, 100);
    adim = 0;
    t(sonrakiSoru, 500);
}

function sonrakiSoru() {
    if (adim >= 30) { bitti(); return; }
    const i = adim;
    const s = sorular[i];

    document.querySelectorAll('.kart').forEach(k => {
        if (!k.classList.contains('cevaplandi')) k.classList.remove('aktif');
    });
    const kart = document.getElementById('kart-' + i);
    kart.classList.add('aktif');

    document.getElementById('popup-no').textContent = `SORU ${i+1} / 30`;
    document.getElementById('popup-soru').textContent = s.soru;
    const secDiv = document.getElementById('popup-sec');
    secDiv.innerHTML = s.sec.map(opt =>
        `<div class="popup-btn">${opt}</div>`
    ).join('');
    document.getElementById('popup').classList.add('aktif');

    const btnler = Array.from(secDiv.querySelectorAll('.popup-btn'));
    const hedefIdx = Math.floor(Math.random() * btnler.length);

    // İnsan gibi gezinti planı:
    // Birkaç şıka bak (rastgele sıra, bazen geri dön), sonra hedefe git
    const plan = [];
    const digerleri = btnler.map((_, idx) => idx).filter(idx => idx !== hedefIdx);

    // Kaç şıka bakacak: 1-3 arası
    const bakSayisi = Math.floor(rnd(1, Math.min(digerleri.length + 1, 4)));
    for (let g = 0; g < bakSayisi; g++) {
        plan.push(digerleri[g % digerleri.length]);
        // Bazen aynı şıka iki kez bak (kararsızlık)
        if (Math.random() < 0.3 && g > 0) plan.push(digerleri[g % digerleri.length]);
    }
    plan.push(hedefIdx);

    let zaman = 400; // popup açılınca cursor hareket etmeden önce bekle

    plan.forEach((btnIdx, planSira) => {
        const sonAdim = planSira === plan.length - 1;
        const zamanLocal = zaman;
        const gezSure = sonAdim ? rnd(350, 500) : rnd(400, 650);
        const bekle = sonAdim ? rnd(200, 350) : rnd(300, 600); // şıkta durma süresi

        t(() => {
            const pos = getCenter(btnler[btnIdx]);
            // Hedefe tam gitmek yerine biraz offset ekle (insan gibi)
            const tx = pos.x + rnd(-4, 4);
            const ty = pos.y + rnd(-3, 3);

            animateCursor(tx, ty, gezSure, () => {
                if (sonAdim) {
                    // Tıklama: cursor küçül
                    t(() => {
                        cursor.style.transform = 'scale(0.7)';
                        t(() => { cursor.style.transform = 'scale(1)'; }, 100);

                        btnler[hedefIdx].classList.add('secili');
                        const secilenMetin = btnler[hedefIdx].textContent;

                        // 600ms bekle, popup kapat, kart fade
                        t(() => {
                            document.getElementById('popup').classList.remove('aktif');
                            kart.classList.remove('aktif');
                            kart.classList.add('cevaplaniyor');

                            t(() => {
                                kart.classList.remove('cevaplaniyor');
                                kart.classList.add('cevaplandi');
                                document.getElementById('kicerik-' + i).textContent = secilenMetin;

                                adim++;
                                document.getElementById('tamamlanan').textContent = adim;
                                document.getElementById('ilerleme').style.width = (adim / 30 * 100) + '%';

                                t(sonrakiSoru, rnd(300, 500));
                            }, 400);
                        }, 600);
                    }, bekle);
                }
            });
        }, zamanLocal);

        zaman += gezSure + bekle + 80;
    });
}

function bitti() {
    cursor.style.display = 'none';
    clearInterval(timerInterval);
    const elapsed = (Date.now() - baslangic) / 1000;
    const dk = Math.floor(elapsed / 60);
    const sn = Math.floor(elapsed % 60);
    document.getElementById('bitti-sure').textContent = `${dk}:${sn.toString().padStart(2,'0')}`;
    t(() => document.getElementById('bitti').classList.add('goster'), 400);
}

function yeniden() {
    timeouts.forEach(clearTimeout); timeouts = [];
    cancelAnimationFrame(animFrame);
    clearInterval(timerInterval);
    cursor.style.display = 'none';
    document.getElementById('bitti').classList.remove('goster');
    document.getElementById('popup').classList.remove('aktif');
    document.getElementById('tamamlanan').textContent = '0';
    document.getElementById('ilerleme').style.width = '0%';
    document.getElementById('timer').textContent = '⏱ 0:00';
    document.querySelectorAll('.kart').forEach((k, i) => {
        k.className = 'kart';
        document.getElementById('kicerik-' + i).textContent =
            sorular[i].soru.length > 18 ? sorular[i].soru.substring(0,16)+'…' : sorular[i].soru;
    });
    baslangic = null; adim = 0;
    document.getElementById('basla-btn').style.display = 'flex';
}

function timerGuncelle() {
    const elapsed = (Date.now() - baslangic) / 1000;
    const dk = Math.floor(elapsed / 60);
    const sn = Math.floor(elapsed % 60);
    document.getElementById('timer').textContent = `⏱ ${dk}:${sn.toString().padStart(2,'0')}`;
}
</script>
</body>
</html>
