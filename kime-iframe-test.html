<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>kime-iframe test</title>
<style>
  body { background: #f1f5f9; font-family: sans-serif; padding: 20px; }
  h2 { margin-bottom: 16px; color: #1e293b; }
  iframe { width: 100%; border: none; border-radius: 12px; background: white; padding: 8px; }
  #sonuc { margin-top: 16px; font-size: 18px; font-weight: 700; color: #10b981; }
</style>
</head>
<body>
<h2>🎁 Hediye kime alınıyor?</h2>
<iframe id="kime-frame" src="kime-iframe.html" height="280" scrolling="no"></iframe>
<div id="sonuc">— henüz seçilmedi —</div>

<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'kime_secildi') {
    document.getElementById('sonuc').textContent = '✅ Seçilen: ' + e.data.deger;
  }
});
</script>
</body>
</html>
