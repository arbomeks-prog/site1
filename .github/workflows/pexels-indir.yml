name: Pexels Fotoğraf İndir

on:
  workflow_dispatch:  # Manuel tetikleme — GitHub'da "Run workflow" butonuna basınca çalışır

jobs:
  indir:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fotoğrafları indir
        run: python3 pexels-indir.py

      - name: Değişiklikleri push et
        run: |
          git config user.email "kerutti@budurbuldum.com"
          git config user.name "kerutti"
          git add gorseller/
          git diff --staged --quiet || git commit -m "gorseller: Pexels fotoğrafları indirildi"
          git push
