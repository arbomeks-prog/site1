<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özet V2 | BudurBuldum Test</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #F9F9F9; font-family: -apple-system, sans-serif; padding: 20px 16px 80px; }
        .max { max-width: 560px; margin: 0 auto; }
        .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg,#e8a838,#f5c96a); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .logo-text { font-family: Georgia, serif; font-size: 18px; font-weight: 900; color: #1e293b; }
        .logo-text span { color: #e8a838; }
        .test-badge { background: #ef4444; color: white; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }

        .profil-bar { background: #1e293b; color: white; border-radius: 16px; padding: 12px 16px; font-size: 12px; line-height: 2; margin-bottom: 16px; }
        .profil-bar .lbl { color: #94a3b8; }
        .profil-bar .val { color: #f1f5f9; font-weight: 700; }

        .butce-wrapper { margin-bottom: 16px; }
        .butce-baslik { font-size: 12px; font-weight: 800; color: #1e40af; letter-spacing: 0.05em; border-bottom: 2px solid #1e40af; padding-bottom: 2px; margin-bottom: 10px; display: inline-block; }
        .butce-butonlar { display: flex; flex-wrap: wrap; gap: 6px; }
        .butce-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 2px solid #e2e8f0; background: white; color: #475569; font-weight: 600; cursor: pointer; }
        .butce-btn.aktif { background: #1e40af; color: white; border-color: #1e40af; }

        .kriter-baslik { font-size: 22px; font-weight: 900; color: #1e293b; text-align: center; margin-bottom: 14px; }
        .kriter-alt { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; }
        .rastgele-btn { background: #e8a838; color: #1e293b; border: none; border-radius: 12px; padding: 10px 20px; font-size: 14px; font-weight: 800; cursor: pointer; }

        .chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }
        .chip { background: white; border: 2px solid #e2e8f0; border-radius: 12px; padding: 8px 12px; cursor: pointer; transition: all 0.15s; position: relative; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .chip .c-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .chip .c-value { font-size: 13px; font-weight: 800; color: #1e293b; line-height: 1.3; min-height: 17px; }
        .chip .c-check { position: absolute; top: 6px; right: 8px; font-size: 13px; opacity: 0; transition: all 0.15s; color: #16a34a; }
        .chip.selected { border-color: #16a34a; background: linear-gradient(135deg,#f0fdf4,#dcfce7); }
        .chip.selected .c-label { color: #15803d; }
        .chip.selected .c-value { color: #14532d; }
        .chip.selected .c-check { opacity: 1; }
        .chip-grid.limit { }
        .chip-grid.limit .chip:not(.selected) { opacity: 0.4; pointer-events: none; }

        .hediye-btn { width: 100%; background: #1e40af; color: white; border: none; border-radius: 20px; padding: 18px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
        .hediye-btn:disabled { background: #94a3b8; cursor: not-allowed; }

        .sel-bilgi { text-align: center; font-size: 13px; font-weight: 700; color: #64748b; margin-bottom: 12px; }

        /* Bütçe popup */
        #butce-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .popup-ic { background: white; border-radius: 24px; padding: 28px 24px; max-width: 380px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); position: relative; }
        .popup-kapat { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; color: #94a3b8; cursor: pointer; }
        .popup-baslik { font-size: 20px; font-weight: 900; color: #1e293b; text-align: center; margin-bottom: 8px; }
        .popup-aciklama { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 24px; }
        .popup-secenek { width: 100%; border: none; border-radius: 16px; padding: 16px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .popup-sabit { background: #1e40af; color: white; }
        .popup-esnek { background: #f1f5f9; color: #1e293b; border: 2px solid #e2e8f0; }
        .popup-secenek .p-ikon { font-size: 24px; }
        .popup-secenek .p-baslik { font-weight: 700; }
        .popup-secenek .p-acik { font-size: 12px; font-weight: 400; opacity: 0.8; margin-top: 2px; }
    </style>
</head>
<body>
<div class="max">
    <div class="logo">
        <div class="logo-icon">🎁</div>
        <div class="logo-text">budur<span>buldum</span></div>
        <span class="test-badge" style="background:#7c3aed">V2</span>
    </div>

    <div id="profil-bar" class="profil-bar"></div>

    <div class="butce-wrapper">
        <div class="butce-baslik">💰 BÜTÇEYİ DEĞİŞTİREBİLİRSİNİZ</div>
        <div class="butce-butonlar" id="butce-butonlar"></div>
    </div>

    <div class="kriter-baslik" id="kriter-baslik">🎯 SADECE 6 TANE SEÇEBİLİRSİN</div>
    <div class="kriter-alt">
        <div style="font-size:15px;font-weight:900;color:#1e293b;">🎯 KENDİN SEÇ 👍</div>
        <button class="rastgele-btn" onclick="rastgeleSecimYap()">🎲 Rastgele Seç</button>
    </div>
    <div class="sel-bilgi" id="sel-bilgi"></div>

    <div class="chip-grid" id="chip-grid"></div>

    <button class="hediye-btn" id="hediye-btn" onclick="hediyeleriGor()" disabled>6 kriter seç → Hediyeleri Gör ✨</button>
</div>

<!-- Bütçe Popup -->
<div id="butce-popup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;padding:20px;">
    <div class="popup-ic">
        <div style="text-align:center;font-size:32px;margin-bottom:12px;">💰</div>
        <button class="popup-kapat" onclick="document.getElementById('butce-popup').style.display='none'">✕</button>
        <div class="popup-baslik">Bütçe tercihiniz?</div>
        <p class="popup-aciklama">Yapay zeka hediye önerilerini bu tercihe göre şekillendirecek.</p>
        <button class="popup-secenek popup-sabit" onclick="butceSecimYapVeGit(false)">
            <span class="p-ikon">🔒</span>
            <div><div class="p-baslik">Bütçe Sabit</div><div class="p-acik">Öneriler kesinlikle bütçem dahilinde olsun</div></div>
        </button>
        <button class="popup-secenek popup-esnek" onclick="butceSecimYapVeGit(true)">
            <span class="p-ikon">🔓</span>
            <div><div class="p-baslik">Bütçe Esnek</div><div class="p-acik">Biraz üstünde olsa da mükemmel hediyeyi görmek isterim</div></div>
        </button>
    </div>
</div>

<script>
// Bu sayfanın kendi soru listesi — sadece kriter seçimi için etiket map'i
const ETIKET_MAP = {
    kime: 'Hediye kime?', cinsiyet: 'Cinsiyeti?', yas: 'Yaşı?', butce: 'Bütçe?',
    dis_gorunus: 'Dış görünüş?', giyim_tarzi: 'Giyim tarzı?', renk_ilgi: 'Renklerle arası?',
    esya_tercihi: 'Eşya tercihi?', cevre: 'Çevrecilik?', meslek: 'Mesleği?',
    yemek: 'Yemek / mutfak?', dekorasyon: 'Dekorasyon?', spor: 'Spor?',
    seyahat: 'Seyahat tarzı?', hayvan: 'Hayvanlara tutumu?', arac: 'Araç / ehliyet?',
    hayat_bakis: 'Hayata bakışı?', ihtiyac: 'Şu an ihtiyacı?', ugur_burc: 'Uğur / burç?',
    inanc: 'İnanç / spiritüel?', dogal: 'Doğal ürünler?', mevsim: 'Mevsim tercihi?',
    tamir: 'Tamir / bakım?', saglik: 'Sağlığa yaklaşımı?', teknoloji: 'Teknoloji / klasik?',
    yayin: 'Dizi / film izleme?', kucuk_esya: 'Küçük eşya tercihi?', olmazsa_olmaz: 'Olmazsa olmazı?'
};

const BUTCE_SECENEKLER = ['0-500 TL','0-1000 TL','0-2000 TL','0-3000 TL','0-4000 TL','0-5000 TL','5001-10000 TL','10001-30000 TL','30001+ TL'];

// Kriter seçiminde profil sabitleri gösterilmez (hediyeler.html mantığıyla uyumlu)
const PROFIL_SABIT_IDS = ['kime','cinsiyet','yas','butce'];

// Negatif cevaplar — kriter listesinde gösterilmez
const NEGATIFLER = ['Pek ilgilenmiyor','Pek ilgilenmiyor gibi','Seyahat etmeyi pek sevmiyor gibi','Sporla pek ilgilenmiyor','Hayır','Hiç'];

const CHIP_RENKLER = ['#378ADD','#1D9E75','#BA7517','#D4537E','#534AB7','#639922','#D85A30','#888780'];

let cevaplar = {};
let selectedCriteria = [];
const LIMIT = 6;

// localStorage'dan cevapları oku
try {
    var raw = localStorage.getItem('budurV2Cevaplar');
    if (raw) cevaplar = JSON.parse(raw);
} catch(e) {}

if (!cevaplar || !cevaplar.kime) {
    // Cevap yoksa quiz'e geri gönder
    window.location.href = 'test-v2-sorular.html';
}

window.onload = function() {
    renderProfilBar();
    renderButceButonlar();
    renderChipGrid();
};

function renderProfilBar() {
    var bar = document.getElementById('profil-bar');
    var satirlar = [];
    Object.keys(cevaplar).forEach(function(id) {
        var etiket = ETIKET_MAP[id] || id;
        var deger = cevaplar[id];
        if (deger) satirlar.push('<span class="lbl">' + etiket + ' </span><span class="val">' + deger + '</span>');
    });
    bar.innerHTML = satirlar.join(' &nbsp;·&nbsp; ');
}

function renderButceButonlar() {
    var div = document.getElementById('butce-butonlar');
    div.innerHTML = '';
    BUTCE_SECENEKLER.forEach(function(b) {
        var isAktif = cevaplar['butce'] === b;
        var btn = document.createElement('button');
        btn.className = 'butce-btn' + (isAktif ? ' aktif' : '');
        btn.textContent = b;
        btn.onclick = function() {
            cevaplar['butce'] = b;
            localStorage.setItem('budurV2Cevaplar', JSON.stringify(cevaplar));
            renderProfilBar();
            div.querySelectorAll('.butce-btn').forEach(function(x) {
                x.className = 'butce-btn' + (x.textContent === b ? ' aktif' : '');
            });
        };
        div.appendChild(btn);
    });
}

function renderChipGrid() {
    var grid = document.getElementById('chip-grid');
    grid.innerHTML = '';
    var renk_i = 0;
    Object.keys(cevaplar).forEach(function(id) {
        // Profil sabitleri kriter listesinde gösterilmez
        if (PROFIL_SABIT_IDS.indexOf(id) !== -1) return;
        var deger = cevaplar[id];
        if (!deger) return;
        // Negatif cevaplar gösterilmez
        if (NEGATIFLER.some(function(n) { return deger.indexOf(n) !== -1; })) return;
        var etiket = ETIKET_MAP[id] || id;
        var chip = document.createElement('div');
        chip.className = 'chip';
        chip.dataset.soruId = id;
        chip.style.borderColor = CHIP_RENKLER[renk_i % CHIP_RENKLER.length];
        chip.innerHTML = '<span class="c-label">' + etiket + '</span><span class="c-value">' + deger + '</span><span class="c-check">✓</span>';
        chip.onclick = function() { toggleSelection(chip, id); };
        grid.appendChild(chip);
        renk_i++;
    });
    var adet = grid.children.length;
    var limit = Math.min(LIMIT, adet);
    var baslik = document.getElementById('kriter-baslik');
    if (baslik) baslik.textContent = '🎯 SADECE ' + limit + ' TANE SEÇEBİLİRSİN';
    guncelleBtnDurumu();
}

function toggleSelection(el, soruId) {
    var grid = document.getElementById('chip-grid');
    var allChips = grid.querySelectorAll('.chip');
    var limit = Math.min(LIMIT, allChips.length);
    if (el.classList.contains('selected')) {
        selectedCriteria = selectedCriteria.filter(function(c) { return c.id !== soruId; });
        el.classList.remove('selected');
    } else {
        if (selectedCriteria.length >= limit) return;
        var grup = selectedCriteria.length < 3 ? 'A' : 'B';
        selectedCriteria.push({ id: soruId, grup: grup });
        el.classList.add('selected');
    }
    var grid2 = document.getElementById('chip-grid');
    if (selectedCriteria.length >= limit) {
        grid2.classList.add('limit');
    } else {
        grid2.classList.remove('limit');
    }
    guncelleBtnDurumu();
}

function guncelleBtnDurumu() {
    var grid = document.getElementById('chip-grid');
    var allChips = grid.querySelectorAll('.chip');
    var limit = Math.min(LIMIT, allChips.length);
    var t = selectedCriteria.length;
    var bilgi = document.getElementById('sel-bilgi');
    var btn = document.getElementById('hediye-btn');
    bilgi.textContent = t + ' / ' + limit + ' seçildi';
    if (t >= limit) {
        btn.disabled = false;
        btn.textContent = 'Hediyeleri Gör ✨';
    } else {
        btn.disabled = true;
        btn.textContent = (limit - t) + ' tane daha seç ✨';
    }
}

function rastgeleSecimYap() {
    // Önce temizle
    selectedCriteria = [];
    document.getElementById('chip-grid').querySelectorAll('.chip').forEach(function(el) {
        el.classList.remove('selected');
    });
    document.getElementById('chip-grid').classList.remove('limit');
    // Chipları karıştır, ilk limit kadarını seç
    var grid = document.getElementById('chip-grid');
    var allChips = Array.prototype.slice.call(grid.querySelectorAll('.chip'));
    var limit = Math.min(LIMIT, allChips.length);
    // Fisher-Yates
    for (var i = allChips.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = allChips[i]; allChips[i] = allChips[j]; allChips[j] = tmp;
    }
    allChips.slice(0, limit).forEach(function(chip) { chip.click(); });
}

function hediyeleriGor() {
    document.getElementById('butce-popup').style.display = 'flex';
}

function butceSecimYapVeGit(esnek) {
    localStorage.setItem('budurV2SelectedCriteria', JSON.stringify(selectedCriteria));
    localStorage.setItem('budurV2SecilenBurc', '');
    localStorage.setItem('budurV2ButceEsnek', esnek ? '1' : '0');
    document.getElementById('butce-popup').style.display = 'none';
    window.location.href = 'test-v2-hediyeler.html';
}
</script>
</body>
</html>
