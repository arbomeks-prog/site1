<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#e8a838">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Budur Buldum · BudurBuldum</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); min-height: 100vh; font-family: Georgia, serif; }
        .header { background: rgba(15,23,42,0.98); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 14px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
        .logo-icon { width:34px; height:34px; background:linear-gradient(135deg,#e8a838,#f5c96a); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; }
        .logo-text { font-size:18px; font-weight:900; color:#fff; }
        .logo-text span { color:#e8a838; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .nav a { background:#1a73e8; color:#fff; text-decoration:none; font-size:13px; font-weight:600; padding:7px 18px; border-radius:50px; white-space:nowrap; }
        .nav a.active { background:#e8a838; color:#0f172a; }
        .container { max-width: 520px; margin: 48px auto; padding: 0 24px 60px; }
        h1 { color: #fff; font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 6px; }
        h1 span { color: #e8a838; }
        .subtitle { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 32px; }
        .form-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 28px 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #94a3b8; font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
        input, textarea, select { width: 100%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 14px; font-family: Georgia, serif; outline: none; transition: border-color 0.2s; }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3); }
        input:focus, textarea:focus, select:focus { border-color: #e8a838; }
        select option { background: #1e293b; color: #fff; }
        textarea { resize: vertical; min-height: 120px; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, #e8a838, #f5c96a); color: #0f172a; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 800; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; box-shadow: 0 0 0 4px rgba(232,168,56,0.25), 0 6px 20px rgba(232,168,56,0.35); margin-top: 8px; }
        .submit-btn:hover { transform: translateY(-2px); }
        .success-msg { display: none; text-align: center; padding: 24px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 16px; margin-top: 20px; }
        .success-msg .icon { font-size: 40px; margin-bottom: 10px; }
        .success-msg p { color: #22c55e; font-size: 15px; font-weight: 700; }
        .success-msg small { color: #94a3b8; font-size: 13px; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HWPN7VD4VX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HWPN7VD4VX');
    </script>
</head>
<body>
<div class="header">
    <a href="index.html" class="logo">
        <div class="logo-icon">🎁</div>
        <span class="logo-text">budur<span>buldum</span></span>
    </a>
    <nav class="nav">
        <a href="iletisim.html" class="active">Mail</a>
        <a href="#">Adres</a>
        <a href="#">Telefon</a>
        <a href="biz-kimiz.html">Biz Kimiz?</a>
    </nav>
</div>
<div class="container">
    <h1>Bize <span>Ulaşın</span></h1>
    <p class="subtitle">Sorularınız, önerileriniz veya iş birliği için formu doldurun.</p>
    <div class="form-card">
        <form action="https://formsubmit.co/budurbuldum@gmail.com" method="POST">
            <!-- Formsubmit gizli alanlar -->
            <input type="hidden" name="_subject" value="BudurBuldum - Yeni Mesaj">
            <input type="hidden" name="_next" value="https://buldum-sooty.vercel.app/iletisim.html?tesekkur=1">
            <input type="hidden" name="_captcha" value="false">
            <input type="text" name="_honey" style="display:none;">

            <div class="form-group">
                <label>Adınız</label>
                <input type="text" name="İsim" placeholder="Adınız Soyadınız" required>
            </div>
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" name="Email" placeholder="ornek@email.com" required>
            </div>
            <div class="form-group">
                <label>Konu</label>
                <select name="Konu">
                    <option value="Genel Soru">Genel Soru</option>
                    <option value="Öneri / Geri Bildirim">Öneri / Geri Bildirim</option>
                    <option value="İş Birliği">İş Birliği</option>
                    <option value="Sorun Bildirimi">Sorun Bildirimi</option>
                    <option value="Diğer">Diğer</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mesajınız</label>
                <textarea name="Mesaj" placeholder="Mesajınızı buraya yazın..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">Gönder</button>
        </form>
        <div class="success-msg" id="success-msg">
            <div class="icon">✅</div>
            <p>Mesajınız iletildi!</p>
            <small>En kısa sürede dönüş yapacağız.</small>
        </div>
    </div>
</div>
<script>
if (window.location.search.includes('tesekkur=1')) {
    document.querySelector('form').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
}
</script>
</body>
</html>
